<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/wallpaper/zx.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:#0A0E0C;--bg-surface:#121814;--bg-elevated:#1A211C;
      --border:#232B26;--border-hi:#33403A;--accent:#19C37D;
      --accent-hover:#2FD98F;--accent-glow:rgba(25,195,125,0.15);
      --text:#E8EDE9;--text-dim:#9BA8A0;--text-faint:#6B776F;
      --danger:#EF4444;--warning:#F5B947;--success:#22C55E;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg-base);color:var(--text);font-family:'Geist',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
    a{text-decoration:none;color:inherit}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:rgba(10,14,12,0.88);backdrop-filter:blur(14px)}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:16px}
    .container{max-width:1000px;margin:0 auto;padding:0 24px}
    .logo{font-size:20px;font-weight:700;letter-spacing:-0.02em}
    .logo .green{color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:12px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'Geist',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.18s;white-space:nowrap}
    .btn-secondary{background:transparent;color:var(--text);border-color:var(--border-hi)}
    .btn-secondary:hover{background:var(--bg-elevated)}
    .btn-danger{background:transparent;color:var(--danger);border-color:rgba(239,68,68,0.3)}
    .btn-danger:hover{background:rgba(239,68,68,0.08)}
    .btn:disabled{opacity:0.45;cursor:not-allowed;pointer-events:none}

    /* USER DROPDOWN */
    .user-menu{position:relative}
    .user-trigger{display:flex;align-items:center;gap:8px;background:var(--bg-elevated);border:1px solid var(--border-hi);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text)}
    .user-trigger:hover{border-color:var(--accent)}
    .user-avatar-sm{width:26px;height:26px;border-radius:50%;background:var(--accent);color:var(--bg-base);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
    .user-avatar-sm img{width:100%;height:100%;object-fit:cover}
    .dropdown-menu{position:absolute;right:0;top:calc(100% + 8px);background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:10px;min-width:180px;padding:6px;display:none;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
    .dropdown-menu.open{display:block}
    .dropdown-item{display:block;padding:9px 12px;border-radius:6px;font-size:13px;color:var(--text-dim);cursor:pointer;transition:background 0.14s,color 0.14s}
    .dropdown-item:hover{background:var(--bg-elevated);color:var(--text)}
    .dropdown-item.active{color:var(--accent)}
    .dropdown-sep{height:1px;background:var(--border);margin:4px 0}

    /* PAGE */
    main{flex:1;padding:40px 0 80px}
    .page-header{margin-bottom:28px}
    .page-header h1{font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
    .page-header p{font-size:14px;color:var(--text-dim)}

    /* TABS */
    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px}
    .tab-btn{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:10px 20px;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;color:var(--text-faint);cursor:pointer;transition:color 0.16s,border-color 0.16s;display:flex;align-items:center;gap:8px}
    .tab-btn:hover{color:var(--text)}
    .tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
    .tab-count{font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--bg-elevated);color:var(--text-faint)}
    .tab-count.has{background:rgba(25,195,125,0.12);color:var(--accent)}

    .tab-panel{display:none}
    .tab-panel.active{display:block}

    /* ORDER CARD */
    .order-list{display:flex;flex-direction:column;gap:14px}
    .order-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;display:flex;gap:16px;align-items:flex-start;transition:border-color 0.16s}
    .order-card:hover{border-color:var(--border-hi)}
    .order-game-icon{width:44px;height:44px;border-radius:10px;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .order-main{flex:1;min-width:0}
    .order-title{font-size:15px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .order-meta{font-size:12px;color:var(--text-faint);display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
    .order-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
    .order-amount{font-size:17px;font-weight:700;letter-spacing:-0.01em}
    .order-actions{display:flex;gap:8px}

    /* STATUS FILTER */
    .status-filter{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
    .sf-btn{padding:6px 16px;border-radius:999px;border:1px solid var(--border);background:transparent;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;color:var(--text-dim);cursor:pointer;transition:all 0.16s}
    .sf-btn:hover{border-color:var(--border-hi);color:var(--text)}
    .sf-btn.active{background:var(--bg-elevated);border-color:var(--border-hi);color:var(--text)}
    .ongoing-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--warning);margin-right:4px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

    /* STATUS BADGES */
    .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;letter-spacing:0.03em;text-transform:uppercase}
    .badge-pending  {background:rgba(245,185,71,0.12);color:var(--warning);border:1px solid rgba(245,185,71,0.25)}
    .badge-completed{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.25)}
    .badge-disputed {background:rgba(239,68,68,0.12);color:var(--danger);border:1px solid rgba(239,68,68,0.25)}
    .badge-refunded {background:rgba(107,119,111,0.15);color:var(--text-dim);border:1px solid var(--border-hi)}
    .badge-cancelled{background:rgba(107,119,111,0.15);color:var(--text-faint);border:1px solid var(--border)}
    .badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

    /* EMPTY STATE */
    .empty{text-align:center;padding:64px 24px;color:var(--text-faint)}
    .empty-icon{font-size:44px;margin-bottom:16px;opacity:0.5}
    .empty h3{font-size:17px;font-weight:600;color:var(--text-dim);margin-bottom:6px}
    .empty p{font-size:13px;line-height:1.6}

    /* DISPUTE MODAL */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:center;justify-content:center;padding:24px}
    .overlay.open{display:flex}
    .modal{background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:14px;width:100%;max-width:500px;padding:28px}
    .modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
    .modal-title{font-size:18px;font-weight:700}
    .modal-close{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:20px;line-height:1;padding:2px}
    .modal-close:hover{color:var(--text)}
    .modal-body{display:flex;flex-direction:column;gap:16px}
    .modal-field{display:flex;flex-direction:column;gap:6px}
    .modal-field label{font-size:13px;font-weight:500;color:var(--text-dim)}
    .modal-field textarea{background:var(--bg-elevated);border:1px solid var(--border-hi);border-radius:8px;color:var(--text);font-family:'Geist',sans-serif;font-size:14px;padding:10px 14px;outline:none;resize:vertical;min-height:120px;transition:border-color 0.16s}
    .modal-field textarea:focus{border-color:var(--accent)}
    .modal-field textarea::placeholder{color:var(--text-faint)}
    .modal-order-info{background:var(--bg-elevated);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text-dim)}
    .modal-order-info strong{color:var(--text)}
    .modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
    .btn-primary{background:var(--danger);color:#fff;border:none}
    .btn-primary:hover:not(:disabled){background:#dc2626}
    .modal-error{font-size:13px;color:var(--danger);display:none}
    .modal-success{font-size:13px;color:var(--success);display:none}

    /* SKELETON */
    .skeleton{background:var(--bg-elevated);border-radius:8px;animation:shimmer 1.4s infinite}
    @keyframes shimmer{0%,100%{opacity:0.6}50%{opacity:1}}
    @keyframes listingIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:600px){
      .order-card{flex-direction:column;gap:12px}
      .order-right{flex-direction:column;align-items:flex-start;width:100%;gap:10px}
      .order-amount{font-size:20px}
      .order-actions{display:flex;flex-wrap:wrap;gap:8px;width:100%}
      .order-actions .btn{flex:1;min-width:120px;justify-content:center;text-align:center}
    }
    @media(max-width:400px){
      .order-actions .btn{width:100%;flex:none}
    }
  </style>
</head>
<body>

<nav>
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="logo" style="display:flex;align-items:center;gap:8px;"><img src="/wallpaper/zx.png" alt="ZenLootX" style="height:32px;width:auto;"><span>Zen<span class="green">Loot</span>X</span></a>
      <div id="navActions" style="position:relative;"></div>
    </div>
  </div>
</nav>

<main>
  <div class="container">
    <div class="page-header">
      <h1>My Orders</h1>
      <p>Track your purchases and sales. File a dispute if something goes wrong.</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="purchases">
        Purchases <span class="tab-count" id="buyCount">—</span>
      </button>
      <button class="tab-btn" data-tab="sales">
        Sales <span class="tab-count" id="sellCount">—</span>
      </button>
      <button class="tab-btn" data-tab="disputes">
        Disputes <span class="tab-count" id="disputeCount">—</span>
      </button>
    </div>

    <div class="tab-panel active" id="tab-purchases">
      <div class="status-filter">
        <button class="sf-btn active" data-pfilter="ongoing"><span class="ongoing-dot"></span>Ongoing</button>
        <button class="sf-btn" data-pfilter="done">Completed</button>
      </div>
      <div class="order-list" id="purchaseList">
        <div class="skeleton" style="height:88px;border-radius:12px"></div>
        <div class="skeleton" style="height:88px;border-radius:12px"></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-sales">
      <div class="status-filter">
        <button class="sf-btn active" data-sfilter="ongoing"><span class="ongoing-dot"></span>Ongoing</button>
        <button class="sf-btn" data-sfilter="done">Completed</button>
      </div>
      <div class="order-list" id="saleList">
        <div class="skeleton" style="height:88px;border-radius:12px"></div>
        <div class="skeleton" style="height:88px;border-radius:12px"></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-disputes">
      <div class="order-list" id="disputeList">
        <div class="skeleton" style="height:88px;border-radius:12px"></div>
      </div>
    </div>
  </div>
</main>

<!-- LISTING DETAIL MODAL -->
<div id="listingModalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:600;align-items:flex-end;justify-content:center;" onclick="if(event.target===this)closeListingModal()">
  <div style="background:var(--bg-surface);border:1px solid var(--border-hi);border-radius:18px 18px 0 0;width:100%;max-width:540px;max-height:92dvh;overflow-y:auto;overflow-x:hidden;box-shadow:0 -8px 40px rgba(0,0,0,0.5);animation:listingIn 0.25s ease;">
    <div id="listingModalImg" style="width:100%;height:200px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border-radius:18px 18px 0 0;"></div>
    <div style="padding:20px 20px 28px;box-sizing:border-box;width:100%;overflow-x:hidden;">
      <div id="listingModalGame" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:6px;"></div>
      <div id="listingModalTitle" style="font-size:17px;font-weight:700;letter-spacing:-0.01em;margin-bottom:10px;color:var(--text);word-break:break-word;"></div>
      <div id="listingModalDesc" style="font-size:14px;color:var(--text-dim);line-height:1.65;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;"></div>
      <button onclick="closeListingModal()" style="margin-top:20px;width:100%;padding:13px;border-radius:10px;font-family:'Geist',sans-serif;font-size:14px;font-weight:600;cursor:pointer;background:var(--bg-elevated);color:var(--text);border:1px solid var(--border-hi);box-sizing:border-box;">Close</button>
    </div>
  </div>
</div>

<!-- DISPUTE MODAL -->
<div class="overlay" id="disputeOverlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">File a Dispute</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-order-info" id="modalOrderInfo"></div>
      <div class="modal-field">
        <label for="disputeReason">Describe the issue</label>
        <textarea id="disputeReason" placeholder="Explain what went wrong — e.g. account credentials were invalid, the seller is unresponsive, item was not as described…"></textarea>
      </div>
      <div class="modal-error"  id="modalError"></div>
      <div class="modal-success" id="modalSuccess"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
      <button class="btn btn-primary"   id="modalSubmitBtn">Submit Dispute</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/nav.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://msumlsqfergennhzxqon.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q'
  );

  const GAME_ICONS = { genshin: '⭐', mlbb: '⚔️', valorant: '🎯' };

  const STATUS_MAP = {
    holding:   { label: 'In Escrow',  cls: 'badge-pending'   },
    released:  { label: 'Completed',  cls: 'badge-completed' },
    disputed:  { label: 'Disputed',   cls: 'badge-disputed'  },
    refunded:  { label: 'Refunded',   cls: 'badge-refunded'  },
    cancelled: { label: 'Cancelled',  cls: 'badge-cancelled' },
  };

  const ONGOING  = ['holding', 'disputed'];
  const DONE     = ['released', 'refunded', 'cancelled'];

  let allPurchases = [], allSales = [];
  let pFilter = 'ongoing', sFilter = 'ongoing';
  let currentUserId = null;

  function formatDate(d) {
    return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  }
  function formatAmount(n) {
    return '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2 });
  }
  function statusBadge(status) {
    const s = STATUS_MAP[status] || { label: status || 'Unknown', cls: 'badge-cancelled' };
    return `<span class="badge ${s.cls}"><span class="badge-dot"></span>${s.label}</span>`;
  }
  function canDispute(order, role) {
    if (!['holding', 'released'].includes(order.escrow_status)) return false;
    // Buyers can always dispute their own purchases
    if (role === 'buyer') return true;
    // Sellers: block disputes against admin buyers
    if (order.buyer_profile?.is_admin) return false;
    return true;
  }
  function isOngoing(order) { return ONGOING.includes(order.escrow_status); }

  function filterOrders(orders, f) {
    if (f === 'ongoing') return orders.filter(o => isOngoing(o));
    if (f === 'done')    return orders.filter(o => DONE.includes(o.escrow_status));
    return orders;
  }

  function renderOrders(orders, role, containerId, filter) {
    const el       = document.getElementById(containerId);
    const filtered = filterOrders(orders, filter);
    const label    = filter === 'ongoing' ? 'ongoing ' : filter === 'done' ? 'completed ' : '';

    if (!filtered.length) {
      el.innerHTML = `
        <div class="empty">
          <div class="empty-icon">${role === 'buyer' ? '🛍️' : '🏷️'}</div>
          <h3>No ${label}${role === 'buyer' ? 'purchases' : 'sales'}</h3>
          <p>${filter === 'ongoing'
            ? (role === 'buyer' ? 'No active purchases right now.' : 'No active sales right now.')
            : (role === 'buyer' ? 'Accounts you buy will appear here.' : 'Accounts you sell will appear here.')}</p>
        </div>`;
      return;
    }

    el.innerHTML = filtered.map(o => {
      const listing    = o.listings || {};
      const game       = listing.game || '';
      const title      = listing.title || `Order #${o.id?.slice(0,8) || '—'}`;
      const otherId    = role === 'buyer' ? o.seller_id : o.buyer_id;
      const other      = role === 'buyer'
        ? (o.seller_profile?.username || 'Seller')
        : (o.buyer_profile?.username  || 'Buyer');
      const otherLabel = role === 'buyer' ? 'Seller' : 'Buyer';
      const icon       = GAME_ICONS[game] || '🎮';
      const ongoing    = isOngoing(o);

      const releaseBtn = (role === 'buyer' && o.escrow_status === 'holding')
        ? `<button class="btn" style="font-size:12px;padding:6px 12px;background:rgba(34,197,94,0.1);color:var(--success);border:1px solid rgba(34,197,94,0.3);" onclick="releaseFromOrder('${o.id}', this)">🔓 Release Payment</button>`
        : '';

      const listingId = o.listing_id || o.listings?.id || '';

      // Order timeline — shows for every order
      const _s = o.escrow_status;
      const _steps = _s === 'disputed' ? [
        { l:'Order placed',            d:true  },
        { l:'Payment in escrow',       d:true  },
        { l:'⚠️ Dispute under review', d:true, warn:true },
        { l:'Awaiting resolution',     d:false },
      ] : _s === 'refunded' ? [
        { l:'Order placed',       d:true },
        { l:'Dispute filed',      d:true },
        { l:'✅ Refunded to buyer', d:true },
      ] : _s === 'released' ? [
        { l:'Order placed',         d:true },
        { l:'Payment in escrow',    d:true },
        { l:'Delivery confirmed',   d:true },
        { l:'✅ Payment released',  d:true },
      ] : _s === 'cancelled' ? [
        { l:'Order placed', d:true },
        { l:'Cancelled',    d:true, warn:true },
      ] : [
        { l:'Order placed',                                                             d:true  },
        { l:'Payment in escrow',                                                        d:true  },
        { l: role === 'seller' ? 'Deliver to buyer' : 'Waiting for delivery',          d:false },
        { l: role === 'seller' ? 'Buyer releases payment' : 'Confirm & release',       d:false },
      ];
      const disputeTimeline = `
        <div style="margin-top:12px;padding:10px 12px;background:var(--bg-elevated);border-radius:8px;border:1px solid var(--border);overflow-x:auto;">
          <div style="display:flex;align-items:flex-start;gap:0;min-width:max-content;">
            ${_steps.map((s, i) => `
              <div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:64px;position:relative;">
                ${i < _steps.length - 1 ? `<div style="position:absolute;top:10px;left:50%;width:100%;height:2px;background:${s.d && _steps[i+1].d ? 'var(--accent)' : 'var(--border-hi)'};z-index:0;"></div>` : ''}
                <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${s.d ? (s.warn ? 'var(--warning)' : 'var(--accent)') : 'var(--border-hi)'};background:${s.d ? (s.warn ? 'rgba(245,185,71,0.12)' : 'var(--accent)') : 'var(--bg-base)'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${s.d && !s.warn ? 'var(--bg-base)' : (s.warn ? 'var(--warning)' : 'var(--text-faint)')};z-index:1;position:relative;">${s.d && !s.warn ? '✓' : ''}</div>
                <div style="font-size:10px;color:${s.d ? (s.warn ? 'var(--warning)' : 'var(--text-dim)') : 'var(--text-faint)'};text-align:center;margin-top:5px;line-height:1.3;padding:0 4px;">${s.l}</div>
              </div>`).join('')}
          </div>
        </div>`;

      return `
        <div class="order-card" id="ocard_${o.id}" style="${ongoing ? 'border-color:rgba(245,185,71,0.2);' : ''}">
          <div class="order-game-icon" style="cursor:${listingId ? 'pointer' : 'default'}" onclick="${listingId ? `openListingModal('${listingId}')` : ''}" title="${listingId ? 'View listing' : ''}">${icon}</div>
          <div class="order-main">
            <div class="order-title" style="cursor:${listingId ? 'pointer' : 'default'};${listingId ? 'text-decoration:underline;text-decoration-color:var(--border-hi);text-underline-offset:3px;' : ''}" onclick="${listingId ? `openListingModal('${listingId}')` : ''}">${title}</div>
            <div class="order-meta">
              <span>${otherLabel}: <strong style="color:var(--text-dim)">${other}</strong></span>
              <span>${formatDate(o.created_at)}</span>
              <span>${statusBadge(o.escrow_status)}</span>
            </div>
            ${disputeTimeline}
          </div>
          <div class="order-right">
            <div class="order-amount">${formatAmount(o.amount || 0)}</div>
            <div class="order-actions">
              ${listingId ? `<button class="btn btn-secondary" style="font-size:12px;padding:6px 12px;" onclick="openListingModal('${listingId}')">View Listing</button>` : ''}
              ${releaseBtn}
              ${canDispute(o, role) ? `<button class="btn btn-danger" style="font-size:12px;padding:6px 12px" onclick="openDispute('${o.id}', '${title.replace(/'/g,"\\'")}', '${formatAmount(o.amount || 0)}')">File a Dispute</button>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function releaseFromOrder(orderId, btn) {
    if (!await zConfirm('This confirms you received the account and cannot be undone.', { title: 'Release payment to seller?', confirmText: 'Release Payment' })) return;
    btn.disabled = true; btn.textContent = 'Releasing…';
    const { data: { session } } = await sb.auth.getSession();
    const res  = await fetch('/api/release-payment', {
      method: 'POST',
      headers: { Authorization: `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId }),
    });
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Failed. Please try again.', 'error'); btn.disabled = false; btn.textContent = '🔓 Release Payment'; return; }
    // Update card badge and remove button
    const card = document.getElementById(`ocard_${orderId}`);
    if (card) {
      card.style.borderColor = '';
      card.querySelector('.badge')?.outerHTML;
      const badgeEl = card.querySelector('.badge');
      if (badgeEl) badgeEl.outerHTML = `<span class="badge badge-completed"><span class="badge-dot"></span>Completed</span>`;
      btn.outerHTML = `<span style="font-size:12px;color:var(--success);">✓ Released</span>`;
    }
  }

  // Dispute modal
  let activeOrderId = null;

  function openDispute(orderId, title, amount) {
    activeOrderId = orderId;
    document.getElementById('modalOrderInfo').innerHTML =
      `Order: <strong>${title}</strong> — <strong>${amount}</strong>`;
    document.getElementById('disputeReason').value = '';
    document.getElementById('modalError').style.display   = 'none';
    document.getElementById('modalSuccess').style.display = 'none';
    document.getElementById('modalSubmitBtn').disabled    = false;
    document.getElementById('modalSubmitBtn').textContent = 'Submit Dispute';
    document.getElementById('disputeOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('disputeOverlay').classList.remove('open');
    activeOrderId = null;
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
  document.getElementById('disputeOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('disputeOverlay')) closeModal();
  });

  document.getElementById('modalSubmitBtn').addEventListener('click', async () => {
    const reason = document.getElementById('disputeReason').value.trim();
    const errEl  = document.getElementById('modalError');
    const okEl   = document.getElementById('modalSuccess');
    const btn    = document.getElementById('modalSubmitBtn');

    errEl.style.display = 'none';
    if (!reason) { errEl.textContent = 'Please describe the issue.'; errEl.style.display = 'block'; return; }
    if (!activeOrderId) return;

    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
      const { data: { session } } = await sb.auth.getSession();
      const res  = await fetch('/api/file-dispute', {
        method:  'POST',
        headers: { Authorization: `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
        body:    JSON.stringify({ orderId: activeOrderId, reason }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to submit dispute');

      okEl.textContent = 'Dispute submitted. Our team will review it shortly.';
      okEl.style.display = 'block';
      btn.textContent = 'Submitted';
      setTimeout(closeModal, 2500);
    } catch (e) {
      errEl.textContent = e.message || 'Failed to submit dispute. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Submit Dispute';
    }
  });

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });

  // Badge style for dispute count
  const style = document.createElement('style');
  style.textContent = '.tab-count.has{background:rgba(239,68,68,0.15);color:#F87171;}';
  document.head.appendChild(style);

  const DISPUTE_STATUS = {
    open:     { label:'Under Review', cls:'badge-disputed',  icon:'⚖️' },
    resolved: { label:'Resolved',     cls:'badge-completed', icon:'✅' },
  };

  async function loadDisputes(userId) {
    const { data: disputes } = await sb
      .from('disputes')
      .select('id,order_id,reason,status,created_at,orders(amount,listings(title,game))')
      .eq('filed_by', userId)
      .order('created_at', { ascending: false });

    const list  = document.getElementById('disputeList');
    const count = document.getElementById('disputeCount');
    const open  = (disputes || []).filter(d => d.status === 'open').length;
    if (count) { count.textContent = open || (disputes||[]).length; if (open) count.classList.add('has'); }

    if (!disputes?.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚖️</div>
          <h3>No disputes</h3>
          <p>Any disputes you file will appear here with their current status.</p>
        </div>`;
      return;
    }

    const GAME_ICONS = { genshin:'⭐', mlbb:'⚔️', valorant:'🎯' };
    list.innerHTML = disputes.map(d => {
      const s = DISPUTE_STATUS[d.status] || DISPUTE_STATUS.open;
      const title = d.orders?.listings?.title || `Order #${d.order_id?.slice(0,8)}`;
      const amount = d.orders?.amount ? '₱' + Number(d.orders.amount).toLocaleString('en-PH', { minimumFractionDigits:2 }) : '';
      const icon = GAME_ICONS[d.orders?.listings?.game] || '🎮';
      const date = new Date(d.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
      const reasonMap = {
        fraud:'Fraud / Scam', wrong_listing:'Wrong listing', communication:'Communication',
        harassment:'Harassment', other:'Other reason',
      };
      return `
        <div class="order-card" style="${d.status === 'open' ? 'border-color:rgba(239,68,68,0.2);' : ''}">
          <div class="order-game-icon">${icon}</div>
          <div class="order-main">
            <div class="order-title">${title}</div>
            <div class="order-meta">
              <span>Reason: <strong style="color:var(--text-dim)">${reasonMap[d.reason] || d.reason || '—'}</strong></span>
              ${amount ? `<span>${amount}</span>` : ''}
              <span>${date}</span>
              <span><span class="badge ${s.cls}"><span class="badge-dot"></span>${s.label}</span></span>
            </div>
            ${d.status === 'open' ? `
              <div style="margin-top:10px;padding:10px 12px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:8px;font-size:12px;color:#F87171;line-height:1.5;">
                ⚖️ <strong>Under review</strong> — Our team is reviewing your dispute. You'll be notified once a decision is made. This typically takes 1–3 business days.
              </div>` : `
              <div style="margin-top:10px;padding:10px 12px;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);border-radius:8px;font-size:12px;color:var(--success);line-height:1.5;">
                ✅ <strong>Resolved</strong> — This dispute has been reviewed and resolved by our team.
              </div>`}
          </div>
        </div>`;
    }).join('');
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/login'; return; }

    const userId = session.user.id;
    currentUserId = userId;
    await initNav(session.user);

    // Fetch via service-key API (bypasses RLS issues)
    const ordRes  = await fetch('/api/my-orders', {
      headers: { Authorization: `Bearer ${session.access_token}` },
    });

    if (!ordRes.ok) {
      const err = await ordRes.json().catch(() => ({}));
      console.error('Orders API error:', err);
      document.getElementById('purchaseList').innerHTML = `
        <div class="empty" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:12px;padding:28px;">
          <div style="font-size:13px;color:var(--danger);font-weight:600;margin-bottom:6px;">Could not load orders</div>
          <div style="font-size:12px;color:var(--text-faint);">${err.error || 'Unknown error'}</div>
        </div>`;
      document.getElementById('saleList').innerHTML = '';
      return;
    }

    const ordData = await ordRes.json();
    const purchases = ordData.purchases || [];
    const sales     = ordData.sales     || [];

    allPurchases = purchases || [];
    allSales     = sales     || [];

    const ongoingBuy  = allPurchases.filter(o => isOngoing(o)).length;
    const ongoingSell = allSales.filter(o => isOngoing(o)).length;

    const buyCountEl  = document.getElementById('buyCount');
    const sellCountEl = document.getElementById('sellCount');
    buyCountEl.textContent  = ongoingBuy  || allPurchases.length;
    sellCountEl.textContent = ongoingSell || allSales.length;
    if (ongoingBuy)  buyCountEl.classList.add('has');
    if (ongoingSell) sellCountEl.classList.add('has');

    renderOrders(allPurchases, 'buyer',  'purchaseList', pFilter);
    renderOrders(allSales,     'seller', 'saleList',     sFilter);
    loadDisputes(userId);

    // Filter buttons — purchases
    document.querySelectorAll('[data-pfilter]').forEach(btn => {
      btn.addEventListener('click', () => {
        pFilter = btn.dataset.pfilter;
        document.querySelectorAll('[data-pfilter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderOrders(allPurchases, 'buyer', 'purchaseList', pFilter);
      });
    });

    // Filter buttons — sales
    document.querySelectorAll('[data-sfilter]').forEach(btn => {
      btn.addEventListener('click', () => {
        sFilter = btn.dataset.sfilter;
        document.querySelectorAll('[data-sfilter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderOrders(allSales, 'seller', 'saleList', sFilter);
      });
    });
  }

  // ── Listing Detail Modal ──────────────────────────────────────
  const GAME_LABELS = { genshin:'Genshin Impact', mlbb:'Mobile Legends', valorant:'Valorant' };

  async function openListingModal(listingId) {
    const overlay = document.getElementById('listingModalOverlay');
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    // Reset to loading state
    document.getElementById('listingModalGame').textContent  = '';
    document.getElementById('listingModalTitle').textContent = 'Loading…';
    document.getElementById('listingModalDesc').textContent  = '';
    document.getElementById('listingModalImg').innerHTML     = '';

    const { data, error } = await sb
      .from('listings')
      .select('title, description, images, game')
      .eq('id', listingId)
      .maybeSingle();

    if (error || !data) {
      document.getElementById('listingModalTitle').textContent = 'Could not load listing.';
      return;
    }

    document.getElementById('listingModalGame').textContent  = GAME_LABELS[data.game] || data.game || '';
    document.getElementById('listingModalTitle').textContent = data.title || 'Untitled';
    document.getElementById('listingModalDesc').textContent  = data.description || 'No description provided.';

    const imgs   = Array.isArray(data.images) ? data.images : [];
    const first  = imgs[0];
    const imgUrl = typeof first === 'string' ? first : (first?.url || first?.src || null);
    const imgEl  = document.getElementById('listingModalImg');

    if (imgUrl) {
      imgEl.innerHTML = `<img src="${imgUrl}" alt="${String(data.title||'').replace(/"/g,'&quot;')}" style="width:100%;height:100%;object-fit:cover;">`;
    } else {
      imgEl.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text-faint);">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="40" height="40"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
        <span style="font-size:12px;">No image</span>
      </div>`;
    }
  }

  function closeListingModal() {
    document.getElementById('listingModalOverlay').style.display = 'none';
    document.body.style.overflow = '';
  }

  init();
</script>

</body>
</html>
