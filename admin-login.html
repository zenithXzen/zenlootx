<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:     #0A0E0C;
      --bg-surface:  #121814;
      --bg-elevated: #1A211C;
      --border:      #232B26;
      --border-hi:   #33403A;
      --accent:      #19C37D;
      --text:        #E8EDE9;
      --text-dim:    #9BA8A0;
      --text-faint:  #6B776F;
      --danger:      #EF4444;
      --danger-dim:  rgba(239,68,68,0.12);
      --danger-border: rgba(239,68,68,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; color: inherit; }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .logo .green { color: var(--accent); }
    .back-link { font-size: 13px; color: var(--text-faint); transition: color 0.16s; }
    .back-link:hover { color: var(--text-dim); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card { width: 100%; max-width: 400px; }

    .card-header { text-align: center; margin-bottom: 28px; }

    .admin-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      background: var(--danger-dim);
      color: #F87171;
      border: 1px solid var(--danger-border);
      border-radius: 999px;
      padding: 4px 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .card-header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .card-header p { font-size: 13px; color: var(--text-faint); }

    .form {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; font-weight: 500; color: var(--text-dim); }

    input {
      background: var(--bg-elevated);
      border: 1px solid var(--border-hi);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.16s;
      width: 100%;
    }
    input:focus { border-color: rgba(239,68,68,0.5); }
    input::placeholder { color: var(--text-faint); }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
    }
    .pw-toggle:hover { color: var(--text-dim); }

    .btn-submit {
      background: var(--danger);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 11px;
      transition: opacity 0.16s;
      width: 100%;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    .error-box {
      display: none;
      background: var(--danger-dim);
      border: 1px solid var(--danger-border);
      border-radius: 8px;
      color: #F87171;
      font-size: 13px;
      padding: 10px 14px;
      text-align: center;
    }
    .error-box.visible { display: block; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    .restricted-note {
      font-size: 12px;
      color: var(--text-faint);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">Zen<span class="green">Loot</span>X</a>
    <a href="/" class="back-link">← Back to site</a>
  </nav>

  <main>
    <div class="card">
      <div class="card-header">
        <div class="admin-badge">Admin Access</div>
        <h1>Admin Login</h1>
        <p>This area is restricted to authorized staff only.</p>
      </div>

      <div class="form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@example.com" autocomplete="username" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password">
              <svg id="iconShow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <svg id="iconHide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
            </button>
          </div>
        </div>

        <div class="error-box" id="errorBox"></div>

        <button class="btn-submit" id="submitBtn">Sign in to Admin</button>

        <hr class="divider">

        <p class="restricted-note">Unauthorized access attempts are logged.</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://msumlsqfergennhzxqon.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q'
    );

    // If already signed in as admin, skip the form
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session?.user?.app_metadata?.is_admin) {
        window.location.replace('/admin');
      }
    })();

    // Password toggle
    const pwInput  = document.getElementById('password');
    const iconShow = document.getElementById('iconShow');
    const iconHide = document.getElementById('iconHide');
    document.getElementById('pwToggle').addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      iconShow.style.display = isText ? '' : 'none';
      iconHide.style.display = isText ? 'none' : '';
    });

    // Form submit
    const emailInput = document.getElementById('email');
    const submitBtn  = document.getElementById('submitBtn');
    const errorBox   = document.getElementById('errorBox');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
    }
    function clearError() {
      errorBox.classList.remove('visible');
    }

    async function handleLogin() {
      const email    = emailInput.value.trim();
      const password = pwInput.value;

      clearError();

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          showError('Invalid email or password.');
          return;
        }

        if (!data.user?.app_metadata?.is_admin) {
          // Sign them back out — not an admin account
          await sb.auth.signOut();
          showError('This account does not have admin access.');
          return;
        }

        window.location.replace('/admin');

      } catch {
        showError('Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in to Admin';
      }
    }

    submitBtn.addEventListener('click', handleLogin);
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>
