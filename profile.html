<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/wallpaper/zx-icon-square.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:     #0A0E0C;
      --bg-surface:  #121814;
      --bg-elevated: #1A211C;
      --border:      #232B26;
      --border-hi:   #33403A;
      --accent:      #19C37D;
      --accent-hover:#2FD98F;
      --accent-glow: rgba(25,195,125,0.15);
      --text:        #E8EDE9;
      --text-dim:    #9BA8A0;
      --text-faint:  #6B776F;
      --danger:      #EF4444;
      --warning:     #F5B947;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    nav {
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border);
      background: rgba(10,14,12,0.88);
      backdrop-filter: blur(14px);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; gap: 24px;
    }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; flex-shrink: 0; }
    .logo .green { color: var(--accent); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 8px;
      font-family: 'Geist', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent; transition: all 0.18s;
      text-decoration: none; white-space: nowrap;
    }
    .btn-primary  { background: var(--accent); color: var(--bg-base); border-color: var(--accent); }
    .btn-primary:hover  { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-secondary { background: transparent; color: var(--text); border-color: var(--border-hi); }
    .btn-secondary:hover { background: var(--bg-elevated); }

    .btn-ghost {
      background: none; border: none; color: var(--text-faint);
      font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; padding: 5px 10px; border-radius: 6px;
      transition: color 0.16s, background 0.16s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-ghost:hover { color: var(--text-dim); background: var(--bg-elevated); }

    main { flex: 1; padding: 48px 0; }

    /* PROFILE HEADER */
    .profile-header {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      display: flex;
      gap: 28px;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    .profile-avatar {
      width: 96px; height: 96px; flex-shrink: 0;
      border-radius: 50%;
      background: var(--accent-glow);
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 700; color: var(--accent);
      overflow: hidden;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .profile-body { flex: 1; min-width: 0; }
    .username-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 3px; }
    .username-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .profile-username { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
    .profile-since { font-size: 13px; color: var(--text-faint); margin-bottom: 18px; }

    .profile-stats { display: flex; gap: 28px; margin-bottom: 20px; align-items: flex-end; }
    .stat-num   { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-label { font-size: 12px; color: var(--text-faint); margin-top: 3px; }

    /* TIER TROPHY */
    .tier-trophy {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 8px 16px 8px 10px; border-radius: 12px;
      border: 1px solid transparent; margin-left: 8px;
    }
    .tier-trophy svg { width: 36px; height: 36px; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
    .tier-trophy-info { display: flex; flex-direction: column; line-height: 1.2; }
    .tier-trophy-num  { font-size: 15px; font-weight: 800; letter-spacing: 0.04em; }
    .tier-trophy-name { font-size: 11px; font-weight: 500; opacity: 0.75; }

    .tt-1  { background:linear-gradient(135deg,#2D3139,#3D4451);border-color:#4B5563;color:#9CA3AF }
    .tt-2  { background:linear-gradient(135deg,#1F2937,#374151);border-color:#4B5563;color:#D1D5DB }
    .tt-3  { background:linear-gradient(135deg,#431407,#78350F);border-color:#92400E;color:#FCD34D }
    .tt-4  { background:linear-gradient(135deg,#374151,#6B7280);border-color:#9CA3AF;color:#F3F4F6 }
    .tt-5  { background:linear-gradient(135deg,#713F12,#92400E);border-color:#D97706;color:#FDE68A }
    .tt-6  { background:linear-gradient(135deg,#0C4A6E,#075985);border-color:#0EA5E9;color:#BAE6FD }
    .tt-7  { background:linear-gradient(135deg,#064E3B,#065F46);border-color:#059669;color:#6EE7B7 }
    .tt-8  { background:linear-gradient(135deg,#1E3A8A,#1D4ED8);border-color:#3B82F6;color:#BFDBFE }
    .tt-9  { background:linear-gradient(135deg,#881337,#9F1239);border-color:#E11D48;color:#FDA4AF }
    .tt-10 {
      background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
      border-color:transparent;color:#fff;
      animation:diamondShift 4s ease infinite;background-size:200% 200%;position:relative;overflow:hidden;
    }
    .tt-10::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);animation:shimmer 2.5s infinite}
    @keyframes diamondShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

    .bio-display { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
    .bio-text        { font-size: 14px; color: var(--text-dim); line-height: 1.65; }
    .bio-placeholder { font-size: 14px; color: var(--text-faint); font-style: italic; }

    .bio-edit-area { display: none; flex-direction: column; gap: 10px; margin-top: 2px; }
    .bio-edit-area.open { display: flex; }

    textarea.bio-input {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      resize: vertical;
      min-height: 80px;
      width: 100%;
      max-width: 560px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    textarea.bio-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .bio-actions { display: flex; align-items: center; gap: 10px; }
    .bio-char    { font-size: 12px; color: var(--text-faint); margin-left: auto; }

    /* FILTER BAR */
    .filter-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .filter-label { font-size: 13px; color: var(--text-faint); }
    select.game-filter {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 12px;
      font-family: 'Geist', sans-serif; font-size: 13px; color: var(--text-dim);
      cursor: pointer; outline: none; transition: border-color 0.18s;
    }
    select.game-filter:focus { border-color: var(--accent); }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .tab {
      background: none; border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 11px 20px;
      font-family: 'Geist', sans-serif; font-size: 14px; font-weight: 500;
      color: var(--text-dim); cursor: pointer;
      transition: color 0.16s, border-color 0.16s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* LISTING CARDS */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .listing-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s, transform 0.18s;
      display: flex; flex-direction: column;
    }
    .listing-card:hover {
      border-color: var(--border-hi); background: var(--bg-elevated);
      box-shadow: 0 0 28px var(--accent-glow); transform: translateY(-2px);
    }
    .listing-card a { display: flex; flex-direction: column; flex: 1; text-decoration: none; color: inherit; }
    .card-img { height: 160px; background: var(--bg-elevated); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; }
    .card-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
    .pill-account { background: rgba(25,195,125,0.1); color: var(--accent); }
    .pill-items   { background: rgba(168,85,247,0.1); color: #C084FC; }
    .pill-topup   { background: rgba(245,185,71,0.08); color: #FBBF24; }
    .game-tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; }
    .tag-genshin  { background: rgba(245,185,71,0.12); color: #F5B947; }
    .tag-mlbb     { background: rgba(59,130,246,0.12); color: #60A5FA; }
    .tag-valorant { background: rgba(239,68,68,0.12); color: #F87171; }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: auto; padding-bottom: 14px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); margin-top: auto; }
    .card-price { font-size: 20px; font-weight: 700; }

    /* CARD MENU */
    .card-menu-btn { position:absolute;top:8px;right:8px;z-index:2;width:28px;height:28px;border-radius:6px;background:rgba(10,14,12,0.72);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.1);color:var(--text-dim);font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.16s,border-color 0.16s;font-family:'Geist',sans-serif;letter-spacing:0.05em; }
    .card-menu-btn:hover { background:rgba(10,14,12,0.9);border-color:var(--border-hi);color:var(--text); }
    #cardMenuDropdown { position:fixed;background:var(--bg-elevated);border:1px solid var(--border-hi);border-radius:10px;padding:5px;min-width:168px;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:9990; }
    .card-menu-item { display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-dim);cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:'Geist',sans-serif;transition:background 0.14s,color 0.14s; }
    .card-menu-item:hover { background:var(--bg-surface);color:var(--text); }
    .card-menu-item.danger { color:#F87171; }
    .card-menu-item.danger:hover { background:rgba(239,68,68,0.08);color:#F87171; }
    .card-menu-sep { height:1px;background:var(--border);margin:4px 0; }

    /* EDIT MODAL */
    .edit-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:9998;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px); }
    .edit-modal { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:100%;max-width:440px;box-shadow:0 16px 48px rgba(0,0,0,0.6); }
    .edit-modal h3 { font-size:16px;font-weight:700;margin-bottom:20px;letter-spacing:-0.01em; }
    .edit-field { margin-bottom:16px; }
    .edit-field label { display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px;letter-spacing:0.03em;text-transform:uppercase; }
    .edit-field input, .edit-field textarea, .edit-field select { width:100%;background:var(--bg-elevated);border:1px solid var(--border-hi);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;box-sizing:border-box;transition:border-color 0.18s; }
    .edit-field input:focus, .edit-field textarea:focus, .edit-field select:focus { border-color:var(--accent); }
    .edit-field textarea { resize:vertical;min-height:80px;line-height:1.5; }
    .edit-field select option { background:var(--bg-elevated); }
    .edit-price-row { display:grid;grid-template-columns:1fr 100px;gap:10px; }
    .edit-actions { display:flex;gap:10px;justify-content:flex-end;margin-top:24px; }
    .edit-err { font-size:13px;color:var(--danger);margin-top:12px;display:none; }

    /* LIVE TAG */
    .live-tag { position:absolute;top:10px;left:10px;z-index:3;background:rgba(25,195,125,0.18);backdrop-filter:blur(6px);border:1px solid rgba(25,195,125,0.35);color:#19C37D;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;border-radius:999px;pointer-events:none;display:flex;align-items:center;gap:5px; }
    .live-tag::before { content:'';width:5px;height:5px;border-radius:50%;background:#19C37D;animation:live-pulse 1.8s ease-in-out infinite; }
    @keyframes live-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.45;transform:scale(0.75)} }

    /* EMPTY STATE */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: 64px 24px; background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 12px;
    }
    .empty-icon { width: 56px; height: 56px; border-radius: 14px; background: var(--bg-elevated); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 20px; }
    .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; color: var(--text-dim); max-width: 340px; line-height: 1.65; }

    /* SKELETON */
    .skeleton { background: var(--bg-elevated); border-radius: 6px; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* NAV DROPDOWN */
    .user-menu { position: relative; }
    .user-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-elevated); border: 1px solid var(--border-hi);
      border-radius: 8px; padding: 8px 14px; cursor: pointer;
      font-family: 'Geist', sans-serif; font-size: 14px; font-weight: 500;
      color: var(--text); transition: border-color 0.18s;
    }
    .user-btn:hover { border-color: var(--accent); }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent-glow); border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .user-dropdown {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 10px; min-width: 200px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 200;
    }
    .user-dropdown.open { display: block; }
    .dropdown-email { padding: 12px 16px; font-size: 12px; color: var(--text-faint); border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dropdown-item {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 16px; font-size: 14px; color: var(--text-dim); cursor: pointer;
      transition: background 0.16s, color 0.16s;
      text-decoration: none; width: 100%; background: none; border: none;
      font-family: 'Geist', sans-serif; text-align: left;
    }
    .dropdown-item:hover { background: var(--bg-elevated); color: var(--text); }
    .dropdown-item.danger { color: var(--danger); }
    .dropdown-item.danger:hover { background: rgba(239,68,68,0.08); }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }
    .dropdown-item svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 20px 0; }
    .footer-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .footer-inner p, .footer-inner a { font-size: 13px; color: var(--text-faint); }
    .footer-inner a:hover { color: var(--text-dim); }

    @media (max-width: 768px) {
      .profile-header { flex-direction: column; align-items: center; text-align: center; }
      .username-row   { justify-content: center; }
      .profile-stats  { justify-content: center; }
      .bio-display    { align-items: center; }
      .listings-grid  { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
      .listings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <a href="/" class="logo" style="display:flex;align-items:center;gap:8px;"><img src="/wallpaper/wow-logo-transparent.png" alt="ZenLootX" style="height:48px;width:auto;"></a>
        <div id="navActions"></div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">

      <!-- Profile header -->
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-body">
          <div class="username-row">
            <div class="username-left">
              <div class="profile-username" id="profileUsername">—</div>
              <span id="profileRating" style="font-size:14px;color:var(--warning);font-weight:600;"></span>
            </div>
          </div>
          <div class="profile-since" id="profileSince">—</div>

          <div class="profile-stats">
            <div>
              <div class="stat-num"   id="statListings">—</div>
              <div class="stat-label">Listings</div>
            </div>
            <div>
              <div class="stat-num"   id="statReviews">—</div>
              <div class="stat-label">Reviews</div>
            </div>
            <div id="tierStatWrap" style="display:none;">
              <div class="stat-num" id="tierStatLabel" style="font-size:14px;"></div>
              <div class="stat-label">Tier</div>
            </div>
          </div>

          <!-- Bio -->
          <div class="bio-display" id="bioDisplay">
            <span id="bioText" class="bio-placeholder">No bio yet. Tell us about yourself.</span>
            <button class="btn-ghost" id="editBioBtn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="13" height="13">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828A2 2 0 0110 16H8v-2a2 2 0 01.586-1.414z"/>
              </svg>
              Edit bio
            </button>
          </div>

          <div class="bio-edit-area" id="bioEditArea">
            <textarea class="bio-input" id="bioInput" placeholder="Tell us about yourself…" maxlength="200"></textarea>
            <div class="bio-actions">
              <button class="btn btn-primary"   id="saveBioBtn"   style="padding:7px 16px;font-size:13px;">Save</button>
              <button class="btn btn-secondary" id="cancelBioBtn" style="padding:7px 14px;font-size:13px;">Cancel</button>
              <span class="bio-char" id="bioChar">0 / 200</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="listings">Listings</button>
        <button class="tab"        data-tab="reviews">Reviews</button>
      </div>

      <!-- Listings panel -->
      <div id="panelListings">
        <div id="filterBar" style="display:none;margin-bottom:20px;"></div>
        <div id="listingsWrap"></div>
      </div>

      <!-- Reviews panel -->
      <div id="panelReviews" hidden>
        <div id="reviewsWrap"></div>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <p>© 2026 ZenLootX</p>
        <div style="display:flex;gap:20px;">
          <a href="/terms">Terms</a>
          <a href="/privacy">Privacy</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/nav.js?v=9"></script>
  <script>
    const SUPABASE_URL = 'https://msumlsqfergennhzxqon.supabase.co';

        avatarEl.textContent = username.charAt(0).toUpperCase();

    // ── Reviews ──
    async function loadReviews(userId) {
      const wrap = document.getElementById('reviewsWrap');
      if (!wrap) return;

      const { data: reviews } = await sb
        .from('reviews')
        .select('rating,comment,created_at,reviewer_id')
        .eq('reviewee_id', userId)
        .order('created_at', { ascending: false });

      if (!reviews?.length) {
        wrap.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">★</div>
            <h3>No reviews yet</h3>
            <p>Reviews from completed trades will appear here.</p>
          </div>`;
        updateReviewTab(0, 0);
        return;
      }

      // Load reviewer profiles
      const rIds = [...new Set(reviews.map(r => r.reviewer_id))];
      const { data: profiles } = await sb.from('profiles').select('id,username,avatar_url').in('id', rIds);
      const pMap = Object.fromEntries((profiles || []).map(p => [p.id, p]));

      const avg = (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1);
      const ratingEl  = document.getElementById('profileRating');
      const countEl   = document.getElementById('statReviews');
      if (ratingEl) ratingEl.textContent = `★ ${avg}`;
      if (countEl)  countEl.textContent  = reviews.length;
      updateReviewTab(reviews.length, avg);

      wrap.innerHTML = `
        <div style="display:flex;align-items:center;gap:16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:20px;">
          <div style="font-size:48px;font-weight:700;letter-spacing:-0.03em;color:var(--warning);">${avg}</div>
          <div>
            <div style="font-size:18px;color:var(--warning);">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))}</div>
            <div style="font-size:13px;color:var(--text-faint);margin-top:4px;">${reviews.length} review${reviews.length!==1?'s':''}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px;">
          ${reviews.map(r => {
            const p     = pMap[r.reviewer_id] || {};
            const name  = p.username || 'Anonymous';
            const init  = name.charAt(0).toUpperCase();
            const av    = p.avatar_url ? `<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : init;
            const date  = new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
            const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
            return `
              <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                  <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden;">${av}</div>
                  <div style="flex:1;">
                    <div style="font-size:14px;font-weight:600;">${name}</div>
                    <div style="font-size:12px;color:var(--text-faint);">${date}</div>
                  </div>
                  <div style="font-size:16px;color:var(--warning);">${stars}</div>
                </div>
                ${r.comment ? `<p style="font-size:14px;color:var(--text-dim);line-height:1.65;">${sanitize(r.comment)}</p>` : ''}
              </div>`;
          }).join('')}
        </div>`;
    }

    function updateReviewTab(count, avg) {
      const tab = document.querySelector('[data-tab="reviews"]');
      if (!tab) return;
      tab.textContent = count ? `Reviews (${count} · ★${avg})` : 'Reviews';
    }

    function subscribeReviews(userId) {
      sb.channel('profile-reviews')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reviews', filter: `reviewee_id=eq.${userId}` }, () => {
          loadReviews(userId);
        })
        .subscribe();
    }

    // ── Tabs ──
    function initTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const target = tab.dataset.tab;
          document.getElementById('panelListings').hidden = target !== 'listings';
          document.getElementById('panelReviews').hidden  = target !== 'reviews';
        });
      });
    }

    // ── Bio display ──
    function renderBio(bio) {
      const el = document.getElementById('bioText');
      if (bio) {
        el.textContent = bio;
        el.className   = 'bio-text';
      } else {
        el.textContent = 'No bio yet. Tell us about yourself.';
        el.className   = 'bio-placeholder';
      }
    }

    function initBioEdit(user) {
      const display   = document.getElementById('bioDisplay');
      const editArea  = document.getElementById('bioEditArea');
      const bioInput  = document.getElementById('bioInput');
      const charEl    = document.getElementById('bioChar');
      const editBtn   = document.getElementById('editBioBtn');
      const saveBtn   = document.getElementById('saveBioBtn');
      const cancelBtn = document.getElementById('cancelBioBtn');

      editBtn.addEventListener('click', () => {
        bioInput.value     = user.user_metadata?.bio || '';
        charEl.textContent = `${bioInput.value.length} / 200`;
        charEl.style.color = '';
        display.style.display  = 'none';
        editArea.classList.add('open');
        bioInput.focus();
      });

      bioInput.addEventListener('input', () => {
        charEl.textContent = `${bioInput.value.length} / 200`;
      });

      cancelBtn.addEventListener('click', () => {
        editArea.classList.remove('open');
        display.style.display = '';
      });

      saveBtn.addEventListener('click', async () => {
        const newBio = bioInput.value.trim();
        saveBtn.disabled    = true;
        saveBtn.textContent = 'Saving…';

        const { error } = await sb.auth.updateUser({ data: { bio: newBio } });

        // Also sync bio to profiles table so public profile shows it
        if (!error) {
          await sb.from('profiles').update({ bio: newBio }).eq('id', user.id);
        }

        saveBtn.disabled    = false;
        saveBtn.textContent = 'Save';

        if (error) {
          charEl.textContent = 'Failed to save. Try again.';
          charEl.style.color = 'var(--danger)';
          return;
        }

        user.user_metadata.bio = newBio;
        renderBio(newBio);
        editArea.classList.remove('open');
        display.style.display = '';
      });
    }

    // ── Listings ──
    const GAME_META = {
      genshin:  { cls: 'tag-genshin',  label: 'Genshin' },
      mlbb:     { cls: 'tag-mlbb',     label: 'MLBB' },
      valorant: { cls: 'tag-valorant', label: 'Valorant' },
    };
    const TYPE_META = {
      account: ['pill-account', 'Account'],
      items:   ['pill-items',   'Items'],
      topup:   ['pill-topup',   'Top-up'],
    };

    function listingCard(l) {
      const img   = Array.isArray(l.images) && l.images[0]
        ? `<img src="${l.images[0]}" alt="${l.title}" loading="lazy">`
        : `<span>🎮</span>`;
      const price  = new Intl.NumberFormat('en-US', { style: 'currency', currency: l.currency || 'USD', minimumFractionDigits: 0 }).format(l.price);
      const gt     = GAME_META[l.game] || { cls: '', label: l.game };
      const [pc, pl] = TYPE_META[l.type] || ['', l.type];
      return `
        <div class="listing-card" id="lcard_${l.id}" style="position:relative;">
          <button class="card-menu-btn" onclick="openCardMenu('${l.id}',event)" title="Listing options">···</button>
          <span class="live-tag">Live</span>
          <a href="/listings/detail?id=${l.id}">
            <div class="card-img">${img}</div>
            <div class="card-body">
              <div class="card-tags">
                <span class="game-tag ${gt.cls}">${gt.label}</span>
                <span class="pill ${pc}">${pl}</span>
              </div>
              <div class="card-title">${l.title}</div>
              <div class="card-footer">
                <div class="card-price">${price}</div>
              </div>
            </div>
          </a>
        </div>`;
    }

    let allListings = [];
    let activeMenuId = null;

    // ── Card dropdown ──
    function openCardMenu(id, e) {
      e.stopPropagation();
      e.preventDefault();
      const dropdown = document.getElementById('cardMenuDropdown');

      // Toggle off if same card
      if (activeMenuId === id && dropdown.style.display !== 'none') {
        closeCardMenu(); return;
      }

      activeMenuId = id;
      const listing = allListings.find(l => l.id === id);

      dropdown.innerHTML = `
        <button class="card-menu-item" onclick="openEditModal('${id}');closeCardMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Z"/></svg>
          Edit listing
        </button>
        <div class="card-menu-sep"></div>
        <button class="card-menu-item danger" onclick="deleteListingAction('${id}');closeCardMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
          Delete listing
        </button>`;

      // Position near the button
      const btn  = document.querySelector(`#lcard_${id} .card-menu-btn`);
      const rect = btn.getBoundingClientRect();
      dropdown.style.display = 'block';
      const dw = dropdown.offsetWidth;
      let left = rect.right - dw;
      let top  = rect.bottom + 6;
      if (left < 8) left = 8;
      if (top + dropdown.offsetHeight > window.innerHeight - 8) top = rect.top - dropdown.offsetHeight - 6;
      dropdown.style.left = left + 'px';
      dropdown.style.top  = top  + 'px';
    }

    function closeCardMenu() {
      document.getElementById('cardMenuDropdown').style.display = 'none';
      activeMenuId = null;
    }

    document.addEventListener('click', e => {
      const dd = document.getElementById('cardMenuDropdown');
      if (dd && dd.style.display !== 'none' && !dd.contains(e.target)) closeCardMenu();
    });

    // ── Delete listing ──
    async function deleteListingAction(listingId) {
      if (!await zConfirm('This listing will be permanently removed. This cannot be undone.', { title: 'Delete listing?', confirmText: 'Delete', confirmDanger: true })) return;
      try {
        const { data: { session } } = await sb.auth.getSession();
        const res  = await fetch('/api/delist-listing', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({ listingId, action: 'delete' }),
        });
        const data = await res.json();
        if (!res.ok) { toast(data.error || 'Failed.', 'error'); return; }
        document.getElementById(`lcard_${listingId}`)?.remove();
        allListings = allListings.filter(l => l.id !== listingId);
        const tab = document.querySelector('[data-tab="listings"]');
        if (tab) tab.textContent = `Listings (${allListings.length})`;
        if (!allListings.length) {
          document.getElementById('listingsWrap').innerHTML = `<div class="empty-state"><div class="empty-icon">🏷️</div><h3>No active listings</h3><p>List your first account or item to start selling.</p><a href="/create-listing" class="btn btn-primary" style="margin-top:16px;">Create listing</a></div>`;
        }
        toast('Listing deleted.', 'success');
      } catch { toast('Something went wrong. Please try again.', 'error'); }
    }

    // ── Edit modal ──
    let editingListingId = null;

    const EDIT_ATTR_DEFS = {
      genshin: [
        { key:'ar_level',         label:'Adventure Rank',       type:'number', placeholder:'e.g. 60' },
        { key:'server',           label:'Server',               type:'select', options:['Asia','America','Europe','TW/HK/MO'] },
        { key:'five_star_count',  label:'Total 5★ Characters',  type:'number', placeholder:'e.g. 12' },
        { key:'genesis_crystals', label:'Genesis Crystals',     type:'number', placeholder:'0' },
        { key:'welkin_moon',      label:'Welkin Moon',          type:'select', options:['No','Yes'] },
        { key:'battle_pass',      label:'Battle Pass',          type:'select', options:['No','Yes'] },
        { key:'honest_issue',     label:'Known Issues',         type:'text',   placeholder:'None' },
      ],
      mlbb: [
        { key:'season_rank',      label:'Season Rank',          type:'select', options:['Warrior','Elite','Master','Grandmaster','Epic','Legend','Mythic','Mythical Glory','Mythical Immortal'] },
        { key:'server',           label:'Server',               type:'select', options:['Southeast Asia','North America','Europe','Middle East','South Asia'] },
        { key:'collection_level', label:'Collection Level',     type:'select', options:['Renowned Collector I','Renowned Collector II','Renowned Collector III','Renowned Collector IV','Renowned Collector V','Exalted Collector I','Exalted Collector II','Exalted Collector III','Exalted Collector IV','Exalted Collector V','Mega Collector','World Collector'] },
        { key:'total_skins',      label:'Total Skins',          type:'number', placeholder:'0' },
        { key:'diamonds_amount',  label:'Diamonds',             type:'number', placeholder:'0' },
      ],
      valorant: [
        { key:'rank',             label:'Rank',                 type:'select', options:['Unranked','Iron','Bronze','Silver','Gold','Platinum','Diamond','Ascendant','Immortal','Radiant'] },
        { key:'region',           label:'Region',               type:'select', options:['NA','EU','APAC','KR','BR','LATAM','TR'] },
        { key:'premium_skins',    label:'Premium Skins',        type:'number', placeholder:'0' },
        { key:'vp_amount',        label:'Valorant Points (VP)', type:'number', placeholder:'0' },
      ],
    };

    function openEditModal(id) {
      const listing = allListings.find(l => l.id === id);
      if (!listing) return;
      editingListingId = id;

      document.getElementById('edit_title').value       = listing.title || '';
      document.getElementById('edit_price').value       = listing.price || '';
      document.getElementById('edit_currency').value    = listing.currency || 'PHP';
      document.getElementById('edit_desc').value        = listing.description || '';

      // Render game-specific attribute fields
      const defs  = EDIT_ATTR_DEFS[listing.game] || [];
      const attrs = listing.attributes || {};
      const wrap  = document.getElementById('edit_attrs_wrap');
      if (defs.length) {
        wrap.innerHTML = `
          <div style="font-size:11px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.07em;padding-top:4px;border-top:1px solid var(--border);margin-top:4px;">Game Details</div>
          ${defs.map(def => {
            const val = attrs[def.key] ?? '';
            const input = def.type === 'select'
              ? `<select id="ea_${def.key}" style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);width:100%;outline:none;">
                   <option value="">— select —</option>
                   ${def.options.map(o => `<option value="${o}" ${String(val)===o?'selected':''}>${o}</option>`).join('')}
                 </select>`
              : `<input id="ea_${def.key}" type="${def.type==='number'?'number':'text'}" value="${val}" placeholder="${def.placeholder||''}" style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);width:100%;outline:none;">`;
            return `<div class="edit-field"><label>${def.label}</label>${input}</div>`;
          }).join('')}`;
      } else {
        wrap.innerHTML = '';
      }

      document.getElementById('editListingErr').style.display = 'none';
      document.getElementById('editSaveBtn').disabled    = false;
      document.getElementById('editSaveBtn').textContent = 'Save changes';
      document.getElementById('editListingOverlay').style.display = 'flex';
      document.getElementById('edit_title').focus();
    }

    function closeEditModal() {
      document.getElementById('editListingOverlay').style.display = 'none';
      editingListingId = null;
    }

    function initEditModal() {
      document.getElementById('editListingOverlay').addEventListener('click', e => {
        if (e.target === document.getElementById('editListingOverlay')) closeEditModal();
      });
      document.getElementById('editCancelBtn').addEventListener('click', closeEditModal);
      document.getElementById('editSaveBtn').addEventListener('click', async () => {
      const btn   = document.getElementById('editSaveBtn');
      const errEl = document.getElementById('editListingErr');
      errEl.style.display = 'none';

      const title       = document.getElementById('edit_title').value.trim();
      const price       = parseFloat(document.getElementById('edit_price').value);
      const currency    = document.getElementById('edit_currency').value;
      const description = document.getElementById('edit_desc').value.trim();

      if (!title)          { errEl.textContent = 'Title is required.';        errEl.style.display = 'block'; return; }
      if (!price || price <= 0) { errEl.textContent = 'Enter a valid price.'; errEl.style.display = 'block'; return; }

      // Collect game attribute values
      const editingListing = allListings.find(l => l.id === editingListingId);
      const attrDefs = EDIT_ATTR_DEFS[editingListing?.game] || [];
      const attributes = { ...(editingListing?.attributes || {}) };
      attrDefs.forEach(def => {
        const el = document.getElementById(`ea_${def.key}`);
        if (!el) return;
        const v = el.value.trim();
        if (v) attributes[def.key] = def.type === 'number' ? Number(v) : v;
        else delete attributes[def.key];
      });

      btn.disabled = true; btn.textContent = 'Saving…';

      try {
        const { data: { session } } = await sb.auth.getSession();
        const res  = await fetch('/api/edit-listing', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({ listingId: editingListingId, title, price, currency, description, attributes }),
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Failed to save.'; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Save changes'; return; }

        // Update local data and re-render card
        const idx = allListings.findIndex(l => l.id === editingListingId);
        if (idx >= 0) {
          allListings[idx] = { ...allListings[idx], title, price, currency, description, attributes };
          const card = document.getElementById(`lcard_${editingListingId}`);
          if (card) {
            const newCard = document.createElement('div');
            newCard.innerHTML = listingCard(allListings[idx]);
            const newEl = newCard.firstElementChild;
            card.replaceWith(newEl);
          }
        }
        closeEditModal();
        toast('Listing updated.', 'success');
      } catch { errEl.textContent = 'Something went wrong.'; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Save changes'; }
      });
    }

    async function loadListings(userId) {
      const wrap = document.getElementById('listingsWrap');

      wrap.innerHTML = `<div class="listings-grid">${[...Array(3)].map(() => `
        <div class="listing-card" style="pointer-events:none;">
          <div class="card-img skeleton" style="height:160px;"></div>
          <div class="card-body" style="gap:10px;display:flex;flex-direction:column;">
            <div class="skeleton" style="height:16px;width:55%;"></div>
            <div class="skeleton" style="height:14px;width:88%;"></div>
            <div class="skeleton" style="height:22px;width:38%;margin-top:8px;"></div>
          </div>
        </div>`).join('')}</div>`;

      const { data, error } = await sb
        .from('listings')
        .select('id, title, price, currency, type, images, game, description, created_at')
        .eq('seller_id', userId)
        .eq('status', 'active')
        .order('created_at', { ascending: false });

      allListings = error ? [] : (data || []);
      document.getElementById('statListings').textContent = allListings.length;

      if (!allListings.length) {
        wrap.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🏷️</div>
            <h3>No listings yet</h3>
            <p>Your active listings will appear here once you start selling.</p>
          </div>`;
        return;
      }

      buildFilterBar();
      renderListings('all');
    }

    function buildFilterBar() {
      const games   = [...new Set(allListings.map(l => l.game))];
      const options = [
        `<option value="all">All games</option>`,
        ...games.map(g => `<option value="${g}">${GAME_META[g]?.label || g}</option>`)
      ].join('');

      const bar = document.getElementById('filterBar');
      bar.innerHTML = `
        <div class="filter-bar">
          <span class="filter-label">Game:</span>
          <select class="game-filter" id="gameFilter">${options}</select>
        </div>`;
      bar.style.display = '';

      document.getElementById('gameFilter').addEventListener('change', e => {
        renderListings(e.target.value);
      });
    }

    function renderListings(game) {
      const filtered = game === 'all' ? allListings : allListings.filter(l => l.game === game);
      const wrap = document.getElementById('listingsWrap');

      if (!filtered.length) {
        wrap.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🏷️</div>
            <h3>No listings for this game</h3>
            <p>You don't have any active ${GAME_META[game]?.label || game} listings yet.</p>
          </div>`;
        return;
      }

      wrap.innerHTML = `<div class="listings-grid">${filtered.map(listingCard).join('')}</div>`;
    }

    // TIER TROPHY
    const TIERS = [
      {tier:1, name:'Stone',    min:0,      color:'#9CA3AF'},
      {tier:2, name:'Iron',     min:500,    color:'#D1D5DB'},
      {tier:3, name:'Bronze',   min:2000,   color:'#F59E0B'},
      {tier:4, name:'Silver',   min:5000,   color:'#E5E7EB'},
      {tier:5, name:'Gold',     min:10000,  color:'#FDE68A'},
      {tier:6, name:'Platinum', min:25000,  color:'#BAE6FD'},
      {tier:7, name:'Emerald',  min:50000,  color:'#6EE7B7'},
      {tier:8, name:'Sapphire', min:100000, color:'#93C5FD'},
      {tier:9, name:'Ruby',     min:250000, color:'#FDA4AF'},
      {tier:10,name:'Diamond',  min:500000, color:'url(#dg)'},
    ];

    async function loadTierTrophy(userId) {
      try {
        const [{ data: txData }, { data: wallet }] = await Promise.all([
          sb.from('transactions').select('amount,type').eq('user_id', userId),
          sb.from('wallets').select('total_earned').eq('user_id', userId).maybeSingle(),
        ]);
        const txTotal     = (txData || [])
          .filter(r => ['escrow','credit','refund'].includes(r.type))
          .reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
        const sellerTotal = parseFloat(wallet?.total_earned || 0);
        const total = Math.max(txTotal, sellerTotal);
        const t = [...TIERS].reverse().find(t => total >= t.min) || TIERS[0];

        const wrap  = document.getElementById('tierStatWrap');
        const label = document.getElementById('tierStatLabel');
        if (!wrap || !label) return;
        const iconSvg = getTierIcon(t.tier, t.color).replace('<svg ', '<svg width="20" height="20" ');
        label.innerHTML = `<span class="tt-${t.tier}" style="display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:6px;font-size:12px;white-space:nowrap;">${iconSvg}<span style="font-weight:800;letter-spacing:0.04em;">TIER ${t.tier}</span><span style="font-weight:500;opacity:0.75;">${t.name}</span></span>`;
        document.querySelector('#tierStatWrap .stat-label').style.display = 'none';
        wrap.style.display = '';

        sb.channel(`own-tier-${userId}`)
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'wallets', filter: `user_id=eq.${userId}` }, () => {
            loadTierTrophy(userId);
          })
          .subscribe();
      } catch {}
    }

    init();
  </script>

  <!-- Card options dropdown (shared, repositioned per card) -->
  <div id="cardMenuDropdown" style="display:none;"></div>

  <!-- Edit listing modal -->
  <div id="editListingOverlay" class="edit-overlay" style="display:none;">
    <div class="edit-modal">
      <h3>Edit listing</h3>
      <div class="edit-field">
        <label>Title</label>
        <input id="edit_title" type="text" maxlength="120" placeholder="Listing title">
      </div>
      <div class="edit-price-row">
        <div class="edit-field">
          <label>Price</label>
          <input id="edit_price" type="number" min="1" step="any" placeholder="0">
        </div>
        <div class="edit-field">
          <label>Currency</label>
          <select id="edit_currency">
            <option value="PHP">PHP — Philippine Peso</option>
            <option value="USD" disabled>USD (Coming soon)</option>
          </select>
        </div>
      </div>
      <div class="edit-field">
        <label>Description <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-faint);">(optional)</span></label>
        <textarea id="edit_desc" maxlength="2000" placeholder="Describe what makes this account special…"></textarea>
      </div>
      <div id="edit_attrs_wrap" style="display:flex;flex-direction:column;gap:14px;"></div>
      <div id="editListingErr" class="edit-err"></div>
      <div class="edit-actions">
        <button id="editCancelBtn" style="padding:9px 18px;border-radius:8px;border:1px solid var(--border-hi);background:transparent;color:var(--text);font-family:'Geist',sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Cancel</button>
        <button id="editSaveBtn" style="padding:9px 20px;border-radius:8px;border:none;background:var(--accent);color:var(--bg-base);font-family:'Geist',sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Save changes</button>
      </div>
    </div>
  </div>

</body>
</html>
