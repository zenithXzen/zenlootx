<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:#0A0E0C;--bg-surface:#121814;--bg-elevated:#1A211C;
      --border:#232B26;--border-hi:#33403A;--accent:#19C37D;
      --accent-hover:#2FD98F;--accent-glow:rgba(25,195,125,0.15);
      --text:#E8EDE9;--text-dim:#9BA8A0;--text-faint:#6B776F;
      --danger:#EF4444;--warning:#F5B947;--success:#22C55E;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:var(--bg-base);color:var(--text);font-family:'Geist',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
    a{text-decoration:none;color:inherit}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:rgba(10,14,12,0.88);backdrop-filter:blur(14px);flex-shrink:0}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;gap:16px;max-width:100%}
    .logo{font-size:20px;font-weight:700;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px}
    .logo .green{color:var(--accent)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'Geist',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.18s;white-space:nowrap}
    .btn-secondary{background:transparent;color:var(--text);border-color:var(--border-hi)}
    .btn-secondary:hover{background:var(--bg-elevated)}
    .btn-primary{background:var(--accent);color:var(--bg-base);border-color:var(--accent)}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn:disabled{opacity:0.4;cursor:not-allowed;pointer-events:none}

    /* NAV DROPDOWN */
    .user-menu{position:relative}
    .user-btn{display:flex;align-items:center;gap:8px;background:var(--bg-elevated);border:1px solid var(--border-hi);border-radius:8px;padding:7px 12px;cursor:pointer;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;color:var(--text)}
    .user-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden}
    .user-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .user-dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;min-width:200px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:200}
    .user-dropdown.open{display:block}
    .dd-email{padding:12px 16px;font-size:12px;color:var(--text-faint);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dd-item{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;color:var(--text-dim);cursor:pointer;transition:background 0.14s;text-decoration:none;border:none;background:none;font-family:'Geist',sans-serif;width:100%;text-align:left}
    .dd-item:hover{background:var(--bg-elevated);color:var(--text)}
    .dd-item.danger{color:var(--danger)}
    .dd-item.danger:hover{background:rgba(239,68,68,0.08)}
    .dd-sep{height:1px;background:var(--border);margin:4px 0}

    /* MAIN LAYOUT */
    .messages-layout{flex:1;display:flex;overflow:hidden;min-height:0}

    /* SIDEBAR */
    .conv-sidebar{width:320px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sidebar-head{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .sidebar-head h2{font-size:16px;font-weight:700}
    .conv-list{flex:1;overflow-y:auto}
    .conv-item{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.14s}
    .conv-item:hover{background:var(--bg-elevated)}
    .conv-item.active{background:var(--bg-elevated);border-left:2px solid var(--accent)}
    .conv-av{width:42px;height:42px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden}
    .conv-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .conv-info{flex:1;min-width:0}
    .conv-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-preview{font-size:12px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .conv-time{font-size:11px;color:var(--text-faint);flex-shrink:0;align-self:flex-start;margin-top:2px}
    .conv-unread{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
    .sidebar-empty{padding:48px 24px;text-align:center;color:var(--text-faint)}
    .sidebar-empty p{font-size:13px;line-height:1.6;margin-top:8px}

    /* CHAT PANEL */
    .chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .chat-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg-surface)}
    .chat-header-av{width:36px;height:36px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden}
    .chat-header-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .chat-header-name{font-size:15px;font-weight:600}
    .chat-header-sub{font-size:12px;color:var(--text-faint)}
    .chat-order-link{margin-left:auto;flex-shrink:0}

    .chat-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px}

    .msg-row{display:flex;align-items:flex-end;gap:8px}
    .msg-row.mine{flex-direction:row-reverse}
    .msg-av-sm{width:28px;height:28px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-faint);flex-shrink:0;overflow:hidden}
    .msg-av-sm img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .msg-bubble{max-width:70%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.55;word-break:break-word}
    .msg-row.mine  .msg-bubble{background:var(--accent);color:var(--bg-base);border-bottom-right-radius:4px}
    .msg-row.other .msg-bubble{background:var(--bg-elevated);color:var(--text);border-bottom-left-radius:4px}
    .msg-time{font-size:11px;color:var(--text-faint);margin-top:3px;text-align:right}
    .msg-row.other .msg-time{text-align:left}

    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-faint);text-align:center;padding:24px}
    .chat-empty-icon{font-size:40px;margin-bottom:4px}
    .chat-empty h3{font-size:16px;font-weight:600;color:var(--text-dim)}
    .chat-empty p{font-size:13px;line-height:1.6;max-width:280px}

    .chat-input-row{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:var(--bg-base)}
    .chat-input{flex:1;background:var(--bg-elevated);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;resize:none;transition:border-color 0.16s;line-height:1.5;max-height:120px;overflow-y:auto}
    .chat-input:focus{border-color:var(--accent)}
    .chat-input::placeholder{color:var(--text-faint)}
    .send-btn{background:var(--accent);border:none;border-radius:10px;padding:10px 16px;cursor:pointer;color:var(--bg-base);display:flex;align-items:center;justify-content:center;transition:background 0.16s;flex-shrink:0}
    .send-btn:hover{background:var(--accent-hover)}
    .send-btn:disabled{opacity:0.4;cursor:not-allowed}

    /* NO CONVERSATION SELECTED */
    .no-conv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-faint);text-align:center;padding:24px}
    .no-conv-icon{font-size:48px;margin-bottom:8px}
    .no-conv h3{font-size:18px;font-weight:600;color:var(--text-dim)}
    .no-conv p{font-size:13px;line-height:1.6;max-width:300px}

    /* SKELETON */
    .skeleton{background:var(--bg-elevated);border-radius:6px;animation:shimmer 1.4s infinite}
    @keyframes shimmer{0%,100%{opacity:0.5}50%{opacity:1}}

    /* MOBILE */
    @media(max-width:680px){
      .conv-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}
      .messages-layout{flex-direction:column}
      .chat-panel{min-height:400px}
      .conv-sidebar.hidden-mobile{display:none}
      .chat-panel.hidden-mobile{display:none}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><img src="/wallpaper/zx.png" alt="ZenLootX" style="height:32px;width:auto;"><span>Zen<span class="green">Loot</span>X</span></a>
    <div id="navActions">
      <a href="/login" class="btn btn-secondary">Sign in</a>
    </div>
  </div>
</nav>

<div class="messages-layout">

  <!-- SIDEBAR -->
  <div class="conv-sidebar" id="convSidebar">
    <div class="sidebar-head">
      <h2>Messages</h2>
    </div>
    <div class="conv-list" id="convList">
      <!-- skeleton -->
      ${[...Array(4)].map(() => `
        <div class="conv-item" style="gap:12px;">
          <div class="skeleton" style="width:42px;height:42px;border-radius:50%;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div class="skeleton" style="height:13px;width:60%;"></div>
            <div class="skeleton" style="height:11px;width:80%;"></div>
          </div>
        </div>`).join('')}
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel" id="chatPanel">
    <div class="no-conv" id="noConv">
      <div class="no-conv-icon">💬</div>
      <h3>Your messages</h3>
      <p>Select a conversation from the left, or buy a listing to start messaging a seller.</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://msumlsqfergennhzxqon.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q'
  );

  let currentUser   = null;
  let conversations = [];
  let activeConvId  = null;
  let profileCache  = {};
  let msgSubscription = null;

  const params  = new URLSearchParams(window.location.search);
  const openConvId = params.get('conv');
  const openWith   = params.get('with');

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/login?redirect=/messages'; return; }
    currentUser = session.user;
    await initNav(session.user);
    await loadConversations();

    if (openConvId) openConversation(openConvId);
    else if (openWith) findOrOpenConvWith(openWith);
  }

  // ── Conversations ─────────────────────────────────────────────
  async function loadConversations() {
    // 1. Load existing conversations
    const { data: convData } = await sb
      .from('conversations')
      .select('*, listing:listing_id(title,game)')
      .or(`buyer_id.eq.${currentUser.id},seller_id.eq.${currentUser.id}`)
      .order('created_at', { ascending: false });

    const existing = convData || [];
    const coveredListings = new Set(existing.map(c => c.listing_id).filter(Boolean));

    // 2. Load orders — create missing conversations for any order that has none
    const { data: orders } = await sb
      .from('orders')
      .select('id,buyer_id,seller_id,listing_id,listings:listing_id(title,game)')
      .or(`buyer_id.eq.${currentUser.id},seller_id.eq.${currentUser.id}`)
      .order('created_at', { ascending: false });

    for (const o of (orders || [])) {
      if (!o.listing_id || coveredListings.has(o.listing_id)) continue;
      // Auto-create missing conversation
      const { data: nc } = await sb.from('conversations').insert({
        buyer_id:   o.buyer_id,
        seller_id:  o.seller_id,
        order_id:   o.id,
        listing_id: o.listing_id,
      }).select('*, listing:listing_id(title,game)').single();

      if (nc) { existing.push(nc); coveredListings.add(o.listing_id); }
    }

    if (!existing.length) {
      document.getElementById('convList').innerHTML = `
        <div class="sidebar-empty">
          <div style="font-size:32px;">💬</div>
          <p>No conversations yet.<br>Buy a listing to start messaging a seller.</p>
        </div>`;
      return;
    }

    conversations = existing;

    // Load other-party profiles
    const otherIds = [...new Set(existing.map(c => c.buyer_id === currentUser.id ? c.seller_id : c.buyer_id))];
    const { data: profiles } = await sb.from('profiles').select('id,username,avatar_url').in('id', otherIds);
    (profiles || []).forEach(p => { profileCache[p.id] = p; });

    renderConvList();

    // Auto-open first conversation if none selected
    if (!activeConvId && !openConvId && !openWith && existing.length) {
      openConversation(existing[0].id);
    }
  }

  function renderConvList() {
    document.getElementById('convList').innerHTML = conversations.map(c => {
      const otherId  = c.buyer_id === currentUser.id ? c.seller_id : c.buyer_id;
      const other    = profileCache[otherId] || {};
      const name     = other.username || 'Unknown';
      const initial  = name.charAt(0).toUpperCase();
      const av       = other.avatar_url ? `<img src="${other.avatar_url}" alt="${name}">` : initial;
      const listing  = c.listing?.title || 'Order conversation';
      const role     = c.buyer_id === currentUser.id ? 'Buying' : 'Selling';
      const isActive = c.id === activeConvId;

      return `
        <div class="conv-item${isActive ? ' active' : ''}" data-conv="${c.id}">
          <div class="conv-av">${av}</div>
          <div class="conv-info">
            <div class="conv-name">${name}</div>
            <div class="conv-preview">${role}: ${listing}</div>
          </div>
        </div>`;
    }).join('');

    document.querySelectorAll('.conv-item[data-conv]').forEach(el => {
      el.addEventListener('click', () => openConversation(el.dataset.conv));
    });
  }

  async function findOrOpenConvWith(sellerId) {
    const conv = conversations.find(c =>
      (c.buyer_id === currentUser.id && c.seller_id === sellerId) ||
      (c.seller_id === currentUser.id && c.buyer_id === sellerId)
    );
    if (conv) openConversation(conv.id);
  }

  // ── Open conversation ─────────────────────────────────────────
  async function openConversation(convId) {
    activeConvId = convId;
    renderConvList();

    const conv    = conversations.find(c => c.id === convId);
    const otherId = conv ? (conv.buyer_id === currentUser.id ? conv.seller_id : conv.buyer_id) : null;
    const other   = profileCache[otherId] || {};
    const name    = other.username || 'Seller';
    const initial = name.charAt(0).toUpperCase();
    const av      = other.avatar_url ? `<img src="${other.avatar_url}" alt="${name}">` : initial;

    document.getElementById('chatPanel').innerHTML = `
      <div class="chat-header">
        <div class="chat-header-av">${av}</div>
        <div>
          <div class="chat-header-name">${name}</div>
          <div class="chat-header-sub">${conv?.listing?.title || 'Order conversation'}</div>
        </div>
        ${conv?.order_id ? `<a href="/orders" class="btn btn-secondary chat-order-link" style="font-size:12px;padding:6px 12px;">View Order</a>` : ''}
      </div>
      <div class="chat-messages" id="chatMessages">
        <div style="text-align:center;padding:24px;">
          <div class="skeleton" style="height:12px;width:60%;margin:0 auto 10px;"></div>
          <div class="skeleton" style="height:12px;width:40%;margin:0 auto;"></div>
        </div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="msgInput" placeholder="Type a message…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.77 59.77 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/></svg>
        </button>
      </div>`;

    // Auto-resize textarea
    document.getElementById('msgInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    await loadMessages(convId);
    subscribeMessages(convId);
  }

  // ── Messages ──────────────────────────────────────────────────
  async function loadMessages(convId) {
    const { data, error } = await sb
      .from('messages')
      .select('*')
      .eq('conversation_id', convId)
      .order('created_at', { ascending: true });

    renderMessages(data || []);
  }

  function renderMessages(msgs) {
    const el = document.getElementById('chatMessages');
    if (!el) return;

    if (!msgs.length) {
      el.innerHTML = `
        <div class="chat-empty">
          <div class="chat-empty-icon">👋</div>
          <h3>Start the conversation</h3>
          <p>Introduce yourself and ask the seller for delivery details.</p>
        </div>`;
      return;
    }

    el.innerHTML = msgs.map(m => {
      const mine = m.sender_id === currentUser.id;
      const time = new Date(m.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      return `
        <div class="msg-row ${mine ? 'mine' : 'other'}">
          <div class="msg-bubble">${escHtml(m.content)}</div>
        </div>
        <div class="msg-time" style="text-align:${mine ? 'right' : 'left'};padding:0 4px;">${time}</div>`;
    }).join('');

    el.scrollTop = el.scrollHeight;
  }

  function subscribeMessages(convId) {
    if (msgSubscription) { sb.removeChannel(msgSubscription); msgSubscription = null; }
    msgSubscription = sb.channel(`messages:${convId}`)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'messages',
        filter: `conversation_id=eq.${convId}`,
      }, payload => {
        const m    = payload.new;
        const mine = m.sender_id === currentUser.id;
        const time = new Date(m.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        const el   = document.getElementById('chatMessages');
        if (!el) return;

        // Remove empty state if present
        const empty = el.querySelector('.chat-empty');
        if (empty) el.innerHTML = '';

        const row = document.createElement('div');
        row.innerHTML = `
          <div class="msg-row ${mine ? 'mine' : 'other'}">
            <div class="msg-bubble">${escHtml(m.content)}</div>
          </div>
          <div class="msg-time" style="text-align:${mine?'right':'left'};padding:0 4px;">${time}</div>`;
        el.appendChild(row);
        el.scrollTop = el.scrollHeight;
      })
      .subscribe();
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const btn   = document.getElementById('sendBtn');
    const text  = input?.value.trim();
    if (!text || !activeConvId) return;

    btn.disabled  = true;
    input.value   = '';
    input.style.height = 'auto';

    const { error } = await sb.from('messages').insert({
      conversation_id: activeConvId,
      sender_id:       currentUser.id,
      content:         text,
    });

    btn.disabled = false;
    if (error) {
      input.value = text;
      alert('Failed to send message. Please try again.');
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }

  // ── Nav ───────────────────────────────────────────────────────
  async function initNav(user) {
    const username = user.user_metadata?.username || user.email.split('@')[0];
    const initial  = username.charAt(0).toUpperCase();
    const avatar   = user.user_metadata?.avatar_url;
    const { data: _sa } = await sb.from('seller_applications').select('status').eq('user_id', user.id).eq('status','approved').maybeSingle();
    const isSeller = !!_sa;

    document.getElementById('navActions').innerHTML = `
      <div class="user-menu" id="userMenu">
        <button class="user-btn" id="userBtn">
          <div class="user-avatar">${avatar ? `<img src="${avatar}">` : initial}</div>
          ${username}
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="user-dropdown" id="userDropdown">
          <div class="dd-email">${user.email}</div>
          <a href="/profile"  class="dd-item">View Profile</a>
          <a href="/account"  class="dd-item">My Account</a>
          <div class="dd-sep"></div>
          <a href="/orders"   class="dd-item">Orders</a>
          <a href="/messages" class="dd-item" style="color:var(--accent);">Messages</a>
          <a href="/notifications" class="dd-item">Notifications</a>
          <a href="/wallet"   class="dd-item">Wallet</a>
          <div class="dd-sep"></div>
          ${isSeller || user.app_metadata?.is_admin
            ? `<a href="/create-listing" class="dd-item">List an item</a>`
            : `<a href="/sell" class="dd-item">Become a seller</a>`}
          ${user.app_metadata?.is_admin ? `<div class="dd-sep"></div><a href="/admin" class="dd-item danger">Admin Dashboard</a>` : ''}
          <div class="dd-sep"></div>
          <button class="dd-item danger" id="logoutBtn">Sign out</button>
        </div>
      </div>`;

    document.getElementById('userBtn').addEventListener('click', () => document.getElementById('userDropdown').classList.toggle('open'));
    document.addEventListener('click', e => {
      const m = document.getElementById('userMenu');
      if (m && !m.contains(e.target)) document.getElementById('userDropdown').classList.remove('open');
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      localStorage.removeItem('zlx_session_row');
      await sb.auth.signOut();
      window.location.href = '/login';
    });
  }

  init();
</script>
</body>
</html>
