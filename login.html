<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/wallpaper/zx.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:     #0A0E0C;
      --bg-surface:  #121814;
      --bg-elevated: #1A211C;
      --border:      #232B26;
      --border-hi:   #33403A;
      --accent:      #19C37D;
      --accent-hover:#2FD98F;
      --accent-glow: rgba(25,195,125,0.15);
      --text:        #E8EDE9;
      --text-dim:    #9BA8A0;
      --text-faint:  #6B776F;
      --danger:      #EF4444;
      --warning:     #F5B947;
      --success:     #22C55E;
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; color: inherit; }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .logo .green { color: var(--accent); }
    .nav-right { font-size: 14px; color: var(--text-dim); }
    .nav-right a { color: var(--accent); font-weight: 500; }
    .nav-right a:hover { color: var(--accent-hover); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card { width: 100%; max-width: 420px; }

    .card-header { text-align: center; margin-bottom: 32px; }
    .card-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .card-header p  { font-size: 14px; color: var(--text-dim); }

    .form {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label  { font-size: 13px; font-weight: 500; color: var(--text-dim); }

    .input-wrap { position: relative; display: flex; align-items: center; }

    input {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      width: 100%;
    }
    input::placeholder { color: var(--text-faint); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(239,68,68,0.12); }

    .toggle-pw {
      position: absolute; right: 12px;
      background: none; border: none; cursor: pointer;
      padding: 4px; color: var(--text-faint);
      display: flex; align-items: center; transition: color 0.16s;
      flex-shrink: 0;
    }
    .toggle-pw:hover { color: var(--text-dim); }
    .toggle-pw svg { width: 18px; height: 18px; }
    input[type="password"], input[type="text"].pw-field { padding-right: 42px; }

    .divider { height: 1px; background: var(--border); }

    .forgot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }
    .forgot a { font-size: 13px; color: var(--text-faint); transition: color 0.16s; }
    .forgot a:hover { color: var(--text-dim); }

    .alert {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      border-radius: 8px;
      border-style: solid;
      font-size: 13px;
      line-height: 1.5;
      max-height: 0;
      opacity: 0;
      padding: 0 14px;
      overflow: hidden;
      border-width: 0;
      transition: max-height 0.22s var(--ease-out-quart), opacity 0.18s var(--ease-out-quart),
                  padding 0.22s var(--ease-out-quart), border-width 0.22s var(--ease-out-quart);
    }
    .alert.visible { max-height: 200px; opacity: 1; padding: 11px 14px; border-width: 1px; }
    .alert-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
    .alert-error   { background: rgba(239,68,68,0.08);  border-color: rgba(239,68,68,0.2);  color: var(--danger); }
    .alert-warning { background: rgba(245,185,71,0.08); border-color: rgba(245,185,71,0.2); color: var(--warning); }
    .alert-success { background: rgba(34,197,94,0.08);  border-color: rgba(34,197,94,0.2);  color: var(--success); }

    .btn-submit {
      position: relative;
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: var(--bg-base);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, opacity 0.18s, box-shadow 0.22s var(--ease-out-quart);
    }
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:disabled { cursor: not-allowed; }
    .btn-submit:disabled:not(.is-loading):not(.is-success) { opacity: 0.5; }

    .btn-label {
      transition: opacity 0.16s var(--ease-out-quart), transform 0.16s var(--ease-out-quart);
    }
    .btn-spinner, .btn-check {
      position: absolute;
      width: 17px;
      height: 17px;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.18s var(--ease-out-quart), transform 0.18s var(--ease-out-quart);
    }
    .btn-spinner-ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(10,14,12,0.25);
      border-top-color: var(--bg-base);
    }
    .btn-check { color: var(--bg-base); }

    .btn-submit.is-loading .btn-label,
    .btn-submit.is-success .btn-label {
      opacity: 0;
      transform: translateY(2px);
    }
    .btn-submit.is-loading .btn-spinner {
      opacity: 1;
      transform: scale(1);
    }
    .btn-submit.is-loading .btn-spinner-ring {
      animation: btn-spin 0.7s linear infinite;
    }
    .btn-submit.is-success {
      background: var(--accent-hover);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    .btn-submit.is-success .btn-check {
      opacity: 1;
      transform: scale(1);
    }

    @keyframes btn-spin { to { transform: rotate(360deg); } }

    body.page-exiting {
      opacity: 0;
      transition: opacity 0.22s var(--ease-out-quart);
    }

    @media (prefers-reduced-motion: reduce) {
      .btn-submit.is-loading .btn-spinner-ring { animation: none; }
      .btn-label, .btn-spinner, .btn-check, body.page-exiting, .alert {
        transition-duration: 0.01ms !important;
      }
    }

    .form-footer { text-align: center; font-size: 13px; color: var(--text-faint); margin-top: 4px; }
    .form-footer a { color: var(--accent); font-weight: 500; }
    .form-footer a:hover { color: var(--accent-hover); }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-faint);
    }
    footer a { color: var(--text-faint); transition: color 0.16s; }
    footer a:hover { color: var(--text-dim); }

    @media (max-width: 480px) { .form { padding: 24px 20px; } }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo" style="display:flex;align-items:center;gap:8px;"><img src="/wallpaper/zx.png" alt="ZenLootX" style="height:32px;width:auto;"><span>Zen<span class="green">Loot</span>X</span></a>
  </nav>

  <main>
    <div class="card">
      <div class="card-header">
        <h1>Welcome back</h1>
        <p>Sign in with your email or username.</p>
      </div>

      <form class="form" id="loginForm" novalidate>

        <div class="alert alert-error" id="errorMsg">
          <svg class="alert-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
          <span class="alert-text"></span>
        </div>
        <div class="alert alert-warning" id="warnMsg">
          <svg class="alert-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0 3.75h.008M9.401 3.003c1.155-2 4.043-2 5.198 0l8.197 14.201c1.156 2-.289 4.5-2.6 4.5H3.604c-2.31 0-3.756-2.5-2.6-4.5L9.4 3.003Z"/></svg>
          <span class="alert-text"></span>
        </div>
        <div class="alert alert-success" id="successMsg">
          <svg class="alert-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
          <span class="alert-text"></span>
        </div>

        <div class="field">
          <label for="identifier">Email or username</label>
          <input
            type="text"
            id="identifier"
            name="identifier"
            placeholder=""
            autocomplete="username"
            required
          >
        </div>

        <div class="divider"></div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder=""
              autocomplete="current-password"
              class="pw-field"
              required
            >
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
              <svg id="iconShow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12C3.75 7.5 7.5 4.5 12 4.5s8.25 3 9.75 7.5c-1.5 4.5-5.25 7.5-9.75 7.5S3.75 16.5 2.25 12Z"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              <svg id="iconHide" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 2.25 12c1.5 4.5 5.25 7.5 9.75 7.5a10.43 10.43 0 0 0 4.134-.832M6.53 6.53A9.956 9.956 0 0 1 12 4.5c4.5 0 8.25 3 9.75 7.5a10.49 10.49 0 0 1-1.397 2.853M6.53 6.53 3 3m3.53 3.53 11.94 11.94M6.53 6.53A9.955 9.955 0 0 0 9.88 9.88M17.47 17.47A9.955 9.955 0 0 1 14.12 14.12m0 0A3 3 0 0 0 9.88 9.88m4.24 4.24L9.88 9.88"/>
              </svg>
            </button>
          </div>
          <div class="forgot">
            <a href="/forgot-password" id="forgotLink">Forgot password?</a>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-label">Sign in</span>
          <span class="btn-spinner" aria-hidden="true"><span class="btn-spinner-ring"></span></span>
          <svg class="btn-check" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="form-footer">
          Don't have an account? <a href="/register">Create one</a>
        </div>

      </form>
    </div>
  </main>

  <footer>
    <a href="/terms">Terms</a> · <a href="/privacy">Privacy</a> · © 2026 ZenLootX
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://msumlsqfergennhzxqon.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q'
    );

    const MAX_ATTEMPTS = 6;
    let failedAttempts = 0;
    let locked = false;

    const submitBtn = document.getElementById('submitBtn');
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function setBtnLabel(text) { submitBtn.querySelector('.btn-label').textContent = text; }
    function setBtnState(state) {
      submitBtn.classList.remove('is-loading', 'is-success');
      if (state) submitBtn.classList.add('is-' + state);
    }

    // Password toggle
    const pwInput  = document.getElementById('password');
    const iconShow = document.getElementById('iconShow');
    const iconHide = document.getElementById('iconHide');
    document.getElementById('togglePw').addEventListener('click', () => {
      const vis = pwInput.type === 'text';
      pwInput.type           = vis ? 'password' : 'text';
      iconShow.style.display = vis ? '' : 'none';
      iconHide.style.display = vis ? 'none' : '';
    });

    function clearAlerts() {
      ['errorMsg', 'warnMsg', 'successMsg'].forEach(id => {
        const el = document.getElementById(id);
        el.querySelector('.alert-text').textContent = '';
        el.classList.remove('visible');
      });
    }
    function showError(msg)   { const el = document.getElementById('errorMsg');   el.querySelector('.alert-text').textContent = msg; el.classList.add('visible'); }
    function showWarning(msg) { const el = document.getElementById('warnMsg');    el.querySelector('.alert-text').textContent = msg; el.classList.add('visible'); }
    function showSuccess(msg) { const el = document.getElementById('successMsg'); el.querySelector('.alert-text').textContent = msg; el.classList.add('visible'); }

    // Show session-expired notice if redirected here automatically
    if (new URLSearchParams(window.location.search).get('reason') === 'session_expired') {
      showWarning('Your session expired. Please sign in again.');
    }

    async function triggerReset(identifier) {
      const email = identifier.includes('@') ? identifier : null;
      locked = true;
      submitBtn.disabled = true;
      setBtnState('loading');
      setBtnLabel('Sending reset email…');
      clearAlerts();
      if (!email) {
        showWarning('Too many failed attempts. Enter your email and click "Forgot password?" to reset.');
        document.getElementById('identifier').value = '';
        document.getElementById('identifier').focus();
        setBtnState('');
        setBtnLabel('Sign in');
        submitBtn.disabled = false;
        locked = false;
        failedAttempts = 0;
        return;
      }
      try {
        await fetch('/api/send-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
      } catch {}
      setBtnState('success');
      showSuccess(`Too many failed attempts. A reset link has been sent to ${email}.`);
      setBtnLabel('Reset email sent');
    }

    async function loginByUsername(username, password) {
      try {
        const res = await fetch('/api/get-email-by-username', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const body = await res.json();
        if (res.status === 404) return { error: 'not_found' };
        if (res.status === 401) return { error: 'invalid_credentials' };
        if (!res.ok)            return { error: 'server_error' };
        return { access_token: body.access_token, refresh_token: body.refresh_token };
      } catch {
        return { error: 'server_error' };
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (locked) return;

      clearAlerts();
      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value;

      [document.getElementById('identifier'), document.getElementById('password')]
        .forEach(el => el.classList.remove('error'));

      if (!identifier) {
        document.getElementById('identifier').classList.add('error');
        showError('Enter your email or username.');
        return;
      }
      if (!password) {
        document.getElementById('password').classList.add('error');
        showError('Enter your password.');
        return;
      }

      submitBtn.disabled = true;
      setBtnState('loading');
      setBtnLabel('Signing in…');

      try {
        // Username login — done entirely server-side; email never sent to browser
        let data, error;
        if (!identifier.includes('@')) {
          const result = await loginByUsername(identifier, password);
          if (result.error === 'server_error') {
            showError('Unable to reach the server. Please try again or use your email to sign in.');
            submitBtn.disabled = false;
            setBtnState('');
            setBtnLabel('Sign in');
            return;
          }
          if (result.error === 'not_found') {
            failedAttempts++;
            document.getElementById('identifier').classList.add('error');
            showError('Username not found. Check your username or sign in with your email.');
            submitBtn.disabled = false;
            setBtnState('');
            setBtnLabel('Sign in');
            return;
          }
          if (result.error === 'invalid_credentials') {
            // Let the error block below handle it
            ({ data, error } = { data: null, error: { message: 'Invalid login credentials' } });
          } else {
            ({ data, error } = await sb.auth.setSession({
              access_token:  result.access_token,
              refresh_token: result.refresh_token,
            }));
          }
        } else {
          ({ data, error } = await sb.auth.signInWithPassword({ email: identifier, password }));
        }

        if (error) {
          failedAttempts++;
          submitBtn.disabled = false;
          setBtnState('');
          setBtnLabel('Sign in');

          if (failedAttempts >= MAX_ATTEMPTS) {
            await triggerReset(identifier);
            return;
          }

          document.getElementById('password').classList.add('error');
          const remaining = MAX_ATTEMPTS - failedAttempts;
          if (failedAttempts >= 4) {
            showError(`Incorrect email or password. ${remaining} attempt${remaining === 1 ? '' : 's'} left before a reset email is sent.`);
          } else {
            showError('Incorrect email or password. Please try again.');
          }
          return;
        }

        // Track session device info
        const ua = navigator.userAgent;
        let browser = 'Browser';
        if (/Edg\//.test(ua))            browser = 'Edge';
        else if (/OPR\/|Opera/.test(ua)) browser = 'Opera';
        else if (/Chrome\//.test(ua))    browser = 'Chrome';
        else if (/Firefox\//.test(ua))   browser = 'Firefox';
        else if (/Safari\//.test(ua))    browser = 'Safari';

        let device = 'Unknown device';
        if (/iPhone/.test(ua))           device = 'iPhone';
        else if (/iPad/.test(ua))        device = 'iPad';
        else if (/Android/.test(ua)) {
          const m = ua.match(/Android [\d.]+;\s*([^)]+?)(?:\s+Build\/|\s*\))/);
          device = m ? m[1].trim() : 'Android device';
        }
        else if (/Macintosh/.test(ua))   device = 'Mac';
        else if (/Windows NT/.test(ua))  device = 'Windows PC';
        else if (/Linux/.test(ua))       device = 'Linux PC';

        fetch('/api/track-session', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${data.session.access_token}`,
          },
          body: JSON.stringify({ userAgent: ua, deviceName: device, browser }),
        }).then(r => r.json()).then(d => {
          if (d.sessionRowId) localStorage.setItem('zlx_session_row', d.sessionRowId);
        }).catch(() => {});

        // Success — redirect back to original page if set
        const redirectTo = new URLSearchParams(window.location.search).get('redirect') || '/';
        setBtnState('success');
        setBtnLabel('Signed in');
        showSuccess('Signed in! Redirecting…');

        if (prefersReducedMotion) {
          window.location.href = redirectTo;
        } else {
          setTimeout(() => {
            document.body.classList.add('page-exiting');
            setTimeout(() => { window.location.href = redirectTo; }, 220);
          }, 420);
        }

      } catch {
        showError('Network error. Check your connection and try again.');
        submitBtn.disabled = false;
        setBtnState('');
        setBtnLabel('Sign in');
      }
    });
  </script>

</body>
</html>
