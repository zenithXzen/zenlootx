<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:     #0A0E0C;
      --bg-surface:  #121814;
      --bg-elevated: #1A211C;
      --border:      #232B26;
      --border-hi:   #33403A;
      --accent:      #19C37D;
      --accent-hover:#2FD98F;
      --accent-glow: rgba(25,195,125,0.15);
      --text:        #E8EDE9;
      --text-dim:    #9BA8A0;
      --text-faint:  #6B776F;
      --danger:      #EF4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; color: inherit; }

    /* NAV */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Geist', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo .green { color: var(--accent); }

    .nav-right {
      font-size: 14px;
      color: var(--text-dim);
    }
    .nav-right a { color: var(--accent); font-weight: 500; }
    .nav-right a:hover { color: var(--accent-hover); }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 14px;
      color: var(--text-dim);
    }

    /* FORM */
    .form {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      width: 100%;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      transition: color 0.16s;
      flex-shrink: 0;
    }
    .toggle-pw:hover { color: var(--text-dim); }
    .toggle-pw svg { width: 18px; height: 18px; }

    input[type="password"],
    input[type="text"].pw-field {
      padding-right: 42px;
    }

    input::placeholder { color: var(--text-faint); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
    }

    .field-hint {
      font-size: 12px;
      color: var(--text-faint);
    }

    .divider {
      height: 1px;
      background: var(--border);
    }

    .forgot {
      display: flex;
      justify-content: flex-end;
    }
    .forgot a {
      font-size: 13px;
      color: var(--text-faint);
      transition: color 0.16s;
    }
    .forgot a:hover { color: var(--text-dim); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: var(--bg-base);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
    }
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:active { transform: scale(0.99); }

    .form-footer {
      text-align: center;
      font-size: 13px;
      color: var(--text-faint);
      margin-top: 4px;
    }
    .form-footer a { color: var(--accent); font-weight: 500; }
    .form-footer a:hover { color: var(--accent-hover); }

    /* ERROR MESSAGE */
    .error-msg {
      display: none;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--danger);
    }
    .error-msg.visible { display: block; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-faint);
    }
    footer a { color: var(--text-faint); transition: color 0.16s; }
    footer a:hover { color: var(--text-dim); }

    @media (max-width: 480px) {
      .form { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">Zen<span class="green">Loot</span>X</a>
    <div class="nav-right">
      No account? <a href="/register">Sign up</a>
    </div>
  </nav>

  <main>
    <div class="card">
      <div class="card-header">
        <h1>Welcome back</h1>
        <p>Sign in to your ZenLootX account.</p>
      </div>

      <form class="form" id="loginForm" novalidate>

        <div class="error-msg" id="errorMsg">
          Incorrect credentials. Check your email, username, and password.
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="field">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="your_username"
            autocomplete="username"
            required
          >
          <span class="field-hint">Your unique ZenLootX username.</span>
        </div>

        <div class="divider"></div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              class="pw-field"
              required
            >
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
              <!-- eye icon (shown when password is hidden) -->
              <svg id="iconShow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12C3.75 7.5 7.5 4.5 12 4.5s8.25 3 9.75 7.5c-1.5 4.5-5.25 7.5-9.75 7.5S3.75 16.5 2.25 12Z"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              <!-- eye-off icon (shown when password is visible) -->
              <svg id="iconHide" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 2.25 12c1.5 4.5 5.25 7.5 9.75 7.5a10.43 10.43 0 0 0 4.134-.832M6.53 6.53A9.956 9.956 0 0 1 12 4.5c4.5 0 8.25 3 9.75 7.5a10.49 10.49 0 0 1-1.397 2.853M6.53 6.53 3 3m3.53 3.53 11.94 11.94M6.53 6.53A9.955 9.955 0 0 0 9.88 9.88M17.47 17.47A9.955 9.955 0 0 1 14.12 14.12m0 0A3 3 0 0 0 9.88 9.88m4.24 4.24L9.88 9.88"/>
              </svg>
            </button>
          </div>
          <div class="forgot">
            <a href="/forgot-password">Forgot password?</a>
          </div>
        </div>

        <button type="submit" class="btn-submit">Sign in</button>

        <div class="form-footer">
          Don't have an account? <a href="/register">Create one</a>
        </div>

      </form>
    </div>
  </main>

  <footer>
    <a href="/terms">Terms</a> · <a href="/privacy">Privacy</a> · © 2026 ZenLootX
  </footer>

  <script>
    const togglePw  = document.getElementById('togglePw');
    const pwInput   = document.getElementById('password');
    const iconShow  = document.getElementById('iconShow');
    const iconHide  = document.getElementById('iconHide');

    togglePw.addEventListener('click', function () {
      const visible = pwInput.type === 'text';
      pwInput.type      = visible ? 'password' : 'text';
      iconShow.style.display = visible ? '' : 'none';
      iconHide.style.display = visible ? 'none' : '';
    });

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const email    = document.getElementById('email');
      const username = document.getElementById('username');
      const password = document.getElementById('password');

      let valid = true;

      [email, username, password].forEach(el => el.classList.remove('error'));
      errorMsg.classList.remove('visible');

      if (!email.value.trim() || !email.value.includes('@')) {
        email.classList.add('error');
        valid = false;
      }
      if (!username.value.trim()) {
        username.classList.add('error');
        valid = false;
      }
      if (!password.value) {
        password.classList.add('error');
        valid = false;
      }

      if (!valid) {
        errorMsg.textContent = 'Please fill in all fields correctly.';
        errorMsg.classList.add('visible');
        return;
      }

      // TODO: wire up to your auth backend (Supabase)
      errorMsg.textContent = 'Incorrect credentials. Check your email, username, and password.';
      errorMsg.classList.add('visible');
    });
  </script>

</body>
</html>
