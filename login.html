<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:     #0A0E0C;
      --bg-surface:  #121814;
      --bg-elevated: #1A211C;
      --border:      #232B26;
      --border-hi:   #33403A;
      --accent:      #19C37D;
      --accent-hover:#2FD98F;
      --accent-glow: rgba(25,195,125,0.15);
      --text:        #E8EDE9;
      --text-dim:    #9BA8A0;
      --text-faint:  #6B776F;
      --danger:      #EF4444;
      --warning:     #F5B947;
      --success:     #22C55E;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; color: inherit; }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .logo .green { color: var(--accent); }
    .nav-right { font-size: 14px; color: var(--text-dim); }
    .nav-right a { color: var(--accent); font-weight: 500; }
    .nav-right a:hover { color: var(--accent-hover); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card { width: 100%; max-width: 420px; }

    .card-header { text-align: center; margin-bottom: 32px; }
    .card-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .card-header p  { font-size: 14px; color: var(--text-dim); }

    .form {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label  { font-size: 13px; font-weight: 500; color: var(--text-dim); }

    .input-wrap { position: relative; display: flex; align-items: center; }

    input {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      width: 100%;
    }
    input::placeholder { color: var(--text-faint); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(239,68,68,0.12); }

    .toggle-pw {
      position: absolute; right: 12px;
      background: none; border: none; cursor: pointer;
      padding: 4px; color: var(--text-faint);
      display: flex; align-items: center; transition: color 0.16s;
      flex-shrink: 0;
    }
    .toggle-pw:hover { color: var(--text-dim); }
    .toggle-pw svg { width: 18px; height: 18px; }
    input[type="password"], input[type="text"].pw-field { padding-right: 42px; }

    .divider { height: 1px; background: var(--border); }

    .forgot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }
    .forgot a { font-size: 13px; color: var(--text-faint); transition: color 0.16s; }
    .forgot a:hover { color: var(--text-dim); }

    .attempt-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      display: none;
    }
    .attempt-badge.warn { display: inline-block; background: rgba(245,185,71,0.12); color: var(--warning); }
    .attempt-badge.danger { display: inline-block; background: rgba(239,68,68,0.12); color: var(--danger); }

    .alert {
      display: none;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
    }
    .alert.visible { display: block; }
    .alert-error   { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  color: var(--danger); }
    .alert-warning { background: rgba(245,185,71,0.08); border: 1px solid rgba(245,185,71,0.2); color: var(--warning); }
    .alert-success { background: rgba(34,197,94,0.08);  border: 1px solid rgba(34,197,94,0.2);  color: var(--success); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: var(--bg-base);
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, opacity 0.18s;
    }
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-footer { text-align: center; font-size: 13px; color: var(--text-faint); margin-top: 4px; }
    .form-footer a { color: var(--accent); font-weight: 500; }
    .form-footer a:hover { color: var(--accent-hover); }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-faint);
    }
    footer a { color: var(--text-faint); transition: color 0.16s; }
    footer a:hover { color: var(--text-dim); }

    @media (max-width: 480px) { .form { padding: 24px 20px; } }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">Zen<span class="green">Loot</span>X</a>
  </nav>

  <main>
    <div class="card">
      <div class="card-header">
        <h1>Welcome back</h1>
        <p>Sign in with your email or username.</p>
      </div>

      <form class="form" id="loginForm" novalidate>

        <div class="alert alert-error"   id="errorMsg"></div>
        <div class="alert alert-warning" id="warnMsg"></div>
        <div class="alert alert-success" id="successMsg"></div>

        <div class="field">
          <label for="identifier">Email or username</label>
          <input
            type="text"
            id="identifier"
            name="identifier"
            placeholder=""
            autocomplete="username"
            required
          >
        </div>

        <div class="divider"></div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder=""
              autocomplete="current-password"
              class="pw-field"
              required
            >
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
              <svg id="iconShow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12C3.75 7.5 7.5 4.5 12 4.5s8.25 3 9.75 7.5c-1.5 4.5-5.25 7.5-9.75 7.5S3.75 16.5 2.25 12Z"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              <svg id="iconHide" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 2.25 12c1.5 4.5 5.25 7.5 9.75 7.5a10.43 10.43 0 0 0 4.134-.832M6.53 6.53A9.956 9.956 0 0 1 12 4.5c4.5 0 8.25 3 9.75 7.5a10.49 10.49 0 0 1-1.397 2.853M6.53 6.53 3 3m3.53 3.53 11.94 11.94M6.53 6.53A9.955 9.955 0 0 0 9.88 9.88M17.47 17.47A9.955 9.955 0 0 1 14.12 14.12m0 0A3 3 0 0 0 9.88 9.88m4.24 4.24L9.88 9.88"/>
              </svg>
            </button>
          </div>
          <div class="forgot">
            <span class="attempt-badge" id="attemptBadge"></span>
            <a href="/forgot-password" id="forgotLink">Forgot password?</a>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>

        <div class="form-footer">
          Don't have an account? <a href="/register">Create one</a>
        </div>

      </form>
    </div>
  </main>

  <footer>
    <a href="/terms">Terms</a> · <a href="/privacy">Privacy</a> · © 2026 ZenLootX
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://msumlsqfergennhzxqon.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q'
    );

    const MAX_ATTEMPTS = 6;
    let failedAttempts = 0;
    let locked = false;

    // Password toggle
    const pwInput  = document.getElementById('password');
    const iconShow = document.getElementById('iconShow');
    const iconHide = document.getElementById('iconHide');
    document.getElementById('togglePw').addEventListener('click', () => {
      const vis = pwInput.type === 'text';
      pwInput.type           = vis ? 'password' : 'text';
      iconShow.style.display = vis ? '' : 'none';
      iconHide.style.display = vis ? 'none' : '';
    });

    function clearAlerts() {
      ['errorMsg', 'warnMsg', 'successMsg'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent = '';
        el.className = el.className.replace(' visible', '');
      });
    }
    function showError(msg)   { const el = document.getElementById('errorMsg');   el.textContent = msg; el.classList.add('visible'); }
    function showWarning(msg) { const el = document.getElementById('warnMsg');    el.textContent = msg; el.classList.add('visible'); }
    function showSuccess(msg) { const el = document.getElementById('successMsg'); el.textContent = msg; el.classList.add('visible'); }

    function updateAttemptBadge() {
      // Badge hidden — attempts tracked internally only
    }

    async function triggerReset(identifier) {
      const email = identifier.includes('@') ? identifier : null;
      locked = true;
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Sending reset email…';
      clearAlerts();
      if (!email) {
        showWarning('Too many failed attempts. Enter your email and click "Forgot password?" to reset.');
        document.getElementById('identifier').value = '';
        document.getElementById('identifier').focus();
        btn.textContent = 'Sign in';
        btn.disabled = false;
        locked = false;
        failedAttempts = 0;
        updateAttemptBadge();
        return;
      }
      try {
        await fetch('/api/send-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
      } catch {}
      showSuccess(`Too many failed attempts. A reset link has been sent to ${email}.`);
      btn.textContent = 'Reset email sent';
    }

    async function getEmailByUsername(username) {
      try {
        const res  = await fetch('/api/get-email-by-username', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username }),
        });
        if (!res.ok) return { email: null, serviceError: true };
        const { email } = await res.json();
        return { email: email || null, serviceError: false };
      } catch {
        return { email: null, serviceError: true };
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (locked) return;

      clearAlerts();
      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value;

      [document.getElementById('identifier'), document.getElementById('password')]
        .forEach(el => el.classList.remove('error'));

      if (!identifier) {
        document.getElementById('identifier').classList.add('error');
        showError('Enter your email or username.');
        return;
      }
      if (!password) {
        document.getElementById('password').classList.add('error');
        showError('Enter your password.');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        // Resolve email from username if needed
        let email = identifier;
        if (!identifier.includes('@')) {
          const result = await getEmailByUsername(identifier);
          if (result.serviceError) {
            showError('Unable to reach the server. Please try again or use your email to sign in.');
            btn.disabled    = false;
            btn.textContent = 'Sign in';
            return;
          }
          if (!result.email) {
            failedAttempts++;
            updateAttemptBadge();
            document.getElementById('identifier').classList.add('error');
            showError('Username not found. Check your username or sign in with your email.');
            btn.disabled    = false;
            btn.textContent = 'Sign in';
            return;
          }
          email = result.email;
        }

        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          failedAttempts++;
          updateAttemptBadge();
          btn.disabled    = false;
          btn.textContent = 'Sign in';

          if (failedAttempts >= MAX_ATTEMPTS) {
            await triggerReset(identifier);
            return;
          }

          // Check if email is registered to show the right error
          try {
            const checkRes = await fetch('/api/check-email', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email }),
            });
            const { exists } = await checkRes.json();
            if (!exists) {
              document.getElementById('identifier').classList.add('error');
              showError('This email is not registered. Create an account first.');
              return;
            }
          } catch {}

          document.getElementById('password').classList.add('error');
          const remaining = MAX_ATTEMPTS - failedAttempts;
          if (failedAttempts >= 4) {
            showError(`Incorrect password. ${remaining} attempt${remaining === 1 ? '' : 's'} left before a reset email is sent.`);
          } else {
            showError('Incorrect password. Please try again.');
          }
          return;
        }

        // Track session device info
        const ua = navigator.userAgent;
        let browser = 'Browser';
        if (/Edg\//.test(ua))            browser = 'Edge';
        else if (/OPR\/|Opera/.test(ua)) browser = 'Opera';
        else if (/Chrome\//.test(ua))    browser = 'Chrome';
        else if (/Firefox\//.test(ua))   browser = 'Firefox';
        else if (/Safari\//.test(ua))    browser = 'Safari';

        let device = 'Unknown device';
        if (/iPhone/.test(ua))           device = 'iPhone';
        else if (/iPad/.test(ua))        device = 'iPad';
        else if (/Android/.test(ua)) {
          const m = ua.match(/Android [\d.]+;\s*([^)]+?)(?:\s+Build\/|\s*\))/);
          device = m ? m[1].trim() : 'Android device';
        }
        else if (/Macintosh/.test(ua))   device = 'Mac';
        else if (/Windows NT/.test(ua))  device = 'Windows PC';
        else if (/Linux/.test(ua))       device = 'Linux PC';

        fetch('/api/track-session', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${data.session.access_token}`,
          },
          body: JSON.stringify({ userAgent: ua, deviceName: device, browser }),
        }).catch(() => {});

        // Success
        showSuccess('Signed in! Redirecting…');
        btn.textContent = 'Signed in!';
        setTimeout(() => { window.location.href = '/'; }, 1000);

      } catch {
        showError('Network error. Check your connection and try again.');
        btn.disabled    = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>

</body>
</html>
