<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/wallpaper/zx-icon-square.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:#0A0E0C;--bg-surface:#121814;--bg-elevated:#1A211C;
      --border:#232B26;--border-hi:#33403A;--accent:#19C37D;
      --accent-hover:#2FD98F;--accent-glow:rgba(25,195,125,0.15);
      --text:#E8EDE9;--text-dim:#9BA8A0;--text-faint:#6B776F;
      --danger:#EF4444;--warning:#F5B947;--success:#22C55E;
    }
    *, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
    body { background:var(--bg-base);color:var(--text);font-family:'Geist',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column; }
    a { text-decoration:none;color:inherit; }
    .container { max-width:720px;margin:0 auto;padding:0 16px; }

    nav { position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:rgba(10,14,12,0.9);backdrop-filter:blur(14px); }
    .nav-inner { display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:16px; }
    .logo { font-size:20px;font-weight:700;letter-spacing:-0.02em; }
    .logo .green { color:var(--accent); }
    .back-btn { display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--text-faint);background:none;border:none;cursor:pointer;padding:6px 0;transition:color 0.16s; }
    .back-btn:hover { color:var(--text); }

    main { flex:1;padding:28px 0 64px; }

    .page-head { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap; }
    .page-title { font-size:22px;font-weight:700;letter-spacing:-0.02em; }
    .mark-all-btn { font-size:13px;font-weight:500;color:var(--text-faint);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:8px;transition:color 0.16s,background 0.16s; }
    .mark-all-btn:hover { color:var(--accent);background:var(--accent-glow); }

    /* Notification items */
    .notif-list { display:flex;flex-direction:column;gap:2px; }

    .notif-item {
      display:flex;align-items:flex-start;gap:14px;
      padding:16px;border-radius:12px;cursor:pointer;
      border:1px solid transparent;
      transition:background 0.16s,border-color 0.16s;
      position:relative;
    }
    .notif-item:hover { background:var(--bg-surface);border-color:var(--border); }
    .notif-item.unread { background:var(--bg-surface);border-color:var(--border); }
    .notif-item.unread::before {
      content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);
      width:6px;height:6px;border-radius:50%;background:var(--accent);
    }

    .notif-icon {
      width:44px;height:44px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
    }
    .icon-announcement { background:rgba(25,195,125,0.1); }
    .icon-application  { background:rgba(245,185,71,0.1); }
    .icon-listing      { background:rgba(96,165,250,0.1); }
    .icon-general      { background:var(--bg-elevated); }

    .notif-content { flex:1;min-width:0; }
    .notif-title { font-size:14px;font-weight:600;line-height:1.4;margin-bottom:3px; }
    .notif-message { font-size:13px;color:var(--text-dim);line-height:1.55;margin-bottom:6px; }
    .notif-meta { display:flex;align-items:center;gap:8px;flex-wrap:wrap; }
    .notif-time { font-size:12px;color:var(--text-faint); }
    .notif-type-pill { font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:0.05em; }
    .pill-announcement { background:rgba(25,195,125,0.1);color:var(--accent); }
    .pill-application  { background:rgba(245,185,71,0.1);color:var(--warning); }
    .pill-listing      { background:rgba(96,165,250,0.1);color:#60A5FA; }
    .pill-general      { background:var(--bg-elevated);color:var(--text-faint); }

    /* Skeleton */
    .skeleton { background:var(--bg-elevated);border-radius:8px;animation:shimmer 1.4s infinite; }
    @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }
    .skeleton-item { display:flex;gap:14px;padding:16px; }

    /* Empty */
    .empty { text-align:center;padding:80px 24px; }
    .empty-icon { font-size:40px;margin-bottom:16px; }
    .empty h3 { font-size:18px;font-weight:600;margin-bottom:8px; }
    .empty p  { font-size:14px;color:var(--text-dim);max-width:300px;margin:0 auto; }

    footer { border-top:1px solid var(--border);padding:20px 0; }
    .footer-inner { display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px; }
    .footer-inner p { font-size:13px;color:var(--text-faint); }

    .notif-delete-btn {
      flex-shrink:0;align-self:flex-start;margin-top:2px;
      background:none;border:none;cursor:pointer;
      color:var(--text-faint);padding:4px;border-radius:6px;
      display:flex;align-items:center;justify-content:center;
      transition:color 0.16s,background 0.16s;opacity:0;
    }
    .notif-item:hover .notif-delete-btn { opacity:1; }
    .notif-delete-btn:hover { color:var(--danger);background:rgba(239,68,68,0.08); }
    .delete-all-btn {
      font-size:13px;font-weight:500;color:var(--text-faint);background:none;
      border:1px solid var(--border);cursor:pointer;padding:6px 12px;
      border-radius:8px;transition:color 0.16s,border-color 0.16s,background 0.16s;
    }
    .delete-all-btn:hover { color:var(--danger);border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.06); }
    .head-actions { display:flex;align-items:center;gap:8px; }

    @media (max-width:480px) {
      .notif-icon { width:38px;height:38px;font-size:18px;border-radius:10px; }
      .notif-title { font-size:13px; }
      .notif-message { font-size:12px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <a href="/" class="logo" style="display:flex;align-items:center;gap:8px;"><img src="/wallpaper/wow-logo-transparent.png" alt="ZenLootX" style="height:48px;width:auto;"></a>
        <button class="back-btn" onclick="history.back()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
          Back
        </button>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="page-head">
        <div>
          <div class="page-title">Notifications</div>
          <div id="unreadLabel" style="font-size:13px;color:var(--text-faint);margin-top:2px;"></div>
        </div>
        <div class="head-actions">
          <button class="mark-all-btn" id="markAllBtn" style="display:none;">Mark all as read</button>
          <button class="delete-all-btn" id="deleteAllBtn" style="display:none;">Delete all</button>
        </div>
      </div>

      <div id="notifList"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner"><p>© 2026 ZenLootX</p></div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/nav.js?v=7"></script>
  <script>
    const SUPABASE_URL = 'https://msumlsqfergennhzxqon.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const TYPE_ICON = {
      announcement: { icon: '📢', cls: 'icon-announcement', pill: 'pill-announcement', label: 'Announcement' },
      application:  { icon: '📋', cls: 'icon-application',  pill: 'pill-application',  label: 'Application'  },
      listing:      { icon: '🏷️', cls: 'icon-listing',      pill: 'pill-listing',      label: 'Listing'      },
      general:      { icon: '🔔', cls: 'icon-general',      pill: 'pill-general',      label: 'General'      },
    };

    function renderNotifications(notifications) {
      const list = document.getElementById('notifList');
      if (!notifications.length) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🔔</div>
            <h3>No notifications yet</h3>
            <p>You'll be notified here about your application, listings, and announcements.</p>
          </div>`;
        return;
      }

      const unread = notifications.filter(n => !n.read && n.user_id !== null);
      document.getElementById('unreadLabel').textContent = unread.length
        ? `${unread.length} unread`
        : 'All caught up';
      if (unread.length) document.getElementById('markAllBtn').style.display = '';
      document.getElementById('deleteAllBtn').style.display = '';

      list.innerHTML = `<div class="notif-list">${notifications.map(n => {
        const t = TYPE_ICON[n.type] || TYPE_ICON.general;
        const isUnread = !n.read && n.user_id !== null;
        return `
          <div class="notif-item ${isUnread ? 'unread' : ''}" data-id="${n.id}" data-link="${n.link || '/notifications'}" data-user-id="${n.user_id || ''}">
            <div class="notif-icon ${t.cls}">${t.icon}</div>
            <div class="notif-content">
              <div class="notif-title">${n.title}</div>
              <div class="notif-message">${n.message}</div>
              <div class="notif-meta">
                <span class="notif-time">${timeAgo(n.created_at)}</span>
                <span class="notif-type-pill ${t.pill}">${t.label}</span>
              </div>
            </div>
            <button class="notif-delete-btn" data-delete-id="${n.id}" title="Delete notification">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
            </button>
          </div>`;
      }).join('')}</div>`;

      document.querySelectorAll('.notif-item').forEach(el => {
        el.addEventListener('click', () => handleClick(el));
      });
      document.querySelectorAll('.notif-delete-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          deleteOne(btn.dataset.deleteId, btn.closest('.notif-item'));
        });
      });
    }

    async function handleClick(el) {
      const id     = el.dataset.id;
      const link   = el.dataset.link;
      const userId = el.dataset.userId;

      if (el.classList.contains('unread') && userId) {
        el.classList.remove('unread');
        await sb.from('notifications').update({ read: true }).eq('id', id);
        const label = document.getElementById('unreadLabel');
        const remaining = document.querySelectorAll('.notif-item.unread').length;
        label.textContent = remaining ? `${remaining} unread` : 'All caught up';
        if (!remaining) document.getElementById('markAllBtn').style.display = 'none';
      }

      if (link && link !== '/notifications') window.location.href = link;
    }

    async function markAllRead(userId) {
      await sb.from('notifications').update({ read: true }).eq('user_id', userId).eq('read', false);
      document.querySelectorAll('.notif-item.unread').forEach(el => el.classList.remove('unread'));
      document.getElementById('unreadLabel').textContent = 'All caught up';
      document.getElementById('markAllBtn').style.display = 'none';
    }

    async function deleteOne(id, el) {
      await sb.from('notifications').delete().eq('id', id);
      el.style.transition = 'opacity 0.2s';
      el.style.opacity = '0';
      setTimeout(() => {
        el.remove();
        const remaining = document.querySelectorAll('.notif-item').length;
        if (!remaining) {
          document.getElementById('deleteAllBtn').style.display = 'none';
          document.getElementById('markAllBtn').style.display = 'none';
          document.getElementById('notifList').innerHTML = `
            <div class="empty">
              <div class="empty-icon">🔔</div>
              <h3>No notifications yet</h3>
              <p>You'll be notified here about your application, listings, and announcements.</p>
            </div>`;
        }
        const unread = document.querySelectorAll('.notif-item.unread').length;
        document.getElementById('unreadLabel').textContent = unread ? `${unread} unread` : 'All caught up';
        if (!unread) document.getElementById('markAllBtn').style.display = 'none';
      }, 200);
    }

    async function deleteAll(userId) {
      if (!await zConfirm('This will remove all your notifications.', { title: 'Delete all notifications?', confirmText: 'Delete all', confirmDanger: true })) return;
      await sb.from('notifications').delete().eq('user_id', userId);
      document.getElementById('deleteAllBtn').style.display = 'none';
      document.getElementById('markAllBtn').style.display = 'none';
      document.getElementById('unreadLabel').textContent = '';
      document.getElementById('notifList').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🔔</div>
          <h3>No notifications yet</h3>
          <p>You'll be notified here about your application, listings, and announcements.</p>
        </div>`;
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login'; return; }
      const user = session.user;

      // Skeleton
      document.getElementById('notifList').innerHTML = [1,2,3].map(() => `
        <div class="skeleton-item">
          <div class="skeleton" style="width:44px;height:44px;border-radius:12px;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
            <div class="skeleton" style="height:14px;width:55%;"></div>
            <div class="skeleton" style="height:12px;width:80%;"></div>
            <div class="skeleton" style="height:11px;width:30%;"></div>
          </div>
        </div>`).join('');

      const { data, error } = await sb
        .from('notifications')
        .select('*')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false })
        .limit(100);

      if (error) {
        document.getElementById('notifList').innerHTML = `
          <div style="padding:40px 0;text-align:center;font-size:14px;color:var(--danger);">
            Could not load notifications. Please refresh.
          </div>`;
        return;
      }

      renderNotifications(data || []);

      document.getElementById('markAllBtn').addEventListener('click', () => markAllRead(user.id));
      document.getElementById('deleteAllBtn').addEventListener('click', () => deleteAll(user.id));
    }

    init();
  </script>
</body>
</html>
