<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/wallpaper/zx-icon-square.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Profile — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:#0A0E0C;--bg-surface:#121814;--bg-elevated:#1A211C;
      --border:#232B26;--border-hi:#33403A;--accent:#19C37D;
      --accent-hover:#2FD98F;--accent-glow:rgba(25,195,125,0.15);
      --text:#E8EDE9;--text-dim:#9BA8A0;--text-faint:#6B776F;
      --danger:#EF4444;--warning:#F5B947;--success:#22C55E;
    }
    *, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
    body { background:var(--bg-base);color:var(--text);font-family:'Geist',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column; }
    a { text-decoration:none;color:inherit; }
    .container { max-width:1200px;margin:0 auto;padding:0 20px; }

    /* NAV */
    nav { position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:rgba(10,14,12,0.9);backdrop-filter:blur(14px); }
    .nav-inner { display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:16px; }
    .logo { font-size:20px;font-weight:700;letter-spacing:-0.02em; }
    .logo .green { color:var(--accent); }
    .back-btn { display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--text-faint);background:none;border:none;cursor:pointer;padding:6px 0;transition:color 0.16s; }
    .back-btn:hover { color:var(--text); }

    /* BUTTONS */
    .btn { display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-family:'Geist',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.18s;text-decoration:none;white-space:nowrap; }
    .btn-primary  { background:var(--accent);color:var(--bg-base);border-color:var(--accent); }
    .btn-primary:hover  { background:var(--accent-hover); }
    .btn-secondary { background:transparent;color:var(--text);border-color:var(--border-hi); }
    .btn-secondary:hover { background:var(--bg-elevated); }

    main { flex:1;padding:32px 0 64px; }

    /* PROFILE HEADER */
    .profile-header {
      position:relative;
      background:var(--bg-surface);border:1px solid var(--border);
      border-radius:16px;padding:28px 24px;
      display:flex;gap:24px;align-items:flex-start;
      margin-bottom:28px;
    }
    .profile-actions {
      position:absolute;top:16px;right:16px;
      display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;
    }
    .profile-avatar {
      width:88px;height:88px;flex-shrink:0;border-radius:50%;
      background:var(--accent-glow);border:2px solid var(--accent);
      display:flex;align-items:center;justify-content:center;
      font-size:32px;font-weight:700;color:var(--accent);overflow:hidden;
    }
    .profile-avatar img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .profile-body { flex:1;min-width:0; }

    .username-row { display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:2px; }
    .username-wrap { display:flex;align-items:center;gap:10px;flex-wrap:wrap; }
    .profile-username { font-size:24px;font-weight:700;letter-spacing:-0.02em; }
    .verified-badge {
      display:inline-flex;align-items:center;gap:5px;
      background:rgba(25,195,125,0.1);border:1px solid rgba(25,195,125,0.25);
      border-radius:999px;padding:3px 10px;
      font-size:11px;font-weight:600;color:var(--accent);
    }
    .profile-since { font-size:13px;color:var(--text-faint);margin-bottom:16px; }

    .profile-stats { display:flex;gap:28px;margin-bottom:16px; }
    .stat-num   { font-size:22px;font-weight:700;line-height:1; }
    .stat-label { font-size:12px;color:var(--text-faint);margin-top:3px; }

    .bio-text { font-size:14px;color:var(--text-dim);line-height:1.65; }

    .report-btn {
      display:inline-flex;align-items:center;gap:5px;flex-shrink:0;
      background:none;border:1px solid var(--border);border-radius:8px;
      padding:6px 12px;font-family:'Geist',sans-serif;font-size:12px;
      font-weight:500;color:var(--text-faint);cursor:pointer;
      transition:all 0.16s;
    }
    .report-btn:hover { color:var(--danger);border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.06); }

    /* TABS */
    .tabs { display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px; }
    .tab { background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:11px 20px;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;color:var(--text-dim);cursor:pointer;transition:color 0.16s,border-color 0.16s; }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--accent);border-bottom-color:var(--accent); }

    /* LISTING CARDS */
    .listings-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:14px; }
    .listing-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.18s,background 0.18s,box-shadow 0.18s,transform 0.18s;display:flex;flex-direction:column; }
    .listing-card:hover { border-color:var(--border-hi);background:var(--bg-elevated);box-shadow:0 0 28px var(--accent-glow);transform:translateY(-2px); }
    .listing-card a { display:flex;flex-direction:column;flex:1;text-decoration:none;color:inherit; }
    .card-img { height:150px;background:var(--bg-elevated);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden; }
    .card-img img { width:100%;height:100%;object-fit:cover; }
    .card-body { padding:12px 14px;flex:1;display:flex;flex-direction:column; }
    .card-tags { display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap; }
    .pill { display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px; }
    .pill-account { background:rgba(25,195,125,0.1);color:var(--accent); }
    .pill-items   { background:rgba(168,85,247,0.1);color:#C084FC; }
    .pill-topup   { background:rgba(245,185,71,0.08);color:#FBBF24; }
    .game-tag { display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:0.05em; }
    .tag-genshin  { background:rgba(245,185,71,0.12);color:#F5B947; }
    .tag-mlbb     { background:rgba(59,130,246,0.12);color:#60A5FA; }
    .tag-valorant { background:rgba(239,68,68,0.12);color:#F87171; }
    .card-title { font-size:13px;font-weight:600;line-height:1.4;margin-bottom:auto;padding-bottom:12px; }
    .card-footer { display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);margin-top:auto; }
    .card-price { font-size:18px;font-weight:700; }

    /* EMPTY / SKELETON */
    .empty-state { display:flex;flex-direction:column;align-items:center;text-align:center;padding:56px 24px;background:var(--bg-surface);border:1px solid var(--border);border-radius:12px; }
    .empty-icon { width:52px;height:52px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px; }
    .empty-state h3 { font-size:17px;font-weight:600;margin-bottom:6px; }
    .empty-state p  { font-size:13px;color:var(--text-dim);max-width:320px;line-height:1.65; }
    .skeleton { background:var(--bg-elevated);border-radius:6px;animation:shimmer 1.4s infinite; }
    @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* NAV DROPDOWN (shared) */
    .user-menu { position:relative; }
    .user-btn { display:flex;align-items:center;gap:8px;background:var(--bg-elevated);border:1px solid var(--border-hi);border-radius:8px;padding:8px 14px;cursor:pointer;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;color:var(--text);transition:border-color 0.18s; }
    .user-btn:hover { border-color:var(--accent); }
    .user-avatar { width:26px;height:26px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden; }
    .user-avatar img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .user-dropdown { display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;min-width:200px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:200; }
    .user-dropdown.open { display:block; }
    .dropdown-email { padding:12px 16px;font-size:12px;color:var(--text-faint);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .dropdown-item { display:flex;align-items:center;gap:8px;padding:11px 16px;font-size:14px;color:var(--text-dim);cursor:pointer;transition:background 0.16s,color 0.16s;text-decoration:none;width:100%;background:none;border:none;font-family:'Geist',sans-serif;text-align:left; }
    .dropdown-item:hover { background:var(--bg-elevated);color:var(--text); }
    .dropdown-item.danger { color:var(--danger); }
    .dropdown-item.danger:hover { background:rgba(239,68,68,0.08); }
    .dropdown-divider { height:1px;background:var(--border);margin:4px 0; }
    .dropdown-item svg { width:15px;height:15px;flex-shrink:0; }

    /* REPORT MODAL */
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg-surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,0.5);animation:modalIn 0.18s ease; }
    @keyframes modalIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .modal-head { display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border); }
    .modal-head h3 { font-size:16px;font-weight:600; }
    .modal-close { background:none;border:none;cursor:pointer;padding:4px;color:var(--text-faint);border-radius:6px;display:flex;transition:color 0.16s,background 0.16s; }
    .modal-close:hover { color:var(--text);background:var(--bg-elevated); }
    .modal-body { padding:24px;display:flex;flex-direction:column;gap:16px; }
    .modal-sub { font-size:13px;color:var(--text-dim); }
    .reasons { display:flex;flex-direction:column;gap:8px; }
    .reason-opt { display:flex;align-items:center;gap:12px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:border-color 0.16s; }
    .reason-opt:hover { border-color:var(--border-hi); }
    .reason-opt.selected { border-color:var(--accent);background:var(--accent-glow); }
    .reason-opt input[type="radio"] { accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;cursor:pointer; }
    .reason-opt label { font-size:14px;cursor:pointer; }
    textarea.report-details { background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:80px;width:100%;transition:border-color 0.18s; }
    textarea.report-details:focus { border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow); }
    textarea.report-details::placeholder { color:var(--text-faint); }
    .modal-foot { display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border); }
    .btn-danger-solid { background:var(--danger);color:#fff;border-color:var(--danger); }
    .btn-danger-solid:hover { background:#dc2626; }
    .btn-danger-solid:disabled { opacity:0.45;cursor:not-allowed; }
    .modal-success { padding:40px 24px;text-align:center; }
    .modal-success-icon { font-size:36px;margin-bottom:16px; }
    .modal-success h3 { font-size:18px;font-weight:600;margin-bottom:8px; }
    .modal-success p  { font-size:14px;color:var(--text-dim); }

    footer { border-top:1px solid var(--border);padding:20px 0; }
    .footer-inner { display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px; }
    .footer-inner p, .footer-inner a { font-size:13px;color:var(--text-faint); }
    .footer-inner a:hover { color:var(--text-dim); }

    /* RESPONSIVE */
    @media (max-width:768px) {
      .profile-header { flex-direction:column;align-items:center;text-align:center; }
      .username-row { justify-content:center; }
      .username-wrap { justify-content:center; }
      .profile-since { justify-content:center; }
      .profile-stats { justify-content:center; }
      .listings-grid { grid-template-columns:repeat(2,1fr); }
      .report-btn { display:none; } /* hidden on mobile to avoid clutter — accessible via other means */
    }
    @media (max-width:480px) {
      .listings-grid { grid-template-columns:1fr; }
      .profile-avatar { width:72px;height:72px;font-size:26px; }
      .profile-username { font-size:20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <a href="/" class="logo" style="display:flex;align-items:center;gap:8px;"><img src="/wallpaper/wow-logo-transparent.png" alt="ZenLootX" style="height:48px;width:auto;"></a>
        <div id="navActions">
          <button class="back-btn" onclick="history.back()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
            Back
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">

      <!-- Profile header skeleton -->
      <div id="profileWrap">
        <div class="profile-header">
          <div class="skeleton" style="width:88px;height:88px;border-radius:50%;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:10px;">
            <div class="skeleton" style="height:24px;width:160px;"></div>
            <div class="skeleton" style="height:13px;width:120px;"></div>
            <div class="skeleton" style="height:14px;width:80%;"></div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" id="tabs" style="display:none;">
        <button class="tab active" data-tab="listings">Listings</button>
        <button class="tab"        data-tab="reviews">Reviews</button>
      </div>

      <div id="panelListings"></div>
      <div id="panelReviews" hidden>
        <div id="reviewsWrap"></div>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <p>© 2026 ZenLootX</p>
        <div style="display:flex;gap:20px;">
          <a href="/terms">Terms</a>
          <a href="/privacy">Privacy</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/nav.js?v=11"></script>
  <script>
    const SUPABASE_URL = 'https://msumlsqfergennhzxqon.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function sanitize(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    const GAME_META = { genshin:{cls:'tag-genshin',label:'Genshin'}, mlbb:{cls:'tag-mlbb',label:'MLBB'}, valorant:{cls:'tag-valorant',label:'Valorant'} };
    const TYPE_META = { account:['pill-account','Account'], items:['pill-items','Items'], topup:['pill-topup','Top-up'] };

    function listingCard(l) {
      const img = Array.isArray(l.images) && l.images[0]
        ? `<img src="${l.images[0]}" alt="${l.title}" loading="lazy">`
        : `<span>🎮</span>`;
      const price = new Intl.NumberFormat('en-US',{style:'currency',currency:l.currency||'USD',minimumFractionDigits:0}).format(l.price);
      const gt = GAME_META[l.game] || {cls:'',label:l.game};
      const [pc,pl] = TYPE_META[l.type] || ['',l.type];
      return `
        <div class="listing-card">
          <a href="/listings/detail?id=${l.id}">
            <div class="card-img">${img}</div>
            <div class="card-body">
              <div class="card-tags">
                <span class="game-tag ${gt.cls}">${gt.label}</span>
                <span class="pill ${pc}">${pl}</span>
              </div>
              <div class="card-title">${l.title}</div>
              <div class="card-footer">
                <div class="card-price">${price}</div>
              </div>
            </div>
          </a>
        </div>`;
    }

    // ── Tier System ───────────────────────────────────────────────
    const TIERS = [
      {tier:1,name:'Stone',min:0,color:'#9CA3AF'},{tier:2,name:'Iron',min:500,color:'#D1D5DB'},
      {tier:3,name:'Bronze',min:2000,color:'#F59E0B'},{tier:4,name:'Silver',min:5000,color:'#E5E7EB'},
      {tier:5,name:'Gold',min:10000,color:'#FDE68A'},{tier:6,name:'Platinum',min:25000,color:'#BAE6FD'},
      {tier:7,name:'Emerald',min:50000,color:'#6EE7B7'},{tier:8,name:'Sapphire',min:100000,color:'#93C5FD'},
      {tier:9,name:'Ruby',min:250000,color:'#FDA4AF'},{tier:10,name:'Diamond',min:500000,color:'url(#dg)'},
    ];
    async function loadTierBadge(userId) {
      try {
        const [{ data: txData }, { data: wallet }] = await Promise.all([
          sb.from('transactions').select('amount,type').eq('user_id', userId),
          sb.from('wallets').select('total_earned').eq('user_id', userId).maybeSingle(),
        ]);
        const txTotal     = (txData || []).filter(r => ['escrow','credit','refund'].includes(r.type)).reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
        const sellerTotal = parseFloat(wallet?.total_earned || 0);
        const total = Math.max(txTotal, sellerTotal);
        const t = [...TIERS].reverse().find(t => total >= t.min) || TIERS[0];

        const wrap  = document.getElementById('tierStatWrap');
        const label = document.getElementById('tierStatLabel');
        if (!wrap || !label) return;
        const iconSvg = getTierIcon(t.tier, t.color).replace('<svg ', '<svg width="20" height="20" ');
        label.innerHTML = `<span style="display:inline-flex;align-items:center;gap:4px;">${iconSvg}<span style="color:${t.color.startsWith('url')?'#a78bfa':t.color};font-weight:700;">${t.name}</span></span>`;
        wrap.style.display = '';

        // Real-time: re-calc when wallet changes
        sb.channel(`pub-tier-${userId}`)
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'wallets', filter: `user_id=eq.${userId}` }, () => {
            loadTierBadge(userId);
          })
          .subscribe();
      } catch {}
    }

    async function loadReviews(userId) {
      const wrap = document.getElementById('reviewsWrap');
      if (!wrap) return;

      const { data: reviews } = await sb
        .from('reviews')
        .select('rating,comment,created_at,reviewer_id')
        .eq('reviewee_id', userId)
        .order('created_at', { ascending: false });

      const countEl  = document.getElementById('reviewCount');
      const ratingEl = document.getElementById('profileRating');

      if (!reviews?.length) {
        if (countEl)  countEl.textContent  = '0';
        if (ratingEl) ratingEl.textContent = '';
        wrap.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">★</div>
            <h3>No reviews yet</h3>
            <p>Reviews from completed trades will appear here.</p>
          </div>`;
        updateReviewTab(0, 0);
        return;
      }

      const rIds = [...new Set(reviews.map(r => r.reviewer_id))];
      const { data: profiles } = await sb.from('profiles').select('id,username,avatar_url').in('id', rIds);
      const pMap = Object.fromEntries((profiles || []).map(p => [p.id, p]));

      const avg = (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1);
      if (countEl)  countEl.textContent  = reviews.length;
      if (ratingEl) ratingEl.textContent = `★ ${avg}`;
      updateReviewTab(reviews.length, avg);

      wrap.innerHTML = `
        <div style="display:flex;align-items:center;gap:16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:20px;">
          <div style="font-size:48px;font-weight:700;letter-spacing:-0.03em;color:var(--warning);">${avg}</div>
          <div>
            <div style="font-size:18px;color:var(--warning);">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))}</div>
            <div style="font-size:13px;color:var(--text-faint);margin-top:4px;">${reviews.length} review${reviews.length!==1?'s':''}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px;">
          ${reviews.map(r => {
            const p    = pMap[r.reviewer_id] || {};
            const name = p.username || 'Anonymous';
            const init = name.charAt(0).toUpperCase();
            const av   = p.avatar_url ? `<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : init;
            const date = new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
            const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
            return `
              <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                  <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden;">${av}</div>
                  <div style="flex:1;">
                    <div style="font-size:14px;font-weight:600;">${name}</div>
                    <div style="font-size:12px;color:var(--text-faint);">${date}</div>
                  </div>
                  <div style="font-size:16px;color:var(--warning);">${stars}</div>
                </div>
                ${r.comment ? `<p style="font-size:14px;color:var(--text-dim);line-height:1.65;">${sanitize(r.comment)}</p>` : ''}
              </div>`;
          }).join('')}
        </div>`;

      // Real-time subscription
      sb.channel(`pub-reviews-${userId}`)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reviews', filter: `reviewee_id=eq.${userId}` }, () => {
          loadReviews(userId);
        })
        .subscribe();
    }

    function updateReviewTab(count, avg) {
      const tab = document.querySelector('[data-tab="reviews"]');
      if (!tab) return;
      tab.textContent = count ? `Reviews (${count} · ★${avg})` : 'Reviews';
    }

    async function init() {
      const sellerId = new URLSearchParams(location.search).get('id');
      if (!sellerId) { document.getElementById('profileWrap').innerHTML = `<div style="text-align:center;padding:80px 0;color:var(--text-faint);">No seller ID provided.</div>`; return; }

      // Fetch profile + listings + verified seller status in parallel
      const [profileRes, listingsRes, sellerAppRes] = await Promise.all([
        sb.from('profiles').select('id,username,avatar_url,bio,created_at,is_banned,ban_reason,is_admin,last_active_at').eq('id', sellerId).single(),
        sb.from('listings').select('id,title,price,currency,type,images,game,created_at').eq('seller_id', sellerId).eq('status','active').order('created_at',{ascending:false}).limit(20),
        sb.from('seller_applications').select('status').eq('user_id', sellerId).eq('status','approved').maybeSingle(),
      ]);

      if (profileRes.error || !profileRes.data) {
        document.getElementById('profileWrap').innerHTML = `<div style="text-align:center;padding:80px 0;color:var(--text-faint);">Seller not found.</div>`;
        return;
      }

      const profile    = profileRes.data;
      const listings   = listingsRes.error ? [] : (listingsRes.data || []);
      const listingLoadFailed = !!listingsRes.error;
      const isVerified = !!sellerAppRes.data;
      const isBanned   = !!profile.is_banned;
      const joined = profile.created_at
        ? new Date(profile.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
        : '—';

      // Check viewer session
      const { data: { session } } = await sb.auth.getSession();
      const viewerIsOwner  = session?.user?.id === sellerId;
      const viewerIsAdmin  = session?.user?.app_metadata?.is_admin === true;
      const targetIsAdmin  = profile.is_admin === true;
      const showReport     = session && !viewerIsOwner && !viewerIsAdmin && !targetIsAdmin;
      const isAdmin        = viewerIsAdmin; // keep alias for rest of page

      document.getElementById('profileWrap').innerHTML = `
        <div class="profile-header">
          <div class="profile-actions">
            ${isAdmin && !viewerIsOwner ? `
              <button id="banBtn" style="display:inline-flex;align-items:center;gap:5px;flex-shrink:0;background:none;border:1px solid ${isBanned ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.3)'};border-radius:8px;padding:6px 12px;font-family:'Geist',sans-serif;font-size:12px;font-weight:600;color:${isBanned ? 'var(--success)' : '#F87171'};cursor:pointer;transition:all 0.16s;">
                ${isBanned ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 1 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg> Unban user` : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/></svg> Ban user`}
              </button>` : ''}
            ${showReport ? `
              <button class="report-btn" id="reportBtnEl">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v18m0-13.5 4-2.25L11 7.5l4-2.25 4 2.25V17.25l-4-2.25-4 2.25-4-2.25"/></svg>
                Report
              </button>` : ''}
          </div>
          <div class="profile-avatar" style="${isBanned ? 'opacity:0.5;' : ''}">
            ${profile.avatar_url ? `<img src="${profile.avatar_url}" alt="${profile.username}">` : profile.username.charAt(0).toUpperCase()}
          </div>
          <div class="profile-body">
            <div class="username-row">
              <div class="username-wrap">
                <div class="profile-username" style="${isBanned ? 'color:var(--text-faint);' : ''}">${profile.username}</div>
                <span id="profileRating" style="font-size:14px;color:var(--warning);font-weight:600;"></span>
                ${isBanned ? `<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600;color:#F87171;">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" width="11" height="11"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 0 0 5.636 5.636m12.728 12.728A9 9 0 0 1 5.636 5.636m12.728 12.728L5.636 5.636"/></svg>
                  Banned
                </span>` : ''}
              </div>
            </div>
            <div class="profile-since" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              <span>Member since ${joined}</span>
              ${profile.last_active_at && (Date.now() - new Date(profile.last_active_at).getTime()) < 180000 ? `<span style="font-size:12px;color:var(--success);font-weight:600;">● Online</span>` : ''}
            </div>
            ${isBanned && profile.ban_reason ? `<div style="font-size:12px;color:#F87171;margin-bottom:8px;">Ban reason: ${profile.ban_reason}</div>` : ''}
            <div class="profile-stats">
              <div><div class="stat-num">${listings.length}</div><div class="stat-label">Listings</div></div>
              <div><div class="stat-num" id="reviewCount">0</div><div class="stat-label">Reviews</div></div>
              <div id="tierStatWrap" style="display:none;"><div class="stat-num" id="tierStatLabel" style="font-size:14px;"></div><div class="stat-label">Tier</div></div>
            </div>
            ${profile.bio ? `<div class="bio-text">${sanitize(profile.bio)}</div>` : ''}
          </div>
        </div>`;

      // Wire ban button
      document.getElementById('banBtn')?.addEventListener('click', () => handleBan(sellerId, isBanned, session.access_token));

      // Wire report button
      document.getElementById('reportBtnEl')?.addEventListener('click', () => openReportModal(sellerId, session.user.id));

      // Show tabs + listings
      document.getElementById('tabs').style.display = '';
      document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          document.getElementById('panelListings').hidden = t.dataset.tab !== 'listings';
          document.getElementById('panelReviews').hidden  = t.dataset.tab !== 'reviews';
        });
      });

      if (listingLoadFailed) {
        document.getElementById('panelListings').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <h3>Could not load listings</h3>
            <p>There was a problem loading this seller's listings. Please refresh the page to try again.</p>
          </div>`;
      } else if (!listings.length) {
        document.getElementById('panelListings').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🏷️</div>
            <h3>No active listings</h3>
            <p>This seller doesn't have any active listings right now.</p>
          </div>`;
      } else {
        document.getElementById('panelListings').innerHTML = `<div class="listings-grid">${listings.map(listingCard).join('')}</div>`;
      }

      // Update page title
      document.title = `${profile.username} — ZenLootX`;

      // Load reviews and tier
      loadReviews(sellerId);
      loadTierBadge(sellerId);

      // Load nav
      if (session) initNav(session.user);
    }

    async function handleBan(userId, currentlyBanned, accessToken) {
      const action = currentlyBanned ? 'unban' : 'ban';
      let reason = null;

      if (!currentlyBanned) {
        reason = await zPrompt('Enter a ban reason. Only visible to you in the admin panel.', { title: 'Ban user', placeholder: 'e.g. spam, fraud, chargebacks…', optional: true });
        if (reason === null) return; // cancelled
      } else {
        if (!await zConfirm('Their listings will be restored and they can use the platform again.', { title: 'Unban this user?', confirmText: 'Unban' })) return;
      }

      const btn = document.getElementById('banBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Processing…'; }

      const res = await fetch('/api/admin/ban-user', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, action, reason: reason || null }),
      });

      if (res.ok) {
        window.location.reload();
      } else {
        const err = await res.json().catch(() => ({}));
        toast(err.error || 'Failed. Please try again.', 'error');
        if (btn) { btn.disabled = false; btn.textContent = currentlyBanned ? 'Unban user' : 'Ban user'; }
      }
    }

    function openReportModal(reportedId, reporterId) {
      const overlay   = document.getElementById('reportOverlay');
      const closeBtn  = document.getElementById('reportModalClose');
      const cancelBtn = document.getElementById('cancelReportBtn');
      const submitBtn = document.getElementById('submitReportBtn');
      const errorEl   = document.getElementById('reportError');

      // Reset
      document.querySelectorAll('input[name="reportReason"]').forEach(r => r.checked = false);
      document.querySelectorAll('.reason-opt').forEach(o => o.classList.remove('selected'));
      document.getElementById('reportDetails').value = '';
      errorEl.style.display = 'none';
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Submit report';

      // Re-grab after reset
      document.querySelectorAll('input[name="reportReason"]').forEach(radio => {
        radio.addEventListener('change', () => {
          document.querySelectorAll('.reason-opt').forEach(o => o.classList.remove('selected'));
          radio.closest('.reason-opt').classList.add('selected');
        });
      });

      const close = () => overlay.classList.remove('open');
      closeBtn.onclick  = close;
      cancelBtn.onclick = close;
      overlay.onclick   = e => { if (e.target === overlay) close(); };

      overlay.classList.add('open');

      // Re-bind submit after reset
      document.getElementById('submitReportBtn').addEventListener('click', async () => {
        const reason  = document.querySelector('input[name="reportReason"]:checked')?.value;
        const details = document.getElementById('reportDetails').value.trim();
        const errEl   = document.getElementById('reportError');
        errEl.style.display = 'none';

        if (!reason) {
          errEl.textContent  = 'Please select a reason.';
          errEl.style.display = '';
          return;
        }

        const btn = document.getElementById('submitReportBtn');
        btn.disabled    = true;
        btn.textContent = 'Submitting…';

        const { error } = await sb.from('reports').insert({
          reporter_id:      reporterId,
          reported_user_id: reportedId,
          reason,
          details:          details || null,
          status:           'pending',
        });

        btn.disabled    = false;
        btn.textContent = 'Submit report';

        if (error) {
          errEl.textContent  = 'Could not submit. Please try again.';
          errEl.style.display = '';
          return;
        }

        document.getElementById('reportModalBody').innerHTML = `
          <div class="modal-success">
            <div class="modal-success-icon">✓</div>
            <h3>Report submitted</h3>
            <p>Thank you for helping keep ZenLootX safe. We'll review this shortly.</p>
          </div>`;
        setTimeout(close, 2800);
      });
    }

    init();
  </script>

  <!-- Report Modal -->
  <div class="modal-overlay" id="reportOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3>Report User</h3>
        <button class="modal-close" id="reportModalClose">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="reportModalBody">
        <div class="modal-body">
          <p class="modal-sub">Help us keep ZenLootX safe. Select the reason for your report.</p>
          <div class="reasons" id="reasonsList">
            <label class="reason-opt"><input type="radio" name="reportReason" value="fraud"><span>Fraud or scam</span></label>
            <label class="reason-opt"><input type="radio" name="reportReason" value="wrong_listing"><span>Wrong or misleading listing</span></label>
            <label class="reason-opt"><input type="radio" name="reportReason" value="communication"><span>Poor communication or interaction</span></label>
            <label class="reason-opt"><input type="radio" name="reportReason" value="harassment"><span>Harassment or abusive behavior</span></label>
            <label class="reason-opt"><input type="radio" name="reportReason" value="other"><span>Other</span></label>
          </div>
          <textarea class="report-details" id="reportDetails" placeholder="Additional details (optional)" maxlength="500"></textarea>
          <div id="reportError" style="font-size:13px;color:var(--danger);display:none;"></div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-secondary" id="cancelReportBtn" style="padding:8px 16px;font-size:14px;">Cancel</button>
          <button class="btn btn-danger-solid" id="submitReportBtn" style="padding:8px 16px;font-size:14px;">Submit report</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
