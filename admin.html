<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:#0A0E0C;--bg-surface:#121814;--bg-elevated:#1A211C;
      --border:#232B26;--border-hi:#33403A;--accent:#19C37D;
      --accent-hover:#2FD98F;--accent-glow:rgba(25,195,125,0.15);
      --text:#E8EDE9;--text-dim:#9BA8A0;--text-faint:#6B776F;
      --danger:#EF4444;--warning:#F5B947;--success:#22C55E;
    }
    *, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
    body { background:var(--bg-base);color:var(--text);font-family:'Geist',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column; }
    a { text-decoration:none;color:inherit; }
    .container { max-width:1200px;margin:0 auto;padding:0 24px; }

    /* NAV */
    nav { position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:rgba(10,14,12,0.88);backdrop-filter:blur(14px); }
    .nav-inner { display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:24px; }
    .logo { font-size:20px;font-weight:700;letter-spacing:-0.02em; }
    .logo .green { color:var(--accent); }
    .admin-badge { font-size:11px;font-weight:600;background:rgba(239,68,68,0.12);color:#F87171;border:1px solid rgba(239,68,68,0.2);border-radius:999px;padding:3px 10px;letter-spacing:0.04em;text-transform:uppercase; }

    /* BUTTONS */
    .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'Geist',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.18s;text-decoration:none;white-space:nowrap; }
    .btn-primary   { background:var(--accent);color:var(--bg-base);border-color:var(--accent); }
    .btn-primary:hover   { background:var(--accent-hover); }
    .btn-secondary { background:transparent;color:var(--text);border-color:var(--border-hi); }
    .btn-secondary:hover { background:var(--bg-elevated); }
    .btn-danger    { background:transparent;color:var(--danger);border-color:rgba(239,68,68,0.3); }
    .btn-danger:hover    { background:rgba(239,68,68,0.08); }
    .btn-warning   { background:transparent;color:var(--warning);border-color:rgba(245,185,71,0.3); }
    .btn-warning:hover   { background:rgba(245,185,71,0.06); }
    .btn:disabled  { opacity:0.45;cursor:not-allowed;pointer-events:none; }
    .btn-sm { padding:6px 12px;font-size:12px; }

    main { flex:1;padding:40px 0 80px; }

    /* SECTION TABS */
    .section-nav { display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:32px; }
    .section-tab { background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:12px 20px;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;color:var(--text-faint);cursor:pointer;transition:color 0.16s,border-color 0.16s;display:flex;align-items:center;gap:8px; }
    .section-tab:hover { color:var(--text); }
    .section-tab.active { color:var(--text);border-bottom-color:var(--accent); }
    .tab-count { font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--bg-elevated); }
    .tab-count.has-items { background:rgba(245,185,71,0.15);color:var(--warning); }

    /* STATS ROW */
    .stats-row { display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px; }
    .stats-row-3 { grid-template-columns:repeat(3,1fr); }
    .stat-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px; }
    .stat-card-num { font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1; }
    .stat-card-label { font-size:12px;color:var(--text-faint);margin-top:6px; }
    .stat-card.s-pending  .stat-card-num { color:var(--warning); }
    .stat-card.s-approved .stat-card-num { color:var(--success); }
    .stat-card.s-rejected .stat-card-num { color:var(--danger); }
    .stat-card.s-reported .stat-card-num { color:#F87171; }

    /* FILTER ROW */
    .filter-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap; }
    .filter-tabs { display:flex;gap:4px; }
    .filter-tab { padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-faint);cursor:pointer;background:none;border:1px solid transparent;font-family:'Geist',sans-serif;transition:all 0.16s; }
    .filter-tab:hover { color:var(--text);background:var(--bg-elevated); }
    .filter-tab.active { background:var(--bg-elevated);border-color:var(--border-hi);color:var(--text); }
    .result-label { font-size:13px;color:var(--text-faint); }

    /* CARD LIST */
    .card-list { display:flex;flex-direction:column;gap:12px; }

    /* APPLICATION CARDS */
    .app-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:20px;transition:border-color 0.16s; }
    .app-card:hover { border-color:var(--border-hi); }
    .app-avatar { width:44px;height:44px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden; }
    .app-avatar img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .app-info { flex:1;min-width:0; }
    .app-name { font-size:15px;font-weight:600; }
    .app-sub  { font-size:12px;color:var(--text-faint);margin-top:2px; }
    .app-meta { display:flex;gap:16px;margin-top:8px;flex-wrap:wrap; }
    .app-meta-item { font-size:12px;color:var(--text-dim); }
    .app-meta-item span { color:var(--text-faint); }
    .app-right { display:flex;align-items:center;gap:10px;flex-shrink:0; }

    /* REPORT CARDS */
    .report-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;align-items:flex-start;gap:16px;transition:border-color 0.16s; }
    .report-card:hover { border-color:var(--border-hi); }
    .report-card.reviewed { opacity:0.6; }
    .report-icon { width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
    .report-body { flex:1;min-width:0; }
    .report-header { display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px; }
    .report-users { font-size:14px;font-weight:600; }
    .report-users span { color:var(--text-faint);font-weight:400; }
    .report-details { font-size:13px;color:var(--text-dim);line-height:1.6;margin-top:6px; }
    .report-date { font-size:12px;color:var(--text-faint);margin-top:6px; }
    .report-right { display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0; }

    /* DISPUTE CARDS */
    .dispute-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px; }
    .dispute-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:12px; }
    .dispute-id { font-size:12px;color:var(--text-faint);font-family:monospace; }
    .dispute-parties { display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:14px; }
    .dispute-vs { font-size:11px;color:var(--text-faint);background:var(--bg-elevated);padding:2px 8px;border-radius:4px; }
    .dispute-meta { display:flex;gap:16px;flex-wrap:wrap; }
    .dispute-meta-item { font-size:12px;color:var(--text-dim); }
    .dispute-meta-item span { color:var(--text-faint); }
    .dispute-actions { display:flex;gap:8px;margin-top:14px; }
    .resolution-area { display:none;flex-direction:column;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border); }
    .resolution-area.open { display:flex; }

    /* STATUS BADGES */
    .status-badge { display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em; }
    .badge-pending   { background:rgba(245,185,71,0.12);color:var(--warning); }
    .badge-approved  { background:rgba(34,197,94,0.1);color:var(--success); }
    .badge-rejected  { background:rgba(239,68,68,0.1);color:var(--danger); }
    .badge-reviewed  { background:rgba(155,168,160,0.1);color:var(--text-faint); }
    .badge-open      { background:rgba(239,68,68,0.1);color:var(--danger); }
    .badge-resolved  { background:rgba(34,197,94,0.1);color:var(--success); }

    /* REASON PILLS */
    .reason-pill { display:inline-flex;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em; }
    .reason-fraud       { background:rgba(239,68,68,0.12);color:#F87171; }
    .reason-wrong       { background:rgba(245,185,71,0.12);color:var(--warning); }
    .reason-communication { background:rgba(96,165,250,0.1);color:#60A5FA; }
    .reason-harassment  { background:rgba(239,68,68,0.15);color:#FB923C; }
    .reason-other       { background:rgba(155,168,160,0.1);color:var(--text-faint); }

    /* EMPTY & LOADING */
    .empty-state { text-align:center;padding:64px 24px;background:var(--bg-surface);border:1px solid var(--border);border-radius:12px; }
    .empty-icon { font-size:36px;margin-bottom:12px; }
    .empty-state h3 { font-size:17px;font-weight:600;margin-bottom:6px; }
    .empty-state p  { font-size:14px;color:var(--text-dim);max-width:360px;margin:0 auto; }
    .skeleton { background:var(--bg-elevated);border-radius:8px;animation:shimmer 1.4s infinite; }
    @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* MODAL */
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);z-index:500;align-items:flex-start;justify-content:center;padding:32px 20px;overflow-y:auto; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg-surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;box-shadow:0 24px 64px rgba(0,0,0,0.5);animation:modalIn 0.18s ease;margin:auto; }
    @keyframes modalIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .modal-head { display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border); }
    .modal-head h3 { font-size:17px;font-weight:600; }
    .modal-close { background:none;border:none;cursor:pointer;padding:4px;color:var(--text-faint);border-radius:6px;display:flex;transition:color 0.16s,background 0.16s; }
    .modal-close:hover { color:var(--text);background:var(--bg-elevated); }
    .modal-body { padding:24px;display:flex;flex-direction:column;gap:20px; }
    .modal-foot { display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border); }
    .modal-error { font-size:12px;color:var(--danger);margin-right:auto; }
    .info-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
    .info-item label { font-size:11px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:3px; }
    .info-item span { font-size:14px;color:var(--text); }
    .section-label { font-size:13px;font-weight:600;color:var(--text-dim);padding-bottom:10px;border-bottom:1px solid var(--border); }
    .id-photos { display:grid;grid-template-columns:repeat(3,1fr);gap:12px; }
    .id-photo-wrap { display:flex;flex-direction:column;gap:6px; }
    .id-photo-label { font-size:11px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em; }
    .id-photo-box { aspect-ratio:4/3;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.16s; }
    .id-photo-box:hover { border-color:var(--accent); }
    .id-photo-box img { width:100%;height:100%;object-fit:cover; }
    .id-photo-none { font-size:12px;color:var(--text-faint);text-align:center; }
    .reject-area { display:none;flex-direction:column;gap:8px; }
    .reject-area.open { display:flex; }
    textarea.modal-textarea { background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:70px;width:100%;transition:border-color 0.18s; }
    textarea.modal-textarea:focus { border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow); }
    textarea.modal-textarea::placeholder { color:var(--text-faint); }

    /* LIGHTBOX */
    .lightbox { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;align-items:center;justify-content:center;cursor:zoom-out; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain; }

    footer { border-top:1px solid var(--border);padding:20px 0; }
    .footer-inner { display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px; }
    .footer-inner p { font-size:13px;color:var(--text-faint); }

    @media (max-width:768px) {
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .app-card  { flex-direction:column;align-items:flex-start; }
      .report-card { flex-direction:column; }
      .info-grid { grid-template-columns:1fr; }
      .id-photos { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <div style="display:flex;align-items:center;gap:12px;">
          <a href="/" class="logo">Zen<span class="green">Loot</span>X</a>
          <span class="admin-badge">Admin</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span id="adminName" style="font-size:13px;color:var(--text-faint);"></span>
          <button class="btn btn-secondary" id="signOutBtn">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div id="pageContent"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner"><p>© 2026 ZenLootX — Admin</p></div>
    </div>
  </footer>

  <!-- Application review modal -->
  <div class="modal-overlay" id="reviewOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Application</h3>
        <button class="modal-close" id="modalClose">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <!-- Ban modal -->
  <div class="modal-overlay" id="banOverlay">
    <div class="modal" style="max-width:420px;">
      <div class="modal-head">
        <h3 id="banModalTitle">Ban user</h3>
        <button class="modal-close" id="banModalClose">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" style="gap:14px;">
        <p style="font-size:13px;color:var(--text-dim);" id="banModalDesc"></p>
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">Reason <span style="color:var(--text-faint);font-weight:400;text-transform:none;">(optional)</span></label>
          <textarea id="banReasonInput" placeholder="e.g. Repeated fraud reports, scamming buyers…" maxlength="300"
            style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:80px;transition:border-color 0.18s;"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"></textarea>
        </div>
        <div id="banModalError" style="font-size:13px;color:var(--danger);display:none;"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" id="banCancelBtn" style="padding:8px 16px;font-size:14px;">Cancel</button>
        <button class="btn" id="banConfirmBtn" style="padding:8px 16px;font-size:14px;background:var(--danger);color:#fff;border-color:var(--danger);">Ban user</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="ID Photo">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://msumlsqfergennhzxqon.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let token = '';
    let activeSection = 'applications';
    let allApps = [], allReports = [], allDisputes = [], allListings = [];
    let appFilter = 'pending', reportFilter = 'pending';
    let rejectOpen = false;
    let appError = null, reportsError = null, disputesError = null, listingsError = null;

    // ── Init ──
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/admin-login'; return; }

      if (!session.user.app_metadata?.is_admin) {
        document.getElementById('pageContent').innerHTML = `
          <div style="text-align:center;padding:80px 24px;">
            <div style="font-size:48px;margin-bottom:16px;">🚫</div>
            <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;">Access denied</h2>
            <p style="color:var(--text-dim);">You do not have admin access.</p>
          </div>`;
        return;
      }

      token = session.access_token;
      document.getElementById('adminName').textContent = session.user.user_metadata?.username || session.user.email;
      document.getElementById('signOutBtn').addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = '/admin-login'; });
      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('reviewOverlay').addEventListener('click', e => { if (e.target === document.getElementById('reviewOverlay')) closeModal(); });
      document.getElementById('lightbox').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));

      await Promise.all([loadApplications(), loadReports(), loadDisputes(), loadListings()]);
      renderShell();
    }

    // ── Data loading ──
    async function loadApplications() {
      try {
        // Query directly via Supabase client — admin RLS policy allows this
        const { data, error } = await sb
          .from('seller_applications')
          .select('*')
          .order('submitted_at', { ascending: false });

        if (error) { appError = error.message; return; }

        allApps  = (data || []).map(app => ({ ...app, _user: {} }));
        appError = null;

        // Try to enrich with user info (email, username, avatar) via CF function
        // Silently skipped if CF function is unavailable
        try {
          const res = await fetch('/api/admin/get-applications', {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.ok) {
            const enriched = await res.json();
            if (enriched.applications?.length) allApps = enriched.applications;
          }
        } catch {}

      } catch (e) { appError = e.message; }
    }

    async function loadReports() {
      try {
        // Try CF function first (enriches with email from auth.users)
        const res  = await fetch('/api/admin/get-reports', { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (res.ok && data.reports) {
          allReports   = data.reports;
          reportsError = null;
          return;
        }
      } catch {}

      // Fallback: query directly + enrich from profiles table
      try {
        const { data: reports, error } = await sb
          .from('reports')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) { reportsError = error.message; return; }

        const raw = reports || [];
        const ids = [...new Set(raw.flatMap(r => [r.reporter_id, r.reported_user_id].filter(Boolean)))];

        let profileMap = {};
        if (ids.length) {
          const { data: profs } = await sb.from('profiles').select('id,username').in('id', ids);
          (profs || []).forEach(p => { profileMap[p.id] = p; });
        }

        allReports = raw.map(r => ({
          ...r,
          _reporter: profileMap[r.reporter_id]  || {},
          _reported: profileMap[r.reported_user_id] || {},
        }));
        reportsError = null;
      } catch (e) { reportsError = e.message; }
    }

    async function loadDisputes() {
      try {
        const res  = await fetch('/api/admin/get-disputes', { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (!res.ok) { disputesError = data.error || `HTTP ${res.status}`; return; }
        allDisputes   = data.disputes || [];
        disputesError = null;
      } catch (e) { disputesError = e.message; }
    }

    async function loadListings() {
      try {
        const { data, error } = await sb
          .from('listings')
          .select('id, title, price, currency, game, type, status, created_at, seller_id')
          .order('created_at', { ascending: false });
        if (error) { listingsError = error.message; return; }
        allListings   = data || [];
        listingsError = null;
      } catch (e) { listingsError = e.message; }
    }

    async function retryLoad() {
      await Promise.all([loadApplications(), loadReports(), loadDisputes(), loadListings()]);
      renderShell();
    }

    // ── Shell with section tabs ──
    function renderShell() {
      const pendingApps     = allApps.filter(a => a.status === 'pending').length;
      const pendingReports  = allReports.filter(r => r.status === 'pending').length;
      const openDisputes    = allDisputes.filter(d => d.status === 'open').length;

      document.getElementById('pageContent').innerHTML = `
        <div class="section-nav">
          <button class="section-tab ${activeSection === 'applications' ? 'active' : ''}" data-section="applications">
            Seller Applications
            <span class="tab-count ${pendingApps > 0 ? 'has-items' : ''}">${pendingApps}</span>
          </button>
          <button class="section-tab ${activeSection === 'reports' ? 'active' : ''}" data-section="reports">
            User Reports
            <span class="tab-count ${pendingReports > 0 ? 'has-items' : ''}">${pendingReports}</span>
          </button>
          <button class="section-tab ${activeSection === 'disputes' ? 'active' : ''}" data-section="disputes">
            Disputes
            <span class="tab-count ${openDisputes > 0 ? 'has-items' : ''}">${openDisputes}</span>
          </button>
          <button class="section-tab ${activeSection === 'listings' ? 'active' : ''}" data-section="listings">
            Listings
            <span class="tab-count">${allListings.length}</span>
          </button>
          <button class="section-tab ${activeSection === 'notifications' ? 'active' : ''}" data-section="notifications">
            Send Notification
          </button>
        </div>
        <div id="sectionContent"></div>`;

      document.querySelectorAll('.section-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeSection = btn.dataset.section;
          renderShell();
        });
      });

      renderActiveSection();
    }

    function renderActiveSection() {
      if (activeSection === 'applications')  renderApplications();
      if (activeSection === 'reports')       renderReports();
      if (activeSection === 'disputes')      renderDisputes();
      if (activeSection === 'listings')      renderListings();
      if (activeSection === 'notifications') renderNotificationSender();
    }

    // ════════════════════════════════════
    // SECTION 1 — SELLER APPLICATIONS
    // ════════════════════════════════════
    function renderApplications() {
      if (appError) {
        document.getElementById('sectionContent').innerHTML = `
          <div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:28px 24px;text-align:center;">
            <div style="font-size:28px;margin-bottom:12px;">⚠️</div>
            <div style="font-size:14px;font-weight:600;color:var(--danger);margin-bottom:6px;">Could not load applications</div>
            <div style="font-size:13px;color:var(--text-faint);margin-bottom:16px;">${appError}</div>
            <button onclick="retryLoad()" class="btn btn-secondary btn-sm">Retry</button>
          </div>`;
        return;
      }
      const pending  = allApps.filter(a => a.status === 'pending').length;
      const approved = allApps.filter(a => a.status === 'approved').length;
      const rejected = allApps.filter(a => a.status === 'rejected').length;
      const filtered = appFilter === 'all' ? allApps : allApps.filter(a => a.status === appFilter);

      document.getElementById('sectionContent').innerHTML = `
        <div class="stats-row">
          <div class="stat-card s-pending"><div class="stat-card-num">${pending}</div><div class="stat-card-label">Pending review</div></div>
          <div class="stat-card s-approved"><div class="stat-card-num">${approved}</div><div class="stat-card-label">Approved sellers</div></div>
          <div class="stat-card s-rejected"><div class="stat-card-num">${rejected}</div><div class="stat-card-label">Rejected</div></div>
          <div class="stat-card"><div class="stat-card-num">${allApps.length}</div><div class="stat-card-label">Total applications</div></div>
        </div>
        <div class="filter-row">
          <div class="filter-tabs">
            ${['pending','approved','rejected'].map(f => `
              <button class="filter-tab ${appFilter === f ? 'active' : ''}" data-appfilter="${f}">
                ${f.charAt(0).toUpperCase() + f.slice(1)}
              </button>`).join('')}
          </div>
          <span class="result-label">${filtered.length} result${filtered.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="card-list">
          ${filtered.length ? filtered.map(appCard).join('') : `<div class="empty-state"><div class="empty-icon">📋</div><h3>No applications</h3><p>No ${appFilter !== 'all' ? appFilter : ''} applications found.</p></div>`}
        </div>`;

      document.querySelectorAll('[data-appfilter]').forEach(btn => {
        btn.addEventListener('click', () => { appFilter = btn.dataset.appfilter; renderApplications(); });
      });
      document.querySelectorAll('.review-btn').forEach(btn => {
        btn.addEventListener('click', () => { const app = allApps.find(a => a.id === btn.dataset.id); if (app) openAppModal(app); });
      });
    }

    function appCard(app) {
      const user = app._user || {};
      const name = app.full_name || '—';
      const email = user.email || '—';
      const username = user.username || email.split('@')[0];
      const initial = name.charAt(0).toUpperCase();
      const date = new Date(app.submitted_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const badgeCls = { pending:'badge-pending', approved:'badge-approved', rejected:'badge-rejected' }[app.status] || '';

      return `
        <div class="app-card">
          <div class="app-avatar">${user.avatar_url ? `<img src="${user.avatar_url}">` : initial}</div>
          <div class="app-info">
            <div class="app-name">${name}</div>
            <div class="app-sub">${username} · ${email}</div>
            <div class="app-meta">
              <div class="app-meta-item"><span>Country:</span> ${app.country}</div>
              <div class="app-meta-item"><span>ID:</span> ${formatIdType(app.id_type)}</div>
              <div class="app-meta-item"><span>Applied:</span> ${date}</div>
              ${app.rejection_reason ? `<div class="app-meta-item" style="color:var(--danger);"><span>Reason:</span> ${app.rejection_reason}</div>` : ''}
            </div>
          </div>
          <div class="app-right">
            <span class="status-badge ${badgeCls}">${app.status}</span>
            <button class="btn btn-secondary btn-sm review-btn" data-id="${app.id}">Review</button>
          </div>
        </div>`;
    }

    // ════════════════════════════════════
    // SECTION 2 — USER REPORTS
    // ════════════════════════════════════
    function renderReports() {
      if (reportsError) {
        document.getElementById('sectionContent').innerHTML = `
          <div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:28px 24px;text-align:center;">
            <div style="font-size:28px;margin-bottom:12px;">⚠️</div>
            <div style="font-size:14px;font-weight:600;color:var(--danger);margin-bottom:6px;">Could not load reports</div>
            <div style="font-size:13px;color:var(--text-faint);margin-bottom:16px;">${reportsError}</div>
            <button onclick="retryLoad()" class="btn btn-secondary btn-sm">Retry</button>
          </div>`;
        return;
      }
      const pending  = allReports.filter(r => r.status === 'pending').length;
      const reviewed = allReports.filter(r => r.status === 'reviewed').length;
      const filtered = reportFilter === 'all' ? allReports : allReports.filter(r => r.status === reportFilter);

      document.getElementById('sectionContent').innerHTML = `
        <div class="stats-row stats-row-3">
          <div class="stat-card s-reported"><div class="stat-card-num">${pending}</div><div class="stat-card-label">Needs review</div></div>
          <div class="stat-card s-approved"><div class="stat-card-num">${reviewed}</div><div class="stat-card-label">Reviewed</div></div>
          <div class="stat-card"><div class="stat-card-num">${allReports.length}</div><div class="stat-card-label">Total reports</div></div>
        </div>
        <div class="filter-row">
          <div class="filter-tabs">
            ${['pending','reviewed'].map(f => `
              <button class="filter-tab ${reportFilter === f ? 'active' : ''}" data-reportfilter="${f}">
                ${f.charAt(0).toUpperCase() + f.slice(1)}
              </button>`).join('')}
          </div>
          <span class="result-label">${filtered.length} report${filtered.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="card-list">
          ${filtered.length ? filtered.map(reportCard).join('') : `<div class="empty-state"><div class="empty-icon">🏳️</div><h3>No reports</h3><p>No ${reportFilter !== 'all' ? reportFilter : ''} reports found.</p></div>`}
        </div>`;

      document.querySelectorAll('[data-reportfilter]').forEach(btn => {
        btn.addEventListener('click', () => { reportFilter = btn.dataset.reportfilter; renderReports(); });
      });
      document.querySelectorAll('.dismiss-report-btn').forEach(btn => {
        btn.addEventListener('click', () => dismissReport(btn.dataset.id, btn));
      });
      document.querySelectorAll('.ban-user-btn').forEach(btn => {
        btn.addEventListener('click', () => adminBanUser(btn.dataset.uid, btn.dataset.name, btn));
      });
    }

    function adminBanUser(userId, username, triggerBtn) {
      const overlay    = document.getElementById('banOverlay');
      const closeBtn   = document.getElementById('banModalClose');
      const cancelBtn  = document.getElementById('banCancelBtn');
      const confirmBtn = document.getElementById('banConfirmBtn');
      const reasonEl   = document.getElementById('banReasonInput');
      const errEl      = document.getElementById('banModalError');

      document.getElementById('banModalTitle').textContent = `Ban ${username}`;
      document.getElementById('banModalDesc').textContent  = `This will immediately kick ${username} off the site, hide all their listings, and block them from logging back in.`;
      reasonEl.value        = '';
      errEl.style.display   = 'none';
      confirmBtn.disabled   = false;
      confirmBtn.textContent = 'Ban user';

      const close = () => overlay.classList.remove('open');
      closeBtn.onclick  = close;
      cancelBtn.onclick = close;
      overlay.onclick   = e => { if (e.target === overlay) close(); };
      overlay.classList.add('open');

      confirmBtn.onclick = async () => {
        const reason = reasonEl.value.trim() || null;
        confirmBtn.disabled    = true;
        confirmBtn.textContent = 'Banning…';
        errEl.style.display    = 'none';

        const res = await fetch('/api/admin/ban-user', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, action: 'ban', reason }),
        });

        if (res.ok) {
          close();
          if (triggerBtn) { triggerBtn.textContent = '✓ Banned'; triggerBtn.style.color = 'var(--success)'; triggerBtn.disabled = true; }
          await loadReports();
          renderShell();
        } else {
          const err = await res.json().catch(() => ({}));
          errEl.textContent  = err.error || 'Failed to ban. Try again.';
          errEl.style.display = '';
          confirmBtn.disabled    = false;
          confirmBtn.textContent = 'Ban user';
        }
      };
    }

    function reportCard(r) {
      const reasons = {
        fraud:          { label:'Fraud / Scam',          cls:'reason-fraud' },
        wrong_listing:  { label:'Wrong listing',          cls:'reason-wrong' },
        communication:  { label:'Poor communication',    cls:'reason-communication' },
        harassment:     { label:'Harassment',            cls:'reason-harassment' },
        other:          { label:'Other',                 cls:'reason-other' },
      };
      const rInfo   = reasons[r.reason] || { label: r.reason, cls: 'reason-other' };
      const date    = new Date(r.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const icons   = { fraud:'🚨', wrong_listing:'⚠️', communication:'💬', harassment:'🚫', other:'🏳️' };
      const isPending = r.status !== 'reviewed';

      const reporterName  = r._reporter?.username || r._reporter?.email?.split('@')[0] || r.reporter_id?.slice(0,8)  || 'Unknown';
      const reportedName  = r._reported?.username || r._reported?.email?.split('@')[0] || r.reported_user_id?.slice(0,8) || 'Unknown';

      return `
        <div class="report-card ${!isPending ? 'reviewed' : ''}">
          <div class="report-icon" style="background:var(--bg-elevated);">${icons[r.reason] || '🏳️'}</div>
          <div class="report-body">
            <div class="report-header">
              <span class="reason-pill ${rInfo.cls}">${rInfo.label}</span>
              <span class="status-badge ${isPending ? 'badge-pending' : 'badge-reviewed'}">${r.status}</span>
            </div>
            <div class="report-users">
              ${reporterName} <span>reported</span> ${reportedName}
            </div>
            ${r.details ? `<div class="report-details">"${r.details}"</div>` : ''}
            <div class="report-date">${date}</div>
          </div>
          <div class="report-right">
            ${isPending ? `<button class="btn btn-secondary btn-sm dismiss-report-btn" data-id="${r.id}">Mark reviewed</button>` : `<span style="font-size:12px;color:var(--text-faint);">Reviewed</span>`}
            <a href="/public-profile?id=${r.reported_user_id}" target="_blank" class="btn btn-secondary btn-sm" style="font-size:11px;">View profile</a>
            <button class="btn btn-danger btn-sm ban-user-btn" data-uid="${r.reported_user_id}" data-name="${reportedName}" style="font-size:11px;">Ban user</button>
          </div>
        </div>`;
    }

    async function dismissReport(reportId, btn) {
      btn.disabled    = true;
      btn.textContent = 'Saving…';

      const { error } = await sb
        .from('reports')
        .update({ status: 'reviewed' })
        .eq('id', reportId);

      if (!error) {
        // Update in-memory so we don't need a full reload
        allReports = allReports.map(r => r.id === reportId ? { ...r, status: 'reviewed' } : r);
        renderShell();
      } else {
        btn.disabled    = false;
        btn.textContent = 'Mark reviewed';
        alert('Failed: ' + error.message);
      }
    }

    // ════════════════════════════════════
    // SECTION 3 — DISPUTES
    // ════════════════════════════════════
    function renderDisputes() {
      const open     = allDisputes.filter(d => d.status === 'open').length;
      const resolved = allDisputes.filter(d => d.status === 'resolved').length;

      document.getElementById('sectionContent').innerHTML = `
        <div class="stats-row stats-row-3">
          <div class="stat-card s-rejected"><div class="stat-card-num">${open}</div><div class="stat-card-label">Open disputes</div></div>
          <div class="stat-card s-approved"><div class="stat-card-num">${resolved}</div><div class="stat-card-label">Resolved</div></div>
          <div class="stat-card"><div class="stat-card-num">${allDisputes.length}</div><div class="stat-card-label">Total disputes</div></div>
        </div>
        ${allDisputes.length ? allDisputes.map(disputeCard).join('') : `
          <div class="empty-state">
            <div class="empty-icon">⚖️</div>
            <h3>No disputes yet</h3>
            <p>Disputes from buyer–seller transactions will appear here once the orders and escrow system is live. You'll be able to review evidence and release or refund funds from this panel.</p>
          </div>`}`;

      document.querySelectorAll('.resolve-dispute-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleResolutionArea(btn.dataset.id));
      });
      document.querySelectorAll('.submit-resolution-btn').forEach(btn => {
        btn.addEventListener('click', () => submitResolution(btn.dataset.id, btn));
      });
    }

    function disputeCard(d) {
      const date       = new Date(d.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const buyerName  = d._buyer?.username  || 'Buyer';
      const sellerName = d._seller?.username || 'Seller';
      const isOpen     = d.status === 'open';

      return `
        <div class="dispute-card">
          <div class="dispute-header">
            <span class="dispute-id">DISPUTE-${d.id.slice(0,8).toUpperCase()}</span>
            <span class="status-badge ${isOpen ? 'badge-open' : 'badge-resolved'}">${d.status}</span>
          </div>
          <div class="dispute-parties">
            <strong>${buyerName}</strong>
            <span class="dispute-vs">VS</span>
            <strong>${sellerName}</strong>
          </div>
          <div class="dispute-meta">
            <div class="dispute-meta-item"><span>Reason:</span> ${d.reason || '—'}</div>
            <div class="dispute-meta-item"><span>Amount:</span> ${d.amount ? `₱${d.amount}` : '—'}</div>
            <div class="dispute-meta-item"><span>Filed:</span> ${date}</div>
          </div>
          ${d.buyer_message ? `<div style="margin-top:10px;font-size:13px;color:var(--text-dim);background:var(--bg-elevated);padding:10px 14px;border-radius:8px;line-height:1.6;">"${d.buyer_message}"</div>` : ''}
          ${isOpen ? `
            <div class="dispute-actions">
              <button class="btn btn-primary btn-sm resolve-dispute-btn" data-id="${d.id}">Resolve dispute</button>
            </div>
            <div class="resolution-area" id="resArea_${d.id}">
              <label style="font-size:13px;font-weight:500;color:var(--text-dim);">Resolution decision</label>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-primary btn-sm resolution-action-btn" data-id="${d.id}" data-action="refund_buyer">Refund buyer</button>
                <button class="btn btn-secondary btn-sm resolution-action-btn" data-id="${d.id}" data-action="release_seller">Release to seller</button>
              </div>
              <textarea class="modal-textarea" id="resNote_${d.id}" placeholder="Resolution notes (shown to both parties)…" style="min-height:60px;"></textarea>
              <button class="btn btn-secondary btn-sm submit-resolution-btn" data-id="${d.id}">Confirm resolution</button>
            </div>` : `
            ${d.resolution_notes ? `<div style="margin-top:10px;font-size:13px;color:var(--text-dim);background:var(--accent-glow);border:1px solid rgba(25,195,125,0.15);padding:10px 14px;border-radius:8px;">✓ ${d.resolution_notes}</div>` : ''}`}
        </div>`;
    }

    function toggleResolutionArea(id) {
      const area = document.getElementById(`resArea_${id}`);
      if (area) area.classList.toggle('open');
    }

    async function submitResolution(id, btn) {
      const action = document.querySelector(`.resolution-action-btn[data-id="${id}"].active`)?.dataset.action || null;
      const note   = document.getElementById(`resNote_${id}`)?.value.trim() || '';
      if (!action) { alert('Select refund buyer or release to seller first.'); return; }

      btn.disabled = true;
      btn.textContent = 'Saving…';

      const res = await fetch('/api/admin/resolve-dispute', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ disputeId: id, action, notes: note }),
      });

      if (res.ok) { await loadDisputes(); renderShell(); }
      else { btn.disabled = false; btn.textContent = 'Confirm resolution'; }
    }

    // Handle resolution action button selection
    document.addEventListener('click', e => {
      if (e.target.classList.contains('resolution-action-btn')) {
        const id = e.target.dataset.id;
        document.querySelectorAll(`.resolution-action-btn[data-id="${id}"]`).forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
      }
    });

    // ════════════════════════════════════
    // APP REVIEW MODAL
    // ════════════════════════════════════
    function openAppModal(app) {
      const user    = app._user || {};
      const date    = new Date(app.submitted_at).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
      const isPending = app.status === 'pending';

      document.getElementById('modalTitle').textContent = `${app.full_name} — ${app.status.charAt(0).toUpperCase() + app.status.slice(1)}`;
      document.getElementById('modalBody').innerHTML = `
        <div>
          <div class="section-label" style="margin-bottom:14px;">Personal Information</div>
          <div class="info-grid">
            <div class="info-item"><label>Full name</label><span>${app.full_name}</span></div>
            <div class="info-item"><label>Phone</label><span>${app.phone}</span></div>
            <div class="info-item"><label>Country</label><span>${app.country}</span></div>
            <div class="info-item"><label>Date of birth</label><span>${app.date_of_birth || '—'}</span></div>
            <div class="info-item"><label>Email</label><span>${user.email || '—'}</span></div>
            <div class="info-item"><label>Username</label><span>${user.username || '—'}</span></div>
            <div class="info-item"><label>ID type</label><span>${formatIdType(app.id_type)}</span></div>
            <div class="info-item"><label>Applied</label><span>${date}</span></div>
          </div>
        </div>
        ${app.bio ? `<div><div class="section-label" style="margin-bottom:10px;">Seller bio</div><p style="font-size:14px;color:var(--text-dim);line-height:1.65;">${app.bio}</p></div>` : ''}
        <div>
          <div class="section-label" style="margin-bottom:14px;">ID Documents</div>
          <div class="id-photos">
            ${idPhotoBox('Front of ID', app.id_front_path, 'front')}
            ${idPhotoBox('Back of ID', app.id_back_path, 'back')}
            ${idPhotoBox('Verification Photo', app.id_verification_path, 'verification')}
          </div>
        </div>
        ${isPending ? `<div class="reject-area" id="rejectArea"><label style="font-size:13px;font-weight:500;color:var(--text-dim);">Rejection reason (optional)</label><textarea class="modal-textarea" id="rejectReason" placeholder="Explain why this application is rejected…"></textarea></div>` : ''}
        <div id="modalError" style="font-size:13px;color:var(--danger);display:none;"></div>`;

      if (app.id_front_path)        loadSignedPhoto('front',        app.id_front_path);
      if (app.id_back_path)         loadSignedPhoto('back',         app.id_back_path);
      if (app.id_verification_path) loadSignedPhoto('verification', app.id_verification_path);

      const foot = document.getElementById('modalFoot');
      if (isPending) {
        foot.innerHTML = `
          <span class="modal-error" id="modalErrMsg"></span>
          <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
          <button class="btn btn-danger"    id="rejectBtn">Reject</button>
          <button class="btn btn-primary"   id="approveBtn">✓ Approve</button>`;
        document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
        document.getElementById('rejectBtn').addEventListener('click', () => {
          if (!rejectOpen) {
            document.getElementById('rejectArea').classList.add('open');
            rejectOpen = true;
            document.getElementById('rejectBtn').textContent = 'Confirm Reject';
            document.getElementById('rejectBtn').onclick = () => submitAppReview(app, 'reject');
          }
        });
        document.getElementById('approveBtn').addEventListener('click', () => submitAppReview(app, 'approve'));
      } else {
        foot.innerHTML = `<button class="btn btn-secondary" id="modalCancelBtn">Close</button>`;
        document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
      }

      document.getElementById('reviewOverlay').classList.add('open');
    }

    function idPhotoBox(label, path, key) {
      if (!path) return `<div class="id-photo-wrap"><div class="id-photo-label">${label}</div><div class="id-photo-box" style="cursor:default;"><span class="id-photo-none">Not provided</span></div></div>`;
      return `<div class="id-photo-wrap"><div class="id-photo-label">${label}</div><div class="id-photo-box loading" id="photoBox_${key}"><span class="id-photo-none" style="font-size:11px;">Loading…</span></div></div>`;
    }

    async function loadSignedPhoto(key, path) {
      const box = document.getElementById(`photoBox_${key}`);
      if (!box) return;
      box.classList.remove('loading');

      function showPhoto(url) {
        box.innerHTML = `<img src="${url}" alt="${key}" loading="lazy">`;
        box.addEventListener('click', () => {
          document.getElementById('lightboxImg').src = url;
          document.getElementById('lightbox').classList.add('open');
        });
      }

      // Try Supabase client directly (requires admin storage RLS policy)
      try {
        const { data } = await sb.storage.from('id_documents').createSignedUrl(path, 3600);
        if (data?.signedUrl) { showPhoto(data.signedUrl); return; }
      } catch {}

      // Fall back to CF function
      try {
        const res  = await fetch('/api/admin/get-signed-url', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ path }),
        });
        const cfData = await res.json();
        if (cfData.url) { showPhoto(cfData.url); return; }
      } catch {}

      box.innerHTML = `<span class="id-photo-none" style="font-size:11px;">Failed to load</span>`;
      box.style.cursor = 'default';
    }

    async function submitAppReview(app, action) {
      const approveBtn = document.getElementById('approveBtn');
      const rejectBtn  = document.getElementById('rejectBtn');
      const errEl      = document.getElementById('modalErrMsg');
      const reason     = document.getElementById('rejectReason')?.value?.trim() || '';

      if (approveBtn) { approveBtn.disabled = true; approveBtn.textContent = 'Processing…'; }
      if (rejectBtn)  { rejectBtn.disabled  = true; }
      if (errEl) errEl.textContent = '';

      const newStatus = action === 'approve' ? 'approved' : 'rejected';
      const updateData = {
        status:      newStatus,
        reviewed_at: new Date().toISOString(),
        ...(action === 'reject' && reason ? { rejection_reason: reason } : {}),
      };

      // Update seller_applications directly via Supabase client
      const { error } = await sb
        .from('seller_applications')
        .update(updateData)
        .eq('id', app.id);

      if (error) {
        if (errEl) errEl.textContent = error.message || 'Failed to update. Please try again.';
        if (approveBtn) { approveBtn.disabled = false; approveBtn.textContent = '✓ Approve'; }
        if (rejectBtn)  { rejectBtn.disabled  = false; }
        return;
      }

      // Try to update user's is_seller flag via CF function (best-effort)
      try {
        await fetch('/api/admin/review-application', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ applicationId: app.id, userId: app.user_id, action, reason }),
        });
      } catch {}

      closeModal();
      await loadApplications();
      renderShell();
    }

    // ════════════════════════════════════
    // SECTION 5 — SEND NOTIFICATION
    // ════════════════════════════════════
    function renderNotificationSender() {
      document.getElementById('sectionContent').innerHTML = `
        <div style="max-width:600px;">
          <div class="stat-card" style="margin-bottom:24px;padding:16px 20px;">
            <div style="font-size:13px;color:var(--text-dim);line-height:1.6;">
              Send a notification to all users (broadcast) or a specific user. It will appear in their
              <strong style="color:var(--text);">Notifications</strong> page and as a
              <strong style="color:var(--text);">device push notification</strong> if they enabled it.
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:18px;">

            <div>
              <label style="font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">Title</label>
              <input id="notifTitle" type="text" placeholder="e.g. Your application was approved"
                style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color 0.18s;"
                onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
            </div>

            <div>
              <label style="font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">Message</label>
              <textarea id="notifMessage" placeholder="Write your message here…"
                style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:90px;transition:border-color 0.18s;"
                onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"></textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
              <div>
                <label style="font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">Type</label>
                <select id="notifType"
                  style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;cursor:pointer;">
                  <option value="announcement">📢 Announcement</option>
                  <option value="application">📋 Application Update</option>
                  <option value="listing">🏷️ Listing Update</option>
                  <option value="general">🔔 General</option>
                </select>
              </div>
              <div>
                <label style="font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">Link (optional)</label>
                <input id="notifLink" type="text" placeholder="/notifications"
                  style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color 0.18s;"
                  onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
              </div>
            </div>

            <div>
              <label style="font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">Recipients</label>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <label style="display:flex;align-items:center;gap:8px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;font-size:14px;flex:1;min-width:140px;">
                  <input type="radio" name="notifTarget" value="all" checked style="accent-color:var(--accent);"> All users
                </label>
                <label style="display:flex;align-items:center;gap:8px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;font-size:14px;flex:1;min-width:140px;">
                  <input type="radio" name="notifTarget" value="user" style="accent-color:var(--accent);"> Specific user
                </label>
              </div>
            </div>

            <div id="userIdWrap" style="display:none;">
              <label style="font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">User ID</label>
              <input id="notifUserId" type="text" placeholder="Paste the user's UUID from Supabase"
                style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color 0.18s;"
                onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
            </div>

            <div id="notifError" style="font-size:13px;color:var(--danger);display:none;"></div>
            <div id="notifSuccess" style="font-size:13px;color:var(--success);display:none;"></div>

            <div>
              <button class="btn btn-primary" id="sendNotifBtn" style="padding:11px 28px;font-size:14px;">
                Send notification
              </button>
            </div>
          </div>
        </div>`;

      document.querySelectorAll('input[name="notifTarget"]').forEach(r => {
        r.addEventListener('change', () => {
          document.getElementById('userIdWrap').style.display = r.value === 'user' ? '' : 'none';
        });
      });

      document.getElementById('sendNotifBtn').addEventListener('click', submitNotification);
    }

    async function submitNotification() {
      const btn     = document.getElementById('sendNotifBtn');
      const errEl   = document.getElementById('notifError');
      const succEl  = document.getElementById('notifSuccess');
      const title   = document.getElementById('notifTitle').value.trim();
      const message = document.getElementById('notifMessage').value.trim();
      const type    = document.getElementById('notifType').value;
      const link    = document.getElementById('notifLink').value.trim() || '/notifications';
      const target  = document.querySelector('input[name="notifTarget"]:checked')?.value;
      const userId  = target === 'user' ? document.getElementById('notifUserId').value.trim() : null;

      errEl.style.display  = 'none';
      succEl.style.display = 'none';

      if (!title)   { errEl.textContent = 'Title is required.';   errEl.style.display = ''; return; }
      if (!message) { errEl.textContent = 'Message is required.'; errEl.style.display = ''; return; }
      if (target === 'user' && !userId) { errEl.textContent = 'Paste the user UUID.'; errEl.style.display = ''; return; }

      btn.disabled    = true;
      btn.textContent = 'Sending…';

      const res  = await fetch('/api/admin/send-notification', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, message, type, link, userId }),
      });
      const data = await res.json();

      btn.disabled    = false;
      btn.textContent = 'Send notification';

      if (!res.ok) {
        errEl.textContent  = data.error || 'Failed to send. Try again.';
        errEl.style.display = '';
        return;
      }

      succEl.textContent  = `Sent! Saved to notifications DB. Push delivered to ${data.pushSent ?? 0} of ${data.totalSubs ?? 0} subscribed device(s).`;
      succEl.style.display = '';
      document.getElementById('notifTitle').value   = '';
      document.getElementById('notifMessage').value = '';
      document.getElementById('notifLink').value    = '';
    }

    // ════════════════════════════════════
    // SECTION 4 — LISTINGS
    // ════════════════════════════════════
    function renderListings() {
      const GAME_LABEL = { genshin:'Genshin', mlbb:'MLBB', valorant:'Valorant' };
      const TYPE_LABEL = { account:'Account', items:'Items', topup:'Top-up' };

      document.getElementById('sectionContent').innerHTML = `
        <div class="stats-row stats-row-3">
          <div class="stat-card"><div class="stat-card-num">${allListings.filter(l=>l.status==='active').length}</div><div class="stat-card-label">Active</div></div>
          <div class="stat-card"><div class="stat-card-num">${allListings.filter(l=>l.status!=='active').length}</div><div class="stat-card-label">Inactive / other</div></div>
          <div class="stat-card"><div class="stat-card-num">${allListings.length}</div><div class="stat-card-label">Total listings</div></div>
        </div>
        ${listingsError ? `<div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:20px 24px;font-size:14px;color:var(--danger);">${listingsError}</div>` : ''}
        <div class="card-list">
          ${allListings.length ? allListings.map(l => {
            const price = new Intl.NumberFormat('en-US',{style:'currency',currency:l.currency||'USD',minimumFractionDigits:0}).format(l.price);
            const date  = new Date(l.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
            const badgeCls = l.status === 'active' ? 'badge-approved' : 'badge-reviewed';
            return `
              <div class="app-card" id="listingRow_${l.id}">
                <div class="app-info">
                  <div class="app-name">${l.title}</div>
                  <div class="app-meta">
                    <div class="app-meta-item"><span>Game:</span> ${GAME_LABEL[l.game]||l.game}</div>
                    <div class="app-meta-item"><span>Type:</span> ${TYPE_LABEL[l.type]||l.type}</div>
                    <div class="app-meta-item"><span>Price:</span> ${price}</div>
                    <div class="app-meta-item"><span>Created:</span> ${date}</div>
                  </div>
                </div>
                <div class="app-right">
                  <span class="status-badge ${badgeCls}">${l.status}</span>
                  <button class="btn btn-danger btn-sm delete-listing-btn" data-id="${l.id}">Delete</button>
                </div>
              </div>`;
          }).join('') : `<div class="empty-state"><div class="empty-icon">🏷️</div><h3>No listings</h3><p>No listings in the database.</p></div>`}
        </div>`;

      document.querySelectorAll('.delete-listing-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteListing(btn.dataset.id, btn));
      });
    }

    async function deleteListing(id, btn) {
      if (!confirm('Delete this listing? This cannot be undone.')) return;
      btn.disabled    = true;
      btn.textContent = 'Deleting…';

      const res = await fetch('/api/admin/delete-listing', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ listingId: id }),
      });

      if (res.ok) {
        allListings = allListings.filter(l => l.id !== id);
        renderShell();
      } else {
        btn.disabled    = false;
        btn.textContent = 'Delete';
        const err = await res.json().catch(() => ({}));
        alert(err.error || 'Failed to delete. Try again.');
      }
    }

    function closeModal() {
      document.getElementById('reviewOverlay').classList.remove('open');
      rejectOpen = false;
    }

    // ── Helpers ──
    function formatIdType(t) {
      const map = { passport:'Passport', drivers_license:"Driver's License", national_id:'National ID (PhilSys)', sss:'SSS ID', pagibig:'Pag-IBIG ID', philhealth:'PhilHealth ID', voters_id:"Voter's ID", postal_id:'Postal ID', other:'Other Gov. ID' };
      return map[t] || t;
    }

    init();
  </script>
