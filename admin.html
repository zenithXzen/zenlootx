<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:#0A0E0C;--bg-surface:#121814;--bg-elevated:#1A211C;
      --border:#232B26;--border-hi:#33403A;--accent:#19C37D;
      --accent-hover:#2FD98F;--accent-glow:rgba(25,195,125,0.15);
      --text:#E8EDE9;--text-dim:#9BA8A0;--text-faint:#6B776F;
      --danger:#EF4444;--warning:#F5B947;--success:#22C55E;
    }
    *, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
    body { background:var(--bg-base);color:var(--text);font-family:'Geist',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column; }
    a { text-decoration:none;color:inherit; }
    .container { max-width:1200px;margin:0 auto;padding:0 24px; }

    nav { position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:rgba(10,14,12,0.88);backdrop-filter:blur(14px); }
    .nav-inner { display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:24px; }
    .logo { font-size:20px;font-weight:700;letter-spacing:-0.02em; }
    .logo .green { color:var(--accent); }
    .admin-badge { font-size:11px;font-weight:600;background:rgba(239,68,68,0.12);color:#F87171;border:1px solid rgba(239,68,68,0.2);border-radius:999px;padding:3px 10px;letter-spacing:0.04em;text-transform:uppercase; }

    .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'Geist',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.18s;text-decoration:none;white-space:nowrap; }
    .btn-primary  { background:var(--accent);color:var(--bg-base);border-color:var(--accent); }
    .btn-primary:hover  { background:var(--accent-hover); }
    .btn-secondary { background:transparent;color:var(--text);border-color:var(--border-hi); }
    .btn-secondary:hover { background:var(--bg-elevated); }
    .btn-danger   { background:transparent;color:var(--danger);border-color:rgba(239,68,68,0.3); }
    .btn-danger:hover   { background:rgba(239,68,68,0.08); }
    .btn:disabled { opacity:0.45;cursor:not-allowed;pointer-events:none; }
    .btn-sm { padding:6px 12px;font-size:12px; }

    main { flex:1;padding:40px 0 80px; }

    /* STATS */
    .stats-row { display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px; }
    .stat-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px; }
    .stat-card-num { font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1; }
    .stat-card-label { font-size:12px;color:var(--text-faint);margin-top:6px; }
    .stat-card.pending .stat-card-num { color:var(--warning); }
    .stat-card.approved .stat-card-num { color:var(--success); }
    .stat-card.rejected .stat-card-num { color:var(--danger); }

    /* FILTER */
    .filter-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap; }
    .filter-tabs { display:flex;gap:4px; }
    .filter-tab { padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-faint);cursor:pointer;background:none;border:1px solid transparent;font-family:'Geist',sans-serif;transition:all 0.16s; }
    .filter-tab:hover { color:var(--text);background:var(--bg-elevated); }
    .filter-tab.active { background:var(--bg-elevated);border-color:var(--border-hi);color:var(--text); }
    .result-label { font-size:13px;color:var(--text-faint); }

    /* APPLICATION LIST */
    .app-list { display:flex;flex-direction:column;gap:12px; }

    .app-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:20px;transition:border-color 0.16s; }
    .app-card:hover { border-color:var(--border-hi); }
    .app-avatar { width:44px;height:44px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden; }
    .app-avatar img { width:100%;height:100%;object-fit:cover;border-radius:50%; }

    .app-info { flex:1;min-width:0; }
    .app-name { font-size:15px;font-weight:600; }
    .app-sub  { font-size:12px;color:var(--text-faint);margin-top:2px; }
    .app-meta { display:flex;gap:16px;margin-top:8px;flex-wrap:wrap; }
    .app-meta-item { font-size:12px;color:var(--text-dim); }
    .app-meta-item span { color:var(--text-faint); }

    .app-right { display:flex;align-items:center;gap:10px;flex-shrink:0; }

    .status-badge { display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em; }
    .badge-pending  { background:rgba(245,185,71,0.12);color:var(--warning); }
    .badge-approved { background:rgba(34,197,94,0.1);color:var(--success); }
    .badge-rejected { background:rgba(239,68,68,0.1);color:var(--danger); }

    /* EMPTY & LOADING */
    .empty-state { text-align:center;padding:64px 24px;background:var(--bg-surface);border:1px solid var(--border);border-radius:12px; }
    .empty-state p { font-size:14px;color:var(--text-dim);margin-top:8px; }
    .skeleton { background:var(--bg-elevated);border-radius:8px;animation:shimmer 1.4s infinite; }
    @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* MODAL */
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);z-index:500;align-items:flex-start;justify-content:center;padding:32px 20px;overflow-y:auto; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg-surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;box-shadow:0 24px 64px rgba(0,0,0,0.5);animation:modalIn 0.18s ease;margin:auto; }
    @keyframes modalIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .modal-head { display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border); }
    .modal-head h3 { font-size:17px;font-weight:600; }
    .modal-close { background:none;border:none;cursor:pointer;padding:4px;color:var(--text-faint);border-radius:6px;display:flex;transition:color 0.16s,background 0.16s; }
    .modal-close:hover { color:var(--text);background:var(--bg-elevated); }

    .modal-body { padding:24px;display:flex;flex-direction:column;gap:20px; }

    .info-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
    .info-item label { font-size:11px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:3px; }
    .info-item span  { font-size:14px;color:var(--text); }

    .id-photos { display:grid;grid-template-columns:repeat(3,1fr);gap:12px; }
    .id-photo-wrap { display:flex;flex-direction:column;gap:6px; }
    .id-photo-label { font-size:11px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em; }
    .id-photo-box { aspect-ratio:4/3;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.16s; }
    .id-photo-box:hover { border-color:var(--accent); }
    .id-photo-box img { width:100%;height:100%;object-fit:cover; }
    .id-photo-box.loading { animation:shimmer 1.4s infinite; }
    .id-photo-none { font-size:12px;color:var(--text-faint);text-align:center; }

    .section-label { font-size:13px;font-weight:600;color:var(--text-dim);padding-bottom:10px;border-bottom:1px solid var(--border); }

    .reject-area { display:none;flex-direction:column;gap:8px; }
    .reject-area.open { display:flex; }
    textarea.reject-reason { background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:70px;width:100%;transition:border-color 0.18s,box-shadow 0.18s; }
    textarea.reject-reason:focus { border-color:var(--danger);box-shadow:0 0 0 3px rgba(239,68,68,0.1); }
    textarea.reject-reason::placeholder { color:var(--text-faint); }

    .modal-foot { display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border); }
    .modal-error { font-size:12px;color:var(--danger);margin-right:auto; }

    /* LIGHTBOX */
    .lightbox { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;align-items:center;justify-content:center;cursor:zoom-out; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain; }

    footer { border-top:1px solid var(--border);padding:20px 0; }
    .footer-inner { display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px; }
    .footer-inner p { font-size:13px;color:var(--text-faint); }

    @media (max-width:768px) {
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .app-card  { flex-direction:column;align-items:flex-start; }
      .info-grid { grid-template-columns:1fr; }
      .id-photos { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <div style="display:flex;align-items:center;gap:12px;">
          <a href="/" class="logo">Zen<span class="green">Loot</span>X</a>
          <span class="admin-badge">Admin</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span id="adminName" style="font-size:13px;color:var(--text-faint);"></span>
          <button class="btn btn-secondary" id="signOutBtn">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">

      <div id="pageContent">
        <!-- Filled by JS -->
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner"><p>© 2026 ZenLootX — Admin</p></div>
    </div>
  </footer>

  <!-- Review modal -->
  <div class="modal-overlay" id="reviewOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Seller Application</h3>
        <button class="modal-close" id="modalClose">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <!-- Lightbox for ID photos -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="ID Photo">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://msumlsqfergennhzxqon.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let token = '';
    let allApps = [];
    let activeFilter = 'all';

    // ── Init ──
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login'; return; }

      if (!session.user.app_metadata?.is_admin) {
        document.getElementById('pageContent').innerHTML = `
          <div style="text-align:center;padding:80px 24px;">
            <div style="font-size:48px;margin-bottom:16px;">🚫</div>
            <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;">Access denied</h2>
            <p style="color:var(--text-dim);">You do not have admin access.</p>
          </div>`;
        return;
      }

      token = session.access_token;
      const username = session.user.user_metadata?.username || session.user.email;
      document.getElementById('adminName').textContent = username;
      document.getElementById('signOutBtn').addEventListener('click', async () => {
        await sb.auth.signOut();
        window.location.href = '/login';
      });

      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('reviewOverlay').addEventListener('click', e => {
        if (e.target === document.getElementById('reviewOverlay')) closeModal();
      });
      document.getElementById('lightbox').addEventListener('click', () => {
        document.getElementById('lightbox').classList.remove('open');
      });

      loadApplications();
    }

    // ── Fetch applications ──
    async function loadApplications() {
      document.getElementById('pageContent').innerHTML = renderSkeleton();

      const params = activeFilter !== 'all' ? `?status=${activeFilter}` : '';
      const res    = await fetch(`/api/admin/get-applications${params}`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('pageContent').innerHTML = `<p style="color:var(--danger);">Error: ${data.error}</p>`;
        return;
      }

      allApps = data.applications || [];
      renderPage();
    }

    function renderSkeleton() {
      return `
        <div class="stats-row">
          ${[...Array(4)].map(() => `<div class="stat-card skeleton" style="height:80px;"></div>`).join('')}
        </div>
        <div class="app-list">
          ${[...Array(3)].map(() => `<div class="skeleton" style="height:88px;border-radius:12px;"></div>`).join('')}
        </div>`;
    }

    function renderPage() {
      const pending  = allApps.filter(a => a.status === 'pending').length;
      const approved = allApps.filter(a => a.status === 'approved').length;
      const rejected = allApps.filter(a => a.status === 'rejected').length;
      const total    = allApps.length;

      const filtered = activeFilter === 'all' ? allApps : allApps.filter(a => a.status === activeFilter);

      document.getElementById('pageContent').innerHTML = `
        <!-- Stats -->
        <div class="stats-row">
          <div class="stat-card pending">
            <div class="stat-card-num">${pending}</div>
            <div class="stat-card-label">Pending review</div>
          </div>
          <div class="stat-card approved">
            <div class="stat-card-num">${approved}</div>
            <div class="stat-card-label">Approved sellers</div>
          </div>
          <div class="stat-card rejected">
            <div class="stat-card-num">${rejected}</div>
            <div class="stat-card-label">Rejected</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-num">${total}</div>
            <div class="stat-card-label">Total applications</div>
          </div>
        </div>

        <!-- Filters -->
        <div class="filter-row">
          <div class="filter-tabs">
            ${['all','pending','approved','rejected'].map(f => `
              <button class="filter-tab ${activeFilter === f ? 'active' : ''}" data-filter="${f}">
                ${f.charAt(0).toUpperCase() + f.slice(1)}
                ${f !== 'all' ? `<span style="color:var(--text-faint);font-size:11px;margin-left:4px;">${allApps.filter(a => a.status === f).length}</span>` : ''}
              </button>`).join('')}
          </div>
          <span class="result-label">${filtered.length} application${filtered.length !== 1 ? 's' : ''}</span>
        </div>

        <!-- List -->
        <div class="app-list" id="appList">
          ${filtered.length ? filtered.map(appCard).join('') : `
            <div class="empty-state">
              <p>No ${activeFilter !== 'all' ? activeFilter : ''} applications.</p>
            </div>`}
        </div>`;

      // Bind filter tabs
      document.querySelectorAll('.filter-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.filter;
          renderPage();
        });
      });

      // Bind review buttons
      document.querySelectorAll('.review-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const app = allApps.find(a => a.id === btn.dataset.id);
          if (app) openModal(app);
        });
      });
    }

    function appCard(app) {
      const user    = app._user || {};
      const name    = app.full_name || '—';
      const email   = user.email || '—';
      const username = user.username || email.split('@')[0];
      const initial = name.charAt(0).toUpperCase();
      const avatar  = user.avatar_url;
      const date    = new Date(app.submitted_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const badgeCls = { pending:'badge-pending', approved:'badge-approved', rejected:'badge-rejected' }[app.status] || '';

      return `
        <div class="app-card">
          <div class="app-avatar">${avatar ? `<img src="${avatar}">` : initial}</div>
          <div class="app-info">
            <div class="app-name">${name}</div>
            <div class="app-sub">${username} · ${email}</div>
            <div class="app-meta">
              <div class="app-meta-item"><span>Country:</span> ${app.country}</div>
              <div class="app-meta-item"><span>ID type:</span> ${formatIdType(app.id_type)}</div>
              <div class="app-meta-item"><span>Applied:</span> ${date}</div>
              ${app.rejection_reason ? `<div class="app-meta-item" style="color:var(--danger);"><span>Reason:</span> ${app.rejection_reason}</div>` : ''}
            </div>
          </div>
          <div class="app-right">
            <span class="status-badge ${badgeCls}">${app.status}</span>
            <button class="btn btn-secondary btn-sm review-btn" data-id="${app.id}">Review</button>
          </div>
        </div>`;
    }

    function formatIdType(t) {
      const map = {
        passport:'Passport', drivers_license:"Driver's License", national_id:'National ID (PhilSys)',
        sss:'SSS ID', pagibig:'Pag-IBIG ID', philhealth:'PhilHealth ID',
        voters_id:"Voter's ID", postal_id:'Postal ID', other:'Other Gov. ID',
      };
      return map[t] || t;
    }

    // ── Modal ──
    function openModal(app) {
      const user = app._user || {};
      const date = new Date(app.submitted_at).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
      const isPending = app.status === 'pending';

      document.getElementById('modalTitle').textContent = `${app.full_name} — ${app.status.charAt(0).toUpperCase() + app.status.slice(1)}`;

      document.getElementById('modalBody').innerHTML = `
        <div>
          <div class="section-label" style="margin-bottom:14px;">Personal Information</div>
          <div class="info-grid">
            <div class="info-item"><label>Full name</label><span>${app.full_name}</span></div>
            <div class="info-item"><label>Phone</label><span>${app.phone}</span></div>
            <div class="info-item"><label>Country</label><span>${app.country}</span></div>
            <div class="info-item"><label>Date of birth</label><span>${app.date_of_birth || '—'}</span></div>
            <div class="info-item"><label>Email</label><span>${user.email || '—'}</span></div>
            <div class="info-item"><label>Username</label><span>${user.username || '—'}</span></div>
            <div class="info-item"><label>ID type</label><span>${formatIdType(app.id_type)}</span></div>
            <div class="info-item"><label>Applied</label><span>${date}</span></div>
          </div>
        </div>

        ${app.bio ? `
          <div>
            <div class="section-label" style="margin-bottom:10px;">Seller bio</div>
            <p style="font-size:14px;color:var(--text-dim);line-height:1.65;">${app.bio}</p>
          </div>` : ''}

        <div>
          <div class="section-label" style="margin-bottom:14px;">ID Documents</div>
          <div class="id-photos">
            ${idPhotoBox('Front of ID', app.id_front_path, 'front')}
            ${idPhotoBox('Back of ID', app.id_back_path, 'back')}
            ${idPhotoBox('Verification Photo', app.id_verification_path, 'verification')}
          </div>
        </div>

        ${isPending ? `
          <div class="reject-area" id="rejectArea">
            <label style="font-size:13px;font-weight:500;color:var(--text-dim);">Rejection reason (optional)</label>
            <textarea class="reject-reason" id="rejectReason" placeholder="Explain why this application is rejected…"></textarea>
          </div>` : ''}

        <div id="modalError" style="font-size:13px;color:var(--danger);display:none;"></div>
      `;

      // Load ID photo signed URLs
      if (app.id_front_path)        loadSignedPhoto('front',        app.id_front_path);
      if (app.id_back_path)         loadSignedPhoto('back',         app.id_back_path);
      if (app.id_verification_path) loadSignedPhoto('verification', app.id_verification_path);

      // Footer buttons
      const foot = document.getElementById('modalFoot');
      if (isPending) {
        foot.innerHTML = `
          <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
          <button class="btn btn-danger" id="rejectBtn">Reject</button>
          <button class="btn btn-primary" id="approveBtn">✓ Approve</button>`;

        document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
        document.getElementById('rejectBtn').addEventListener('click', () => toggleRejectArea(app));
        document.getElementById('approveBtn').addEventListener('click', () => submitReview(app, 'approve'));
      } else {
        foot.innerHTML = `<button class="btn btn-secondary" id="modalCancelBtn">Close</button>`;
        document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
      }

      document.getElementById('reviewOverlay').classList.add('open');
    }

    function idPhotoBox(label, path, key) {
      if (!path) {
        return `
          <div class="id-photo-wrap">
            <div class="id-photo-label">${label}</div>
            <div class="id-photo-box" style="cursor:default;">
              <span class="id-photo-none">Not provided</span>
            </div>
          </div>`;
      }
      return `
        <div class="id-photo-wrap">
          <div class="id-photo-label">${label}</div>
          <div class="id-photo-box loading" id="photoBox_${key}" data-path="${path}">
            <span class="id-photo-none" style="font-size:11px;">Loading…</span>
          </div>
        </div>`;
    }

    async function loadSignedPhoto(key, path) {
      const box = document.getElementById(`photoBox_${key}`);
      if (!box) return;

      const res  = await fetch('/api/admin/get-signed-url', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ path }),
      });
      const data = await res.json();

      box.classList.remove('loading');
      if (data.url) {
        box.innerHTML = `<img src="${data.url}" alt="${key} ID" loading="lazy">`;
        box.addEventListener('click', () => {
          document.getElementById('lightboxImg').src = data.url;
          document.getElementById('lightbox').classList.add('open');
        });
      } else {
        box.innerHTML = `<span class="id-photo-none" style="font-size:11px;">Failed to load</span>`;
        box.style.cursor = 'default';
      }
    }

    let rejectOpen = false;
    function toggleRejectArea(app) {
      const area = document.getElementById('rejectArea');
      if (!rejectOpen) {
        area.classList.add('open');
        rejectOpen = true;
        document.getElementById('rejectBtn').textContent = 'Confirm Reject';
        document.getElementById('rejectBtn').onclick = () => submitReview(app, 'reject');
      }
    }

    async function submitReview(app, action) {
      const approveBtn = document.getElementById('approveBtn');
      const rejectBtn  = document.getElementById('rejectBtn');
      const errEl      = document.getElementById('modalError');
      const reason     = document.getElementById('rejectReason')?.value?.trim() || '';

      if (approveBtn) { approveBtn.disabled = true; approveBtn.textContent = 'Processing…'; }
      if (rejectBtn)  { rejectBtn.disabled  = true; }
      errEl.style.display = 'none';

      const res  = await fetch('/api/admin/review-application', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ applicationId: app.id, userId: app.user_id, action, reason }),
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        errEl.textContent  = data.error || 'Something went wrong.';
        errEl.style.display = 'block';
        if (approveBtn) { approveBtn.disabled = false; approveBtn.textContent = '✓ Approve'; }
        if (rejectBtn)  { rejectBtn.disabled  = false; }
        return;
      }

      closeModal();
      await loadApplications();
    }

    function closeModal() {
      document.getElementById('reviewOverlay').classList.remove('open');
      rejectOpen = false;
    }

    init();
  </script>

</body>
</html>
