<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/wallpaper/zx.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ZenLootX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:#0A0E0C;--bg-surface:#121814;--bg-elevated:#1A211C;
      --border:#232B26;--border-hi:#33403A;--accent:#19C37D;
      --accent-hover:#2FD98F;--accent-glow:rgba(25,195,125,0.15);
      --text:#E8EDE9;--text-dim:#9BA8A0;--text-faint:#6B776F;
      --danger:#EF4444;--warning:#F5B947;--success:#22C55E;
    }
    *, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
    body { background:var(--bg-base);color:var(--text);font-family:'Geist',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column; }
    a { text-decoration:none;color:inherit; }
    .container { max-width:1200px;margin:0 auto;padding:0 24px; }

    /* NAV */
    nav { position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);background:rgba(10,14,12,0.88);backdrop-filter:blur(14px); }
    .nav-inner { display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:24px; }
    .logo { font-size:20px;font-weight:700;letter-spacing:-0.02em; }
    .logo .green { color:var(--accent); }
    .admin-badge { font-size:11px;font-weight:600;background:rgba(239,68,68,0.12);color:#F87171;border:1px solid rgba(239,68,68,0.2);border-radius:999px;padding:3px 10px;letter-spacing:0.04em;text-transform:uppercase; }

    /* BUTTONS */
    .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'Geist',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.18s;text-decoration:none;white-space:nowrap; }
    .btn-primary   { background:var(--accent);color:var(--bg-base);border-color:var(--accent); }
    .btn-primary:hover   { background:var(--accent-hover); }
    .btn-secondary { background:transparent;color:var(--text);border-color:var(--border-hi); }
    .btn-secondary:hover { background:var(--bg-elevated); }
    .btn-danger    { background:transparent;color:var(--danger);border-color:rgba(239,68,68,0.3); }
    .btn-danger:hover    { background:rgba(239,68,68,0.08); }
    .btn-warning   { background:transparent;color:var(--warning);border-color:rgba(245,185,71,0.3); }
    .btn-warning:hover   { background:rgba(245,185,71,0.06); }
    .btn:disabled  { opacity:0.45;cursor:not-allowed;pointer-events:none; }
    .btn-sm { padding:6px 12px;font-size:12px; }

    main { flex:1;padding:40px 0 80px; }

    /* SECTION TABS */
    .section-nav { display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:32px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-x; }
    .section-nav::-webkit-scrollbar { display:none; }
    .section-tab { background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:12px 20px;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;color:var(--text-faint);cursor:pointer;transition:color 0.16s,border-color 0.16s;display:flex;align-items:center;gap:8px;flex-shrink:0;white-space:nowrap; }
    .section-tab:hover { color:var(--text); }
    .section-tab.active { color:var(--text);border-bottom-color:var(--accent); }

    /* ANALYTICS */
    .analytics-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px; }
    .stat-box { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px; }
    .stat-box-num { font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px; }
    .stat-box-label { font-size:12px;color:var(--text-faint);font-weight:500;text-transform:uppercase;letter-spacing:0.05em; }
    .chart-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px; }
    .chart-title { font-size:14px;font-weight:600;margin-bottom:20px;color:var(--text-dim); }
    .chart-bars { display:flex;align-items:flex-end;gap:8px;height:120px; }
    .chart-bar-wrap { flex:1;display:flex;flex-direction:column;align-items:center;gap:6px; }
    .chart-bar { width:100%;border-radius:4px 4px 0 0;background:var(--accent);opacity:0.7;min-height:4px;transition:opacity 0.16s; }
    .chart-bar:hover { opacity:1; }
    .chart-label { font-size:10px;color:var(--text-faint);text-align:center; }
    .chart-val { font-size:11px;font-weight:600;color:var(--text-dim); }
    .tab-count { font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--bg-elevated); }
    .tab-count.has-items { background:rgba(245,185,71,0.15);color:var(--warning); }

    /* STATS ROW */
    .stats-row { display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px; }
    .stats-row-3 { grid-template-columns:repeat(3,1fr); }
    .stat-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px; }
    .stat-card-num { font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1; }
    .stat-card-label { font-size:12px;color:var(--text-faint);margin-top:6px; }
    .stat-card.s-pending  .stat-card-num { color:var(--warning); }
    .stat-card.s-approved .stat-card-num { color:var(--success); }
    .stat-card.s-rejected .stat-card-num { color:var(--danger); }
    .stat-card.s-reported .stat-card-num { color:#F87171; }

    /* FILTER ROW */
    .filter-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap; }
    .filter-tabs { display:flex;gap:4px;flex-wrap:wrap; }
    .filter-tab { padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-faint);cursor:pointer;background:none;border:1px solid transparent;font-family:'Geist',sans-serif;transition:all 0.16s;flex-shrink:0; }
    .filter-tab:hover { color:var(--text);background:var(--bg-elevated); }
    .filter-tab.active { background:var(--bg-elevated);border-color:var(--border-hi);color:var(--text); }
    .result-label { font-size:13px;color:var(--text-faint); }

    /* CARD LIST */
    .card-list { display:flex;flex-direction:column;gap:12px; }

    /* APPLICATION CARDS */
    .app-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:20px;transition:border-color 0.16s; }
    .app-card:hover { border-color:var(--border-hi); }
    .app-avatar { width:44px;height:44px;border-radius:50%;background:var(--accent-glow);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden; }
    .app-avatar img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .app-info { flex:1;min-width:0; }
    .app-name { font-size:15px;font-weight:600; }
    .app-sub  { font-size:12px;color:var(--text-faint);margin-top:2px; }
    .app-meta { display:flex;gap:16px;margin-top:8px;flex-wrap:wrap; }
    .app-meta-item { font-size:12px;color:var(--text-dim); }
    .app-meta-item span { color:var(--text-faint); }
    .app-right { display:flex;align-items:center;gap:10px;flex-shrink:0; }

    /* REPORT CARDS */
    .report-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;align-items:flex-start;gap:16px;transition:border-color 0.16s; }
    .report-card:hover { border-color:var(--border-hi); }
    .report-card.reviewed { opacity:0.6; }
    .report-icon { width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
    .report-body { flex:1;min-width:0; }
    .report-header { display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px; }
    .report-users { font-size:14px;font-weight:600; }
    .report-users span { color:var(--text-faint);font-weight:400; }
    .report-details { font-size:13px;color:var(--text-dim);line-height:1.6;margin-top:6px; }
    .report-date { font-size:12px;color:var(--text-faint);margin-top:6px; }
    .report-right { display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0; }

    /* DISPUTE CARDS */
    .dispute-card { background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px; }
    .dispute-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:12px; }
    .dispute-id { font-size:12px;color:var(--text-faint);font-family:monospace; }
    .dispute-parties { display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:14px; }
    .dispute-vs { font-size:11px;color:var(--text-faint);background:var(--bg-elevated);padding:2px 8px;border-radius:4px; }
    .dispute-meta { display:flex;gap:16px;flex-wrap:wrap; }
    .dispute-meta-item { font-size:12px;color:var(--text-dim); }
    .dispute-meta-item span { color:var(--text-faint); }
    .dispute-actions { display:flex;gap:8px;margin-top:14px; }
    .resolution-area { display:none;flex-direction:column;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border); }
    .resolution-area.open { display:flex; }
    .resolution-action-btn { opacity:0.45;transition:opacity 0.16s,outline 0.16s; }
    .resolution-action-btn.active { opacity:1;outline:2px solid currentColor;outline-offset:2px; }

    /* STATUS BADGES */
    .status-badge { display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em; }
    .badge-pending   { background:rgba(245,185,71,0.12);color:var(--warning); }
    .badge-approved  { background:rgba(34,197,94,0.1);color:var(--success); }
    .badge-rejected  { background:rgba(239,68,68,0.1);color:var(--danger); }
    .badge-reviewed  { background:rgba(155,168,160,0.1);color:var(--text-faint); }
    .badge-open      { background:rgba(239,68,68,0.1);color:var(--danger); }
    .badge-resolved  { background:rgba(34,197,94,0.1);color:var(--success); }

    /* REASON PILLS */
    .reason-pill { display:inline-flex;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em; }
    .reason-fraud       { background:rgba(239,68,68,0.12);color:#F87171; }
    .reason-wrong       { background:rgba(245,185,71,0.12);color:var(--warning); }
    .reason-communication { background:rgba(96,165,250,0.1);color:#60A5FA; }
    .reason-harassment  { background:rgba(239,68,68,0.15);color:#FB923C; }
    .reason-other       { background:rgba(155,168,160,0.1);color:var(--text-faint); }

    /* EMPTY & LOADING */
    .empty-state { text-align:center;padding:64px 24px;background:var(--bg-surface);border:1px solid var(--border);border-radius:12px; }
    .empty-icon { font-size:36px;margin-bottom:12px; }
    .empty-state h3 { font-size:17px;font-weight:600;margin-bottom:6px; }
    .empty-state p  { font-size:14px;color:var(--text-dim);max-width:360px;margin:0 auto; }
    .skeleton { background:var(--bg-elevated);border-radius:8px;animation:shimmer 1.4s infinite; }
    @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* MODAL */
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);z-index:500;align-items:flex-start;justify-content:center;padding:32px 20px;overflow-y:auto; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg-surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;box-shadow:0 24px 64px rgba(0,0,0,0.5);animation:modalIn 0.18s ease;margin:auto; }
    @keyframes modalIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .modal-head { display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border); }
    .modal-head h3 { font-size:17px;font-weight:600; }
    .modal-close { background:none;border:none;cursor:pointer;padding:4px;color:var(--text-faint);border-radius:6px;display:flex;transition:color 0.16s,background 0.16s; }
    .modal-close:hover { color:var(--text);background:var(--bg-elevated); }
    .modal-body { padding:24px;display:flex;flex-direction:column;gap:20px; }
    .modal-foot { display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border); }
    .modal-error { font-size:12px;color:var(--danger);margin-right:auto; }
    .info-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
    .info-item label { font-size:11px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:3px; }
    .info-item span { font-size:14px;color:var(--text); }
    .section-label { font-size:13px;font-weight:600;color:var(--text-dim);padding-bottom:10px;border-bottom:1px solid var(--border); }
    .id-photos { display:grid;grid-template-columns:repeat(3,1fr);gap:12px; }
    .id-photo-wrap { display:flex;flex-direction:column;gap:6px; }
    .id-photo-label { font-size:11px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em; }
    .id-photo-box { aspect-ratio:4/3;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.16s; }
    .id-photo-box:hover { border-color:var(--accent); }
    .id-photo-box img { width:100%;height:100%;object-fit:cover; }
    .id-photo-none { font-size:12px;color:var(--text-faint);text-align:center; }
    .reject-area { display:none;flex-direction:column;gap:8px; }
    .reject-area.open { display:flex; }
    textarea.modal-textarea { background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:70px;width:100%;transition:border-color 0.18s; }
    textarea.modal-textarea:focus { border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow); }
    textarea.modal-textarea::placeholder { color:var(--text-faint); }

    /* LIGHTBOX */
    .lightbox { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;align-items:center;justify-content:center;cursor:zoom-out; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain; }

    footer { border-top:1px solid var(--border);padding:20px 0; }
    .footer-inner { display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px; }
    .footer-inner p { font-size:13px;color:var(--text-faint); }

    @media (max-width:768px) {
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .analytics-grid { grid-template-columns:repeat(2,1fr); }
      .app-card  { flex-direction:column;align-items:flex-start; }
      .app-right { flex-direction:row;flex-wrap:wrap;gap:6px;width:100%; }
      .report-card { flex-direction:column; }
      .report-right { flex-direction:row;flex-wrap:wrap;gap:6px;width:100%; }
      .info-grid { grid-template-columns:1fr; }
      .id-photos { grid-template-columns:1fr 1fr; }
      .dispute-parties { flex-wrap:wrap;gap:8px; }
      .dispute-meta { flex-direction:column;gap:6px; }
      .dispute-actions { flex-wrap:wrap; }
      .modal { max-width:100%; }
      .modal-head h3 { font-size:15px; }
    }

    @media (max-width:480px) {
      .container { padding:0 14px; }
      main { padding:20px 0 60px; }
      .stats-row { gap:10px; }
      .stat-card-num { font-size:22px; }
      .stat-card { padding:16px 14px; }
      .section-tab { padding:10px 14px;font-size:13px; }
      .tab-count { display:none; }
      .app-name { font-size:14px; }
      .app-meta { flex-direction:column;gap:4px; }
      .report-users { font-size:13px; }
      .filter-tab { padding:6px 12px;font-size:12px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <div style="display:flex;align-items:center;gap:12px;">
          <a href="/" class="logo" style="display:flex;align-items:center;gap:8px;"><img src="/wallpaper/zx.png" alt="ZenLootX" style="height:32px;width:auto;"><span>Zen<span class="green">Loot</span>X</span></a>
          <span class="admin-badge">Admin</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span id="adminName" style="font-size:13px;color:var(--text-faint);"></span>
          <button class="btn btn-secondary" id="signOutBtn">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div id="pageContent"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner"><p>© 2026 ZenLootX — Admin</p></div>
    </div>
  </footer>

  <!-- Application review modal -->
  <div class="modal-overlay" id="reviewOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Application</h3>
        <button class="modal-close" id="modalClose">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <!-- Ban modal -->
  <div class="modal-overlay" id="banOverlay">
    <div class="modal" style="max-width:420px;">
      <div class="modal-head">
        <h3 id="banModalTitle">Ban user</h3>
        <button class="modal-close" id="banModalClose">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" style="gap:14px;">
        <p style="font-size:13px;color:var(--text-dim);" id="banModalDesc"></p>
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:8px;">Reason <span style="color:var(--text-faint);font-weight:400;text-transform:none;">(optional)</span></label>
          <textarea id="banReasonInput" placeholder="e.g. Repeated fraud reports, scamming buyers…" maxlength="300"
            style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Geist',sans-serif;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:80px;transition:border-color 0.18s;"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"></textarea>
        </div>
        <div id="banModalError" style="font-size:13px;color:var(--danger);display:none;"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" id="banCancelBtn" style="padding:8px 16px;font-size:14px;">Cancel</button>
        <button class="btn" id="banConfirmBtn" style="padding:8px 16px;font-size:14px;background:var(--danger);color:#fff;border-color:var(--danger);">Ban user</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="ID Photo">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/nav.js"></script>
  <script>
    const SUPABASE_URL = 'https://msumlsqfergennhzxqon.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdW1sc3FmZXJnZW5uaHp4cW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTMwMzQsImV4cCI6MjA5NjAyOTAzNH0.Zz-YIzgk_QN0p0F9Sjbi8kPHUuuGylP6K7LIDbhhe-Q';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let token = '';
    let activeSection = 'analytics';
    let allApps = [], allReports = [], allDisputes = [], allListings = [];
    let allTopups = [], allWithdrawals = [];
    let topupFilter = 'pending', withdrawalFilter = 'pending';
    let appFilter = 'pending', reportFilter = 'pending';
    let rejectOpen = false;
    let appError = null, reportsError = null, disputesError = null, listingsError = null;
    let analyticsData = null;

    // ── Init ──
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '/login'; return; }

      if (!session.user.app_metadata?.is_admin) {
        document.getElementById('pageContent').innerHTML = `
          <div style="text-align:center;padding:80px 24px;">
            <div style="font-size:48px;margin-bottom:16px;">🚫</div>
            <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;">Access denied</h2>
            <p style="color:var(--text-dim);">You do not have admin access.</p>
          </div>`;
        return;
      }

      token = session.access_token;
      document.getElementById('adminName').textContent = session.user.user_metadata?.username || session.user.email;
      document.getElementById('signOutBtn').addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = '/login'; });
      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('reviewOverlay').addEventListener('click', e => { if (e.target === document.getElementById('reviewOverlay')) closeModal(); });
      document.getElementById('lightbox').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));

      await Promise.all([loadApplications(), loadReports(), loadDisputes(), loadListings(), loadTopups(), loadWithdrawals(), loadAnalytics()]);
      renderShell();
      subscribeAdminRealtime();
    }

    // ── Data loading ──
    async function loadApplications() {
      try {
        // Query directly via Supabase client — admin RLS policy allows this
        const { data, error } = await sb
          .from('seller_applications')
          .select('*')
          .order('submitted_at', { ascending: false });

        if (error) { appError = error.message; return; }

        allApps  = (data || []).map(app => ({ ...app, _user: {} }));
        appError = null;

        // Try to enrich with user info (email, username, avatar) via CF function
        // Silently skipped if CF function is unavailable
        try {
          const res = await fetch('/api/admin/get-applications', {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.ok) {
            const enriched = await res.json();
            if (enriched.applications?.length) allApps = enriched.applications;
          }
        } catch {}

      } catch (e) { appError = e.message; }
    }

    async function loadReports() {
      try {
        // Try CF function first (enriches with email from auth.users)
        const res  = await fetch('/api/admin/get-reports', { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (res.ok && data.reports) {
          allReports   = data.reports;
          reportsError = null;
          return;
        }
      } catch {}

      // Fallback: query directly + enrich from profiles table
      try {
        const { data: reports, error } = await sb
          .from('reports')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) { reportsError = error.message; return; }

        const raw = reports || [];
        const ids = [...new Set(raw.flatMap(r => [r.reporter_id, r.reported_user_id].filter(Boolean)))];

        let profileMap = {};
        if (ids.length) {
          const { data: profs } = await sb.from('profiles').select('id,username').in('id', ids);
          (profs || []).forEach(p => { profileMap[p.id] = p; });
        }

        allReports = raw.map(r => ({
          ...r,
          _reporter: profileMap[r.reporter_id]  || {},
          _reported: profileMap[r.reported_user_id] || {},
        }));
        reportsError = null;
      } catch (e) { reportsError = e.message; }
    }

    async function loadDisputes() {
      try {
        const res  = await fetch('/api/admin/get-disputes', { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (!res.ok) { disputesError = data.error || `HTTP ${res.status}`; return; }
        allDisputes   = data.disputes || [];
        disputesError = null;
      } catch (e) { disputesError = e.message; }
    }

    async function loadTopups() {
      try {
        const res  = await fetch('/api/admin/topup-action?list=1', { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (res.ok && data.requests) { allTopups = data.requests; return; }
      } catch {}
      try {
        const { data } = await sb.from('topup_requests').select('*').order('created_at', { ascending: false });
        allTopups = data || [];
      } catch {}
    }

    async function loadWithdrawals() {
      try {
        const res  = await fetch('/api/admin/withdrawal-action?list=1', { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (res.ok && data.requests) { allWithdrawals = data.requests; return; }
      } catch {}
      try {
        const { data } = await sb.from('withdrawal_requests').select('*').order('created_at', { ascending: false });
        allWithdrawals = data || [];
      } catch {}
    }

    async function loadListings() {
      try {
        const { data, error } = await sb
          .from('listings')
          .select('id, title, price, currency, game, type, status, created_at, seller_id')
          .order('created_at', { ascending: false });
        if (error) { listingsError = error.message; return; }
        allListings   = data || [];
        listingsError = null;
      } catch (e) { listingsError = e.message; }
    }

    // ── Real-time badge counts ──────────────────────────────────
    function updateTabCounts() {
      const counts = {
        applications: allApps.filter(a => a.status === 'pending').length,
        reports:      allReports.filter(r => r.status === 'pending').length,
        disputes:     allDisputes.filter(d => d.status === 'open').length,
        topups:       allTopups.filter(t => t.status === 'pending').length,
        withdrawals:  allWithdrawals.filter(w => w.status === 'pending').length,
        listings:     allListings.length,
      };

      document.querySelectorAll('.section-tab').forEach(tab => {
        const badge = tab.querySelector('.tab-count');
        if (!badge) return;
        const n = counts[tab.dataset.section];
        if (n === undefined) return;
        badge.textContent = n;
        badge.classList.toggle('has-items', n > 0);
      });

      const total = counts.applications + counts.reports + counts.disputes + counts.topups + counts.withdrawals;
      document.title = total > 0 ? `(${total}) Admin — ZenLootX` : 'Admin — ZenLootX';
    }

    function subscribeAdminRealtime() {
      const watches = [
        { table: 'seller_applications', load: loadApplications, msg: '📋 New seller application'  },
        { table: 'topup_requests',      load: loadTopups,        msg: '💳 New top-up request'      },
        { table: 'withdrawal_requests', load: loadWithdrawals,   msg: '💸 New withdrawal request'  },
        { table: 'disputes',            load: loadDisputes,       msg: '⚖️ New dispute filed'       },
        { table: 'reports',             load: loadReports,        msg: '🚩 New report submitted'    },
      ];

      watches.forEach(({ table, load, msg }) => {
        sb.channel(`admin-rt-${table}`)
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table }, async () => {
            await load();
            updateTabCounts();
            toast(msg, 'success');
          })
          .subscribe();
      });
    }

    async function retryLoad() {
      await Promise.all([loadApplications(), loadReports(), loadDisputes(), loadListings(), loadTopups(), loadWithdrawals()]);
      renderShell();
    }

    // ── Analytics ──────────────────────────────────────────────────
    async function loadAnalytics() {
      try {
        const [txRes, ordersRes, usersRes] = await Promise.all([
          sb.from('transactions').select('type, amount, status, created_at'),
          sb.from('orders').select('escrow_status, amount, created_at'),
          sb.from('profiles').select('id', { count: 'exact', head: true }),
        ]);
        analyticsData = {
          transactions: txRes.data || [],
          orders:       ordersRes.data || [],
          userCount:    usersRes.count || 0,
        };
      } catch { analyticsData = { transactions: [], orders: [], userCount: 0 }; }
    }

    function renderAnalytics() {
      const el = document.getElementById('sectionContent');
      if (!analyticsData) { el.innerHTML = '<p style="color:var(--text-faint);padding:20px 0;">Loading…</p>'; return; }

      const { transactions, orders, userCount } = analyticsData;

      const revenue       = transactions.filter(t => t.type === 'credit' && t.status === 'completed').reduce((s, t) => s + Number(t.amount || 0), 0);
      const totalTx       = transactions.length;
      const completedOrds = orders.filter(o => o.status === 'released' || o.escrow_status === 'released').length;
      const totalOrds     = orders.length;
      const openDisp      = allDisputes.filter(d => d.status === 'open').length;
      const pendingTopups = allTopups.filter(t => t.status === 'pending').length;

      const fmt = n => '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      // Last 7 days chart
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const key   = d.toISOString().slice(0, 10);
        const count = orders.filter(o => o.created_at?.slice(0, 10) === key).length;
        days.push({ label, count });
      }
      const maxCount = Math.max(...days.map(d => d.count), 1);

      el.innerHTML = `
        <div class="analytics-grid">
          <div class="stat-box">
            <div class="stat-box-num" style="color:var(--success);">${fmt(revenue)}</div>
            <div class="stat-box-label">Total Revenue</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-num">${totalOrds}</div>
            <div class="stat-box-label">Total Orders</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-num" style="color:var(--success);">${completedOrds}</div>
            <div class="stat-box-label">Completed Sales</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-num">${userCount}</div>
            <div class="stat-box-label">Registered Users</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-num">${totalTx}</div>
            <div class="stat-box-label">Transactions</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-num" style="color:${openDisp > 0 ? 'var(--danger)' : 'var(--text)'};">${openDisp}</div>
            <div class="stat-box-label">Open Disputes</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-num" style="color:${pendingTopups > 0 ? 'var(--warning)' : 'var(--text)'};">${pendingTopups}</div>
            <div class="stat-box-label">Pending Top-ups</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-num">${allListings.length}</div>
            <div class="stat-box-label">Active Listings</div>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Orders — last 7 days</div>
          <div class="chart-bars">
            ${days.map(d => `
              <div class="chart-bar-wrap">
                <div class="chart-val">${d.count || ''}</div>
                <div class="chart-bar" style="height:${Math.max(4, Math.round((d.count / maxCount) * 100))}%;"></div>
                <div class="chart-label">${d.label}</div>
              </div>`).join('')}
          </div>
        </div>`;
    }

    function adminBanUser(userId, username, triggerBtn) {
      const overlay    = document.getElementById('banOverlay');
      const closeBtn   = document.getElementById('banModalClose');
      const cancelBtn  = document.getElementById('banCancelBtn');
      const confirmBtn = document.getElementById('banConfirmBtn');
      const reasonEl   = document.getElementById('banReasonInput');
      const errEl      = document.getElementById('banModalError');

      document.getElementById('banModalTitle').textContent = `Ban ${username}`;
      document.getElementById('banModalDesc').textContent  = `This will immediately kick ${username} off the site, hide all their listings, and block them from logging back in.`;
      reasonEl.value        = '';
      errEl.style.display   = 'none';
      confirmBtn.disabled   = false;
      confirmBtn.textContent = 'Ban user';

      const close = () => overlay.classList.remove('open');
      closeBtn.onclick  = close;
      cancelBtn.onclick = close;
      overlay.onclick   = e => { if (e.target === overlay) close(); };
      overlay.classList.add('open');

      confirmBtn.onclick = async () => {
        const reason = reasonEl.value.trim() || null;
        confirmBtn.disabled    = true;
        confirmBtn.textContent = 'Banning…';
        errEl.style.display    = 'none';

        const res = await fetch('/api/admin/ban-user', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, action: 'ban', reason }),
        });

        if (res.ok) {
          close();
          if (triggerBtn) { triggerBtn.textContent = '✓ Banned'; triggerBtn.style.color = 'var(--success)'; triggerBtn.disabled = true; }
          await loadReports();
          renderShell();
        } else {
          const err = await res.json().catch(() => ({}));
          errEl.textContent  = err.error || 'Failed to ban. Try again.';
          errEl.style.display = '';
          confirmBtn.disabled    = false;
          confirmBtn.textContent = 'Ban user';
        }
      };
    }

    function reportCard(r) {
      const reasons = {
        fraud:          { label:'Fraud / Scam',          cls:'reason-fraud' },
        wrong_listing:  { label:'Wrong listing',         cls:'reason-wrong' },
        communication:  { label:'Poor communication',   cls:'reason-communication' },
        harassment:     { label:'Harassment',            cls:'reason-harassment' },
        fake_listing:   { label:'Fake listing',          cls:'reason-wrong' },
        already_sold:   { label:'Already sold',          cls:'reason-other' },
        prohibited:     { label:'Prohibited item',       cls:'reason-fraud' },
        scam:           { label:'Scam attempt',          cls:'reason-fraud' },
        other:          { label:'Other',                 cls:'reason-other' },
      };
      const rInfo   = reasons[r.reason] || { label: r.reason, cls: 'reason-other' };
      const date    = new Date(r.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const icons   = { fraud:'🚨', wrong_listing:'⚠️', communication:'💬', harassment:'🚫', fake_listing:'⚠️', already_sold:'🔄', prohibited:'🚫', scam:'🚨', other:'🏳️' };
      const isPending      = r.status !== 'reviewed';
      const isListingReport = !!r.listing_id;

      const reporterName = r._reporter?.username || r._reporter?.email?.split('@')[0] || r.reporter_id?.slice(0,8)       || 'Unknown';
      const reportedName = r._reported?.username || r._reported?.email?.split('@')[0] || r.reported_user_id?.slice(0,8)  || 'Unknown';

      const subject = isListingReport
        ? `<a href="/listings/detail?id=${r.listing_id}" target="_blank" style="color:var(--accent);text-decoration:underline;">${r.listing_title || 'a listing'}</a>`
        : `<strong>${reportedName}</strong>`;

      return `
        <div class="report-card ${!isPending ? 'reviewed' : ''}">
          <div class="report-icon" style="background:var(--bg-elevated);">${isListingReport ? '📋' : (icons[r.reason] || '🏳️')}</div>
          <div class="report-body">
            <div class="report-header">
              <span class="reason-pill ${rInfo.cls}">${rInfo.label}</span>
              <span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:${isListingReport ? 'rgba(96,165,250,0.1)' : 'rgba(155,168,160,0.1)'};color:${isListingReport ? '#60A5FA' : 'var(--text-faint)'};text-transform:uppercase;letter-spacing:0.04em;">${isListingReport ? 'Listing' : 'User'}</span>
              <span class="status-badge ${isPending ? 'badge-pending' : 'badge-reviewed'}">${r.status}</span>

            <div class="report-users">

            ${isListingReport
              ? `<a href="/listings/detail?id=${r.listing_id}" target="_blank" class="btn btn-secondary btn-sm" style="font-size:11px;">View listing</a>`
              : `<a href="/public-profile?id=${r.reported_user_id}" target="_blank" class="btn btn-secondary btn-sm" style="font-size:11px;">View profile</a>`}
            ${r._reported?.is_frozen
              ? `<button class="btn btn-sm freeze-user-btn" data-uid="${r.reported_user_id}" data-name="${reportedName}" data-action="unfreeze" style="font-size:11px;border-color:rgba(25,195,125,0.3);color:var(--accent);">✅ Unfreeze</button>`
              : `<span style="display:inline-flex;align-items:center;gap:4px;">
                  <select class="freeze-duration-select" style="font-size:11px;background:var(--bg-elevated);border:1px solid rgba(245,185,71,0.35);color:var(--warning);border-radius:6px;padding:4px 6px;font-family:'Geist',sans-serif;cursor:pointer;outline:none;">
                    <option value="1h">1 hour</option>
                    <option value="24h">24 hours</option>
                    <option value="3d">3 days</option>
                    <option value="7d" selected>7 days</option>
                    <option value="30d">30 days</option>
                    <option value="permanent">Permanent</option>
                  </select>
                  <button class="btn btn-sm freeze-user-btn" data-uid="${r.reported_user_id}" data-name="${reportedName}" data-action="freeze" style="font-size:11px;border-color:rgba(245,185,71,0.35);color:var(--warning);">🔒 Freeze</button>
                </span>`}
            ${r._reported?.is_banned
              ? `<span style="font-size:11px;font-weight:600;color:var(--danger);padding:4px 8px;background:rgba(239,68,68,0.1);border-radius:6px;border:1px solid rgba(239,68,68,0.2);">Banned</span>`
              : `<button class="btn btn-danger btn-sm ban-user-btn" data-uid="${r.reported_user_id}" data-name="${reportedName}" style="font-size:11px;">${isListingReport ? 'Ban seller' : 'Ban user'}</button>`}
          </div>
        </div>`;
    }

    async function adminFreezeUser(userId, username, action, btn) {
      // Get selected duration from the adjacent select (if freezing)
      const durationSelect = btn.parentElement?.querySelector('.freeze-duration-select');
      const duration = durationSelect?.value || '7d';

      btn.disabled = true;
      btn.textContent = '…';
      const res = await fetch('/api/admin/freeze-user', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, action, duration }),
      });
      if (res.ok) {
        await loadReports();
        renderShell();
      } else {
        btn.disabled = false;
        btn.textContent = action === 'freeze' ? '🔒 Freeze' : '✅ Unfreeze';
      }
    }

    async function dismissReport(reportId, btn) {
      btn.disabled    = true;
      btn.textContent = 'Saving…';

      const { error } = await sb
        .from('reports')
        .update({ status: 'reviewed' })
        .eq('id', reportId);

      if (!error) {
        // Update in-memory so we don't need a full reload
        allReports = allReports.map(r => r.id === reportId ? { ...r, status: 'reviewed' } : r);
        renderShell();
      } else {
        btn.disabled    = false;
        btn.textContent = 'Mark reviewed';
        toast('Failed: ' + error.message, 'error');
      }
    }

    function renderDisputes() {

                <input type="radio" name="cons" value="freeze" style="accent-color:#19C37D;flex-shrink:0;">
                <div style="flex:1;"><div style="font-size:14px;font-weight:500;color:#E8EDE9;">Freeze account</div><div style="font-size:12px;color:#6B776F;">Temporarily restrict the seller</div></div>

                  <option value="24h" selected>24 hours</option>
                  <option value="3d">3 days</option>
                  <option value="7d">1 week</option>
                  <option value="30d">30 days</option>
                  <option value="permanent">Permanent</option>
                </select>
              </label>
              <label id="consLabelBan" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #232B26;border-radius:8px;cursor:pointer;">
                <input type="radio" name="cons" value="ban" style="accent-color:#EF4444;flex-shrink:0;">
                <div><div style="font-size:14px;font-weight:500;color:#F87171;">Ban account</div><div style="font-size:12px;color:#6B776F;">Permanently ban this seller</div></div>
              </label>

            <div style="display:flex;gap:10px;justify-content:flex-end;">
              <button id="consCancel" style="padding:9px 18px;border-radius:8px;border:1px solid #33403A;background:transparent;color:#E8EDE9;font-family:Geist,sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Cancel</button>

    async function submitResolution(id, btn) {
      const action = document.querySelector(`.resolution-action-btn[data-id="${id}"].active`)?.dataset.action || null;
      const note   = document.getElementById(`resNote_${id}`)?.value.trim() || '';
      if (!action) { toast('Select refund buyer or release to seller first.', 'error'); return; }

      let consequence = { type: 'none' };
      if (action === 'refund_buyer') {
        const dispute    = allDisputes.find(d => d.id === id);
        const sellerName = dispute?._seller?.username || 'the seller';
        consequence = await showConsequenceModal(sellerName);
        if (consequence === null) return; // cancelled
      }

      btn.disabled = true;
      btn.textContent = 'Resolving…';

      const res = await fetch('/api/admin/resolve-dispute', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ disputeId: id, action, notes: note }),
      });

      if (!res.ok) {
        btn.disabled = false; btn.textContent = 'Confirm resolution';
        toast('Error: ' + (await res.json().catch(()=>({}))).error, 'error'); return;
      }

      // Apply seller consequence
      if (consequence.type !== 'none') {
        const dispute  = allDisputes.find(d => d.id === id);
        const sellerId = dispute?.seller_id;
        if (sellerId) {
          if (consequence.type === 'ban') {
            await fetch('/api/admin/ban-user', {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ userId: sellerId, action: 'ban', reason: 'Dispute resolved against seller' }),
            });
          } else if (consequence.type === 'freeze') {
            await fetch('/api/admin/freeze-user', {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ userId: sellerId, action: 'freeze', duration: consequence.duration }),
            });
          }
        }
      }

      await loadDisputes(); renderShell();
    }

    // Handle resolution action button selection
    document.addEventListener('click', e => {
      if (e.target.classList.contains('resolution-action-btn')) {
        const id = e.target.dataset.id;
        document.querySelectorAll(`.resolution-action-btn[data-id="${id}"]`).forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        // Activate the confirm button
        const confirmBtn = document.querySelector(`.submit-resolution-btn[data-id="${id}"]`);
        if (confirmBtn) {
          confirmBtn.classList.remove('btn-secondary');
          confirmBtn.classList.add('btn-primary');
        }
      }
    });

    function idPhotoBox(label, path, key) {
      if (!path) return `<div class="id-photo-wrap"><div class="id-photo-label">${label}</div><div class="id-photo-box" style="cursor:default;"><span class="id-photo-none">Not provided</span></div></div>`;
      return `<div class="id-photo-wrap"><div class="id-photo-label">${label}</div><div class="id-photo-box loading" id="photoBox_${key}"><span class="id-photo-none" style="font-size:11px;">Loading…</span></div></div>`;
    }

    async function loadSignedPhoto(key, path) {
      const box = document.getElementById(`photoBox_${key}`);
      if (!box) return;
      box.classList.remove('loading');

      function showPhoto(url) {
        box.innerHTML = `<img src="${url}" alt="${key}" loading="lazy">`;
        box.addEventListener('click', () => {
          document.getElementById('lightboxImg').src = url;
          document.getElementById('lightbox').classList.add('open');
        });
      }

      // Try Supabase client directly (requires admin storage RLS policy)
      try {
        const { data } = await sb.storage.from('id_documents').createSignedUrl(path, 3600);
        if (data?.signedUrl) { showPhoto(data.signedUrl); return; }
      } catch {}

      // Fall back to CF function
      try {
        const res  = await fetch('/api/admin/get-signed-url', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ path }),
        });
        const cfData = await res.json();
        if (cfData.url) { showPhoto(cfData.url); return; }
      } catch {}

      box.innerHTML = `<span class="id-photo-none" style="font-size:11px;">Failed to load</span>`;
      box.style.cursor = 'default';
    }

    async function submitAppReview(app, action) {
      const approveBtn = document.getElementById('approveBtn');
      const rejectBtn  = document.getElementById('rejectBtn');
      const errEl      = document.getElementById('modalErrMsg');
      const reason     = document.getElementById('rejectReason')?.value?.trim() || '';

      if (approveBtn) { approveBtn.disabled = true; approveBtn.textContent = 'Processing…'; }
      if (rejectBtn)  { rejectBtn.disabled  = true; }
      if (errEl) errEl.textContent = '';

      const newStatus = action === 'approve' ? 'approved' : 'rejected';
      const updateData = {
        status:      newStatus,
        reviewed_at: new Date().toISOString(),
        ...(action === 'reject' && reason ? { rejection_reason: reason } : {}),
      };

      // Update seller_applications directly via Supabase client
      const { error } = await sb
        .from('seller_applications')
        .update(updateData)
        .eq('id', app.id);

      if (error) {
        if (errEl) errEl.textContent = error.message || 'Failed to update. Please try again.';
        if (approveBtn) { approveBtn.disabled = false; approveBtn.textContent = '✓ Approve'; }
        if (rejectBtn)  { rejectBtn.disabled  = false; }
        return;
      }

      // Try to update user's is_seller flag via CF function (best-effort)
      try {
        await fetch('/api/admin/review-application', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ applicationId: app.id, userId: app.user_id, action, reason }),
        });
      } catch {}

      closeModal();
      await loadApplications();
      renderShell();
    }

    async function submitNotification() {
      const btn     = document.getElementById('sendNotifBtn');
      const errEl   = document.getElementById('notifError');
      const succEl  = document.getElementById('notifSuccess');
      const title   = document.getElementById('notifTitle').value.trim();
      const message = document.getElementById('notifMessage').value.trim();
      const type    = document.getElementById('notifType').value;
      const link    = document.getElementById('notifLink').value.trim() || '/notifications';
      const target  = document.querySelector('input[name="notifTarget"]:checked')?.value;
      const userId  = target === 'user' ? document.getElementById('notifUserId').value.trim() : null;

      errEl.style.display  = 'none';
      succEl.style.display = 'none';

      if (!title)   { errEl.textContent = 'Title is required.';   errEl.style.display = ''; return; }
      if (!message) { errEl.textContent = 'Message is required.'; errEl.style.display = ''; return; }
      if (target === 'user' && !userId) { errEl.textContent = 'Paste the user UUID.'; errEl.style.display = ''; return; }

      btn.disabled    = true;
      btn.textContent = 'Sending…';

      const res  = await fetch('/api/admin/send-notification', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, message, type, link, userId }),
      });
      const data = await res.json();

      btn.disabled    = false;
      btn.textContent = 'Send notification';

      if (!res.ok) {
        errEl.textContent  = data.error || 'Failed to send. Try again.';
        errEl.style.display = '';
        return;
      }

      succEl.textContent  = `Sent! Saved to notifications DB. Push delivered to ${data.pushSent ?? 0} of ${data.totalSubs ?? 0} subscribed device(s).`;
      succEl.style.display = '';
      document.getElementById('notifTitle').value   = '';
      document.getElementById('notifMessage').value = '';
      document.getElementById('notifLink').value    = '';
    }

                  <button class="btn btn-sm notify-seller-btn" data-seller="${l.seller_id}" data-title="${l.title.replace(/"/g,'')}"
                     style="border-color:rgba(245,185,71,0.3);color:var(--warning);" title="Notify seller">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/></svg>
                  </button>
                  <button class="btn btn-danger btn-sm delete-listing-btn" data-id="${l.id}">Delete</button>
                </div>
              </div>`;
          }).join('') : `<div class="empty-state"><div class="empty-icon">🏷️</div><h3>No listings</h3><p>No listings in the database.</p></div>`}
        </div>`;

      document.querySelectorAll('.delete-listing-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteListing(btn.dataset.id, btn));
      });
      document.querySelectorAll('.notify-seller-btn').forEach(btn => {
        btn.addEventListener('click', () => notifySeller(btn.dataset.seller, btn.dataset.title, btn));
      });
    }

    async function notifySeller(sellerId, listingTitle, btn) {
      const msg = await zPrompt(`Send a notification to the seller of "${listingTitle}".`, { title: 'Notify seller', placeholder: 'e.g. Please update your listing description…' });
      if (!msg?.trim()) return;
      btn.disabled = true;
      const res = await fetch('/api/admin/send-notification', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: 'Message from Admin', message: msg.trim(), userId: sellerId, type: 'general', link: '/orders' }),
      });
      btn.disabled = false;
      if (res.ok) { btn.style.color = 'var(--success)'; setTimeout(() => { btn.style.color = ''; }, 2000); }
    }

    async function deleteListing(id, btn) {
      btn.disabled    = true;
      btn.textContent = 'Deleting…';

      const res = await fetch('/api/admin/delete-listing', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ listingId: id }),
      });

      if (res.ok) {
        allListings = allListings.filter(l => l.id !== id);
        renderShell();
      } else {
        btn.disabled    = false;
        btn.textContent = 'Delete';
      }
    }

    function closeModal() {
      document.getElementById('reviewOverlay').classList.remove('open');
      rejectOpen = false;
    }

    // ── Helpers ──
    function formatIdType(t) {
      const map = { passport:'Passport', drivers_license:"Driver's License", national_id:'National ID (PhilSys)', sss:'SSS ID', pagibig:'Pag-IBIG ID', philhealth:'PhilHealth ID', voters_id:"Voter's ID", postal_id:'Postal ID', other:'Other Gov. ID' };
      return map[t] || t;
    }

    init();
  </script>
</body>
</html>
